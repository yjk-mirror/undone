[scene]
id          = "base::jake_text_messages"
pack        = "base"
description = "Evening. Phone buzzing. Jake. The intimacy of a phone screen at night."

# Post-intimacy interlude. Short scene, different texture.
# The phone is the one space where the body doesn't matter — except
# it does. She's choosing words as a woman texting a man she's
# sleeping with. The patterns are new.
# NOT explicit. Tender. The gap between thinking and sending.

[intro]
prose = """
Your apartment. Evening. The phone buzzes on the nightstand and the screen says his name.

{% if w.hasTrait("ROMANTIC") %}
The glow in the dark room. His name on the screen.
{% elif w.hasTrait("ANALYTICAL") %}
The notification preview shows the first few words. You're already composing before it's open.
{% elif w.hasTrait("SHY") %}
His name on the screen. Five seconds of looking at it before you tap.
{% else %}
His name on the screen.
{% endif %}

**Jake:** *Hey. How was your day?*

Three words and a question mark. {% if w.getSkill("FEMININITY") < 30 %}
The cursor blinks. Something forms, gets deleted, forms again. The keyboard is the same keyboard but the words feel different — what you'd send, how it lands, how you want him to hear it.
{% elif w.getSkill("FEMININITY") < 50 %}
The response comes easier than it would have a month ago.
{% endif %}
"""

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id     = "honest_text"
label  = "Send the honest text"
detail = "Say what you're thinking. Let him see it."
prose  = """
You type it. The real thing.

{% if w.hasTrait("ROMANTIC") %}
**You:** *Good. Better now.*

Three dots. He's typing.

**Jake:** *Yeah?*

**You:** *Yeah. I keep thinking about Saturday.*

A pause — longer than his usual response time.

**Jake:** *Me too.*

**You:** *The market or after?*

**Jake:** *Both. The peach. Definitely the peach.*

The conversation goes for forty minutes. What he had for dinner, the thing he's working on, a question about your weekend that's really a question about whether he's in it. You answer honestly. He reads it the same way. You put the phone down and the pillow smells like shampoo and the evening is different than it was before he texted.

{% elif w.hasTrait("ANALYTICAL") %}
**You:** *Long. Productive. Thinking about you between pull requests.*

The honesty sits on the screen. Three dots.

**Jake:** *Pull requests and me. High company.*

**You:** *Don't let it go to your head.*

**Jake:** *Too late.*

Fast, efficient. You're texting the way you work — direct, no wasted keystrokes. He matches it. Fifteen minutes of short exchanges that cover more ground than a phone call would. When you put it down, something real moved in both directions.

{% elif w.hasTrait("CONFIDENT") %}
**You:** *Good day. Now I'm in bed and you texted and it got better. That's the whole report.*

**Jake:** *Comprehensive.*

**You:** *I'm thorough.*

**Jake:** *I noticed.*

Warm without performing it. Funny without trying. The text exchange runs for half an hour and stops because you're both tired, not because it ran out.

{% else %}
**You:** *Good. Quiet. I was thinking about you.*

Sent before you can edit it. Three dots.

**Jake:** *Good thoughts?*

**You:** *Yeah.*

**Jake:** *Tell me one.*

You do — a small one. The way he handed you the coffee at the market, both hands, lid already on. He sends back something you said at dinner that he's been turning over. The exchange is quiet and honest and you fall asleep with the phone on the pillow and his last message still on the screen.
{% endif %}

{% if w.getSkill("FEMININITY") < 30 %}
The phone is small in your hands. His name at the top of the screen. Your hips are sore from last night and the text conversation has a physical weight that has nothing to do with the words.
{% endif %}
"""

  effect = 'npc("m").addLiking(1); w.skillIncrease("FEMININITY", 1); w.changeStress(-2);'

  [[actions.next]]
  finish = true

[[actions]]
id     = "keep_light"
label  = "Keep it light"
detail = "Flirty. Casual. Don't let him see the processing."
prose  = """
{% if w.hasTrait("FLIRTY") %}
**You:** *Survived another one. You?*

**Jake:** *Same. Thought about going to the market again this weekend.*

**You:** *The peach vendor?*

**Jake:** *Among other things.*

**You:** *Smooth.*

**Jake:** *I try.*

The volley is easy. You know this register — the light, charged back-and-forth that means more than it says. The phone lets you do it without your face involved.

{% elif w.hasTrait("ANALYTICAL") %}
**You:** *Long day. Tell me something interesting.*

**Jake:** *The coffee shop changed their beans. Noticed it immediately.*

**You:** *Tragic.*

**Jake:** *I'm devastated. May never recover.*

The tone stays at this altitude — above the real thing, skimming. You trade small observations for twenty minutes. When you say goodnight he responds with one word and it's the right one.

{% else %}
**You:** *Day was fine. What's new?*

**Jake:** *Not much. Tried to cook the thing. The thing won.*

**You:** *Casualties?*

**Jake:** *One pan. My dignity.*

You laugh in the dark room. You trade small things for twenty minutes. When you say goodnight, the emoji he sends back is simple and right.
{% endif %}

{% if w.getSkill("FEMININITY") < 30 %}
Light is easier. You're smiling at a screen in the dark.
{% endif %}
"""

  effect = 'npc("m").addLiking(1); w.skillIncrease("FEMININITY", 1);'

  [[actions.next]]
  finish = true

[[actions]]
id     = "dont_reply"
label  = "Don't reply tonight"
detail = "The phone on the nightstand. The glow. Tomorrow."
prose  = """
You read it. You start to type. You delete it.

{% if w.hasTrait("SHY") %}
The cursor blinks. Something simple would do — something that just matches his "hey" with yours — but the gap between wanting to send it and actually sending it is wider tonight.

Phone face-down on the nightstand. The glow dies. The room is dark.

{% elif w.hasTrait("ANALYTICAL") %}
Too many directions. "Good" is insufficient. "I miss you" is too much for a Tuesday. "Hey" mirrors without advancing. You run through the options and put the phone down.

Tomorrow the options will be cleaner.

{% else %}
The day was long. Whatever you'd send right now is a rough draft. You put the phone down and the screen dims and the room goes quiet.
{% endif %}

{% if w.getSkill("FEMININITY") < 30 %}
The phone glows once more — a follow-up. You don't read it. You put it face-down and lie there.
{% endif %}

In the morning there's a second message: *No rush.*
"""

  effect = 'w.skillIncrease("FEMININITY", 1);'

  [[actions.next]]
  finish = true
