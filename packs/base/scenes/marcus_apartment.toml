{% else %}
"I should go," you say.
{% endif %}

Marcus doesn't argue. He doesn't try to close the distance. He watches you put your jacket on with his hands loose at his sides — not hurt, not pushing. Just watching.

"Okay," he says.

His hands stay at his sides.

{% if w.getSkill("FEMININITY") < 25 %}
Your hands are warm. Your chest is tight. Your body registered the apartment and the wine and him in it — all of it is still right here, filing itself.
{% elif w.getSkill("FEMININITY") < 50 %}
