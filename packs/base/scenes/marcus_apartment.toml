The doorman nodded at you both on the way in, which means he'll nod at you again on the way out. The elevator was quiet — marble walls, no music. His floor.

His apartment is clean — a man who knew someone was coming. A bottle of red on the kitchen counter, two glasses already out. The bedroom door is visible from where you're standing. Open.

The closet was dark and fast and you could tell yourself it was the circumstances. This is not the circumstances.

{% if w.getSkill("FEMININITY") < 25 %}
The apartment is better than yours. Better building, better furniture, better everything — and standing in it you're aware of the doorman who saw you both in, the elevator that knew his floor, the bedroom door he hasn't had to point to. Nothing about the evening is anonymous. Something warm and low has settled in your stomach and your hands are not entirely steady.
{% elif w.getSkill("FEMININITY") < 50 %}
Since his text you've run this room a dozen times in your head. The wine, the couch, the bedroom door. It landed nothing like you expected — quieter, more real. The wanting was easier to manage when it was hypothetical.
{% else %}
The apartment is a set piece and you knew it when you said yes. The wine is a formality. The bedroom door is the point.
{% endif %}

Marcus sets his keys on the counter. He doesn't open the wine immediately.

He's looking at you.
"""

