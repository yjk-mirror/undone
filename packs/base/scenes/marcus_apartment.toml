[[actions]]
id     = "leave"
label  = "Get your jacket"
detail = "She came. She saw the apartment. She sees what this is."
prose  = """
You accept the glass. You hold it.

His apartment. The doorman. The bottle he opened. The bedroom door visible from where you're standing.

{% if w.hasTrait("AMBITIOUS") %}
The closet was impulsive — that was the story you could tell. Circumstances. Bad judgment, extenuating, file it and close it. This is his couch. His wine. His particular version of patient. If you stay tonight, the closet becomes a beginning and not an ending.
{% elif w.hasTrait("ANALYTICAL") %}
You've been running the full trajectory since his text. Closet to apartment to next time, because there would be a next time. You can see every branch from here with reasonable clarity. The one where you stay is not the one with the least cost.
{% elif w.hasTrait("CONFIDENT") %}
You see what this is. You knew walking in. The wine, the clean apartment, the open bedroom door.
{% else %}
The wine is good. The apartment is clean. He's looking at you the same look from the conference room, the hallway, the break room — every day since.

Something in you has gone quiet.
{% endif %}

You set the glass on the counter — you barely touched it — and pick up your jacket from the chair.

{% if w.hasTrait("CONFIDENT") %}
