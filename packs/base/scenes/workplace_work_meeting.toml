[scene]
id          = "base::workplace_work_meeting"
pack        = "base"
description = "Design review. You present. Someone explains your own work back to you."

[intro]
prose = """
The meeting room has a glass wall facing the open floor, a projector that still runs hot, and seven chairs around a table that seats eight. You're the first one in.

Your laptop is open. The slides are up. You've reviewed the deck four times since last night, not because you're uncertain about the content — you designed this system, you can present it in your sleep — but because the deck has forty slides and you want to know which ones you'll skip when the conversation goes long. You have opinions about which slides matter. You have opinions about which slides you put in to satisfy people who need to feel consulted. You've been in enough design reviews to know the difference.

People filter in at 10:02. Two from your immediate team, one you haven't met. A product manager named Carter who writes things down even when the thing isn't worth writing down. A senior engineer from the platform side who is going to have opinions about the API layer regardless of what the slides say. And Marcus from adjacent infrastructure, who you know by reputation and who settles into the chair directly across from you.

{% if w.hasTrait("OBJECTIFYING") %}
Marcus looks at you. Looks at your slides. Looks at you again. His eyes do the thing — the quick trip down and back up that takes less than a second and that he probably doesn't know he's doing. Your neck gets warm.

{% elif w.hasTrait("ANALYTICAL") %}
Carter will ask about timelines. The platform engineer — Devin — will push back on the interface contract. Marcus will be quiet for the first half and then ask one sharp question. You've been in enough of these rooms.

What you can't account for is how they're reading you. Two weeks of standups. You're still new data.

{% else %}
Two weeks of standups. You know who interrupts and who defers. Marcus settles into the chair directly across from you and opens his laptop without looking up.

{% endif %}
"""

[[thoughts]]
condition = "w.getSkill('FEMININITY') < 30"
style     = "inner_voice"
prose = """
{% if w.hasTrait("ANALYTICAL") %}
*Same logic tree. Same tradeoffs. Different voice delivering them.* Your voice is higher than the slides expect. The room will adjust or it won't.
{% else %}
*Forty slides. You designed this system.* Your hands are smaller on the keyboard. The ring you used to wear doesn't fit anymore. You took it off three days ago.
{% endif %}
"""

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id     = "present"
label  = "Present the design"
detail = "Get through the deck. Handle whatever comes."
prose  = """
You get through the first fifteen slides without interruption, which is better than you expected. The architecture is clean and you know it — the kind of clean that comes from having done something similar three times before and finally having enough scar tissue to know what to leave out. Carter writes things down. The platform engineer nods at the interface diagram without objecting. Marcus is quiet.

You're on slide nineteen — the authentication flow — when Kevin Marsh, the platform-side engineer you hadn't met before today, leans forward. "So this is the token exchange," he says, gesturing at your slide, and then begins explaining it. Not asking about it. Explaining it. To you. The person who drew the diagram.

{% if w.hasTrait("OBJECTIFYING") %}
You let him finish. The room goes still — Carter's pen stops, the platform engineer glances between you and the slide. Kevin keeps going, confident, explaining the diagram you drew to the person who drew it.

"Yes," you say when he stops. "That's the design. The implementation note on the next slide covers the edge case you're probably about to ask about." You advance the deck. He is, in fact, about to ask about it. You answer it before he finishes phrasing it.

{% elif w.hasTrait("ANALYTICAL") %}
You observe it happening in real time. Kevin is explaining your diagram to you, with the confident incorrectness of someone who hasn't read the spec but has enough context to sound like he has. He is wrong about one thing — a nuance in the token lifespan that matters for the edge case you spent two days on — and you give him about forty seconds before you interrupt.

"The lifespan is asymmetric," you say, and point at the relevant section of the diagram you drew. "Refresh tokens have a longer window. It's in the spec — section 4.2. The reason is here." You explain it. He nods. He writes something down. He says "right, right" which means he is updating his model.

The meeting continues. You were not impolite. You were precise. You're aware this is not always how precision lands but the room is moving forward and the content is correct, which is all you came here to guarantee.

{% else %}
You finish Kevin's sentence for him. Not dramatically — you just reach the end of it before he does, with enough specific terminology that the distinction between explaining the thing and having designed the thing becomes evident without needing to be stated. Kevin trails off, picks it back up, says "right" in a way that suggests he's recalibrated, and you move to the next slide.

{% endif %}

The rest of the deck goes cleanly. The platform engineer asks two sharp questions and you have good answers to both. Marcus waits until slide thirty-four to ask the one about operational latency, which is the one you would have asked if you'd been in his seat, and you have the benchmarks ready and pull them up from your notes. The answer lands. He nods.

You finish at 11:47.

The hallway outside the meeting room runs between the elevator bank and the open floor, quieter than both. You stop at the water refill station and fill your bottle.

Marcus comes out behind you. He stops two feet away, because the water station is next to the hall and there's no particular way to avoid it.

"Good presentation," he says. He means it, you think. He's not performing it.

"Thanks."

He's quiet for a moment. Then: "The latency benchmarks — were those from the load test last week, or did you run something new?"

This is, you recognize, a real question. Not a social question. He wants to know because he's going to do something with the answer.

"Last week's load test," you say. "I'll send you the raw data if you want it — the slides have the summary but the shape of the distribution is more interesting."

"Yeah," he says, "send it over." And then he goes.

{% if w.hasTrait("OBJECTIFYING") %}
You stand at the water station for a moment longer than you need to. Kevin's explanation was ninety seconds. The meeting was forty-five minutes. The work held. That should be enough.

Your reflection in the glass wall is a woman in professional clothes with a laptop under her arm. She looks competent. She looks young.

{% elif w.hasTrait("ANALYTICAL") %}
Two follow-up tasks: send Marcus the load test data, reply to whatever Carter is about to email. The content held. The room adjusted. You'll have better data in another two weeks.

{% else %}
The hallway is quiet. You drink the water. The meeting was good. The content held. Kevin did his thing and the room moved past it.

{% endif %}

{% if w.getSkill("FEMININITY") < 30 %}
Carter says "great work" on the way out. Back at your desk, you open Slack. He's already messaged you. Your hands on the keyboard are smaller than the ones that wrote the spec. The code doesn't care. The code is the same.
{% endif %}
"""

  [[actions.effects]]
  type = "set_game_flag"
  flag = "FIRST_MEETING_DONE"

  [[actions.effects]]
  type = "set_npc_role"
  npc  = "m"
  role = "ROLE_MARCUS"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 3

  [[actions.next]]
  finish = true

[[actions]]
id     = "let_kevin_talk"
label  = "Let Kevin finish"
detail = "He's explaining your diagram. Let him. Watch the room instead."
prose  = """
You get through the first fifteen slides clean. The architecture is yours and the room knows it — Carter writes things down, the platform engineer nods at the interface contract, Marcus is quiet in the way that means he's reading, not waiting.

Slide nineteen. Kevin leans forward. "So this is the token exchange," he says, and starts explaining it. Your diagram. Your design. To you.

You let him go.

Not because you don't have the correction ready — you do, the token lifespan is asymmetric and he's treating it as symmetric, and the edge case on slide twenty-two will make that clear — but because the room is more interesting than the interruption right now.

Carter's pen pauses. The platform engineer — Devin — shifts in his chair. Marcus is watching Kevin with an expression you can't read from this angle. And Kevin is explaining, with the confidence of someone who learned the concept yesterday and assumes that's sufficient for the room.

{% if w.hasTrait("ANALYTICAL") %}
You catalog who notices. Devin catches the lifespan error at second 30 and doesn't say anything. Marcus catches it at second 15 — his jaw tightens once, the smallest possible tell. Carter doesn't catch it at all, which is fine; that's not his job. Kevin finishes. The room is quiet.

"The lifespan is asymmetric," you say, after a beat. "Slide twenty-two has the detail." You advance the deck. The correction lands softly, which is how you intended it. Kevin writes something down.
{% else %}
He finishes. The room does the thing rooms do when someone has explained something incorrectly — a small redistribution of attention, everyone deciding simultaneously whether to address it.

"The lifespan is asymmetric," you say. "Next slide." You advance the deck. Kevin nods. The room recalibrates. You move on.
{% endif %}

The rest of the deck runs clean. Marcus waits until slide thirty-four to ask about operational latency. You have the benchmarks ready.

In the hallway afterward, Marcus stops at the water station. "Good presentation," he says. Not performing it.

"Thanks."

"Kevin was wrong about the token exchange." He says it like he's noting the weather.

"I know."

"You let him finish."

"I did."

He looks at you for a second longer than the exchange requires. Then he goes.

{% if w.getSkill("FEMININITY") < 30 %}
You fill your water bottle. Your reflection in the glass wall is a woman holding a laptop who just ran a forty-five minute design review. Your hands are steady. Something about the hallway exchange sits differently than the meeting itself.
{% endif %}
"""

  [[actions.effects]]
  type = "set_game_flag"
  flag = "FIRST_MEETING_DONE"

  [[actions.effects]]
  type = "set_npc_role"
  npc  = "m"
  role = "ROLE_MARCUS"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 3

  [[actions.effects]]
  type  = "add_npc_liking"
  npc   = "m"
  delta = 1

  [[actions.next]]
  finish = true

[[actions]]
id        = "correct_him"
label     = "Cut him off"
detail    = "He's wrong. You designed this. Say so."
condition = "w.hasTrait('CONFIDENT') || w.hasTrait('ANALYTICAL')"
prose     = """
You get through the first fifteen slides clean. Carter writes things down. The platform engineer nods. Marcus reads.

Slide nineteen. Kevin leans forward. "So this is the token exchange," he says, and gets four words into explaining your own diagram to you before you interrupt.

"The lifespan is asymmetric." You point at the diagram — your diagram — and walk through it. Not hostile. Just precise. The token refresh window, the edge case, the reason the architecture looks the way it does. You designed it. You don't need to explain that you designed it; the specificity does it for you.

Kevin stops. The room is very quiet.

{% if w.hasTrait("CONFIDENT") %}
"Section 4.2," you say. "The spec has the detail." You advance the slide. The next one has the edge case Kevin was about to get wrong. You walk through it cleanly and move on.

The room doesn't need to be told what happened. Everyone in it is an engineer. They read the exchange and filed it.
{% elif w.hasTrait("ANALYTICAL") %}
You watch the room process it. Devin's expression: neutral, unsurprised. Carter: writing something down that isn't about the content. Marcus: still. Watching you. Kevin: recalibrating.

You move to the next slide. The correction was four sentences. The meeting continues.
{% endif %}

The rest of the deck runs without interruption. Marcus asks about operational latency at slide thirty-four. You have the benchmarks. The answer lands.

In the hallway: Marcus.

"That was direct," he says.

"He was wrong."

"He was." Marcus fills his water bottle. "Send me the load test data when you get a chance."

{% if w.getSkill("FEMININITY") < 30 %}
You walk back to your desk. Your pulse is elevated — not from the content, which you know cold, but from the interruption itself. The room heard your voice cut through Kevin's and recalibrated in real time. You're not sure which version of you is processing that.
{% endif %}
"""

  [[actions.effects]]
  type = "set_game_flag"
  flag = "FIRST_MEETING_DONE"

  [[actions.effects]]
  type = "set_npc_role"
  npc  = "m"
  role = "ROLE_MARCUS"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 3

  [[actions.effects]]
  type  = "add_npc_liking"
  npc   = "m"
  delta = 2

  [[actions.effects]]
  type   = "change_stress"
  amount = 1

  [[actions.next]]
  finish = true
