[scene]
id          = "base::workplace_work_meeting"
pack        = "base"
description = "Design review. You present. Someone explains your own work back to you."

[intro]
prose = """
The meeting room has a glass wall facing the open floor, a projector that still runs hot, and seven chairs around a table that seats eight. You're the first one in.

Your laptop is open. The slides are up. Forty slides, thirty of which will drive the actual conversation. The rest are there for the record.

{% if gd.hasGameFlag("FIRST_DAY_ASSERTED_STATUS") %}
Word got around after Monday. Not everywhere, but enough — the introductions at the coffee station have a different shape this week.
{% elif gd.hasGameFlag("FIRST_DAY_REDIRECTED_STATUS") %}
People have been coming to your desk with questions since Tuesday. The hallway energy shifted without anyone naming it.
{% elif gd.hasGameFlag("FIRST_DAY_DEFERRED_STATUS") %}
The first week burned off slowly. The work carried it — not all at once, but by now the room has a different shape than it did Monday morning.
{% endif %}

People filter in at 10:02. Two from your immediate team, one you haven't met. A product manager named Carter who writes things down on a yellow legal pad regardless of whether the thing is worth writing. Devin from the platform side, already open to the interface spec on his laptop. And Marcus from adjacent infrastructure, who settles into the chair directly across from you.

{% if gd.hasGameFlag("FIRST_CLOTHES_MIRROR") %}
You straighten one cuff before the room fills. The sleeve sits right. The outline in the glass wall across from you is the same one the mirror gave you this morning.
{% elif gd.hasGameFlag("FIRST_CLOTHES_MINIMUM") %}
The blouse sits across your shoulders in a way that's functional and not much more. It does the job.
{% elif gd.hasGameFlag("FIRST_CLOTHES_ASKED_HELP") %}
The blouse fits the way something fits when someone who knew what they were doing helped you pick it. The shoulders are right. That's the whole of it.
{% endif %}

{% if w.hasTrait("OBJECTIFYING") %}
Marcus looks at you. Then at the slide deck on the projector. Then at you again. The return trip takes under a second. Your neck gets warm.

{% elif w.hasTrait("ANALYTICAL") %}
Carter finds a chair on the far side and uncaps a pen. Devin is already in the interface spec. Marcus sets his laptop on the table and leaves it closed, watching the room while everyone settles.

{% else %}
Marcus settles into the chair directly across from yours and opens his laptop without looking up.

{% endif %}
"""

[[thoughts]]
condition = "w.getSkill('FEMININITY') < 30"
style     = "observation"
prose = """
{% if w.hasTrait("ANALYTICAL") %}
Your voice is pitched differently than the slides expect. The room will read it or it won't.
{% else %}
Your hands look small on the keyboard. The slides are yours. The system is yours.
{% endif %}
"""

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id     = "present"
label  = "Present the design"
detail = "Get through the deck. Handle whatever comes."
prose  = """
The first fifteen slides go without interruption. Carter writes things down. Devin nods at the interface contract. Marcus is quiet in the way that means he's reading, not waiting.

Slide nineteen — the authentication flow. Kevin Marsh, the platform engineer you hadn't met before today, leans forward. "So this is the token exchange," he says, and begins explaining it. Not asking. Explaining. Your diagram. Your design.

{% if w.hasTrait("OBJECTIFYING") %}
Carter's pen stops. Devin glances from Kevin to the slide and back. Kevin keeps going, confident, working through the diagram you drew.

"Yes," you say when he stops. "The implementation note on the next slide covers the edge case you're about to ask about." You advance the deck. He is about to ask about it. You answer it before he finishes phrasing it.

{% elif w.hasTrait("ANALYTICAL") %}
Kevin is wrong about one thing — the token lifespan, which is asymmetric, not symmetric, and the distinction matters for the edge case on slide twenty-two. You give him forty seconds.

"The lifespan is asymmetric." You point to the relevant node in the diagram. "Refresh tokens have a longer window. Section 4.2." Kevin writes something down and says "right, right." You advance the deck.

{% else %}
You reach the end of Kevin's sentence before he does. Just specific enough that the room recalibrates without anyone needing to say why. Kevin trails off, picks it back up, says "right," and you move to the next slide.

{% endif %}

The rest of the deck runs cleanly. Devin asks two sharp questions and you have the answers. Marcus waits until slide thirty-four to ask about operational latency, and you pull up the benchmarks from your notes. The answer lands. He nods.

You finish at 11:47.

The hallway outside runs between the elevator bank and the open floor, quieter than both. You stop at the water refill station.

Marcus comes out behind you. He stops two feet away at the station.

"Good presentation," he says, flat, already looking at his phone.

"Thanks."

A beat. Then: "The latency benchmarks — from last week's load test, or something new?"

"Last week's," you say. "I'll send the raw data — the slides have the summary but the distribution shape is more interesting."

"Yeah, send it over." He goes.

{% if w.hasTrait("OBJECTIFYING") %}
You fill your bottle. The hallway light hits the glass wall at an angle that gives back your reflection — laptop under one arm, blouse straight, the jaw line still doing something unfamiliar.

{% elif w.hasTrait("ANALYTICAL") %}
Two follow-up tasks: load test data to Marcus, whatever Carter is about to send to the group thread. You walk back to your desk.

{% else %}
The hallway is quiet. You drink the water.

{% endif %}

{% if gd.hasGameFlag("FIRST_DAY_ASSERTED_STATUS") %}
The credit from Monday held. The room moved the way rooms move when the presenter knows the material and the room knows the presenter knows it.
{% elif gd.hasGameFlag("FIRST_DAY_REDIRECTED_STATUS") %}
Same pattern as Monday — the work changed the room, not a speech about it.
{% elif gd.hasGameFlag("FIRST_DAY_DEFERRED_STATUS") %}
The first-week drag didn't show. The content carried it.
{% endif %}

{% if w.getSkill("FEMININITY") < 30 %}
Carter catches you in the doorway on the way out. "Great work." He means it. Back at your desk you open Slack. He's already messaged the thread.
{% endif %}
"""

  [[actions.effects]]
  type = "set_game_flag"
  flag = "FIRST_MEETING_DONE"

  [[actions.effects]]
  type = "set_npc_role"
  npc  = "m"
  role = "ROLE_MARCUS"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 3

  [[actions.next]]
  finish = true

[[actions]]
id     = "let_kevin_talk"
label  = "Let Kevin finish"
detail = "He's explaining your diagram. Let him. Watch the room instead."
prose  = """
The first fifteen slides go without interruption. Carter writes things down. Devin nods at the interface contract. Marcus is quiet.

Slide nineteen. Kevin leans forward. "So this is the token exchange," he says, and starts explaining your diagram back to the room.

Carter's pen pauses. Devin shifts in his chair. Marcus watches Kevin from across the table with an expression you can't read at this angle. Kevin is explaining the token lifespan as symmetric. It isn't.

{% if w.hasTrait("ANALYTICAL") %}
Devin catches the lifespan error around the thirty-second mark and doesn't say anything. Marcus catches it sooner — his jaw tightens once, brief, and he goes still again. Carter doesn't catch it. Kevin finishes. The room is quiet.

"The lifespan is asymmetric," you say. "Slide twenty-two has the detail." You advance the deck. Kevin writes something down.

{% else %}
Kevin finishes. The room does what rooms do when something lands wrong — a small redistribution of attention, everyone waiting.

"The lifespan is asymmetric," you say. "Next slide." You advance the deck. Kevin nods. You move on.

{% endif %}

The rest of the deck runs cleanly. Marcus waits until slide thirty-four to ask about operational latency. You have the benchmarks ready and the answer lands.

In the hallway afterward, Marcus stops at the water station.

"Good presentation," he says. Flat.

"Thanks."

"Kevin was wrong about the token exchange." He says it the way you'd note a traffic light color.

"I know."

"You let him finish."

"I did."

Marcus looks at you for a second longer than the exchange calls for. Then he goes.

{% if w.getSkill("FEMININITY") < 30 %}
You fill your water bottle. The glass wall gives back a reflection — laptop under one arm, hands steady on the bottle. The hallway is quiet.
{% endif %}
"""

  [[actions.effects]]
  type = "set_game_flag"
  flag = "FIRST_MEETING_DONE"

  [[actions.effects]]
  type = "set_npc_role"
  npc  = "m"
  role = "ROLE_MARCUS"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 3

  [[actions.effects]]
  type  = "add_npc_liking"
  npc   = "m"
  delta = 1

  [[actions.next]]
  finish = true

[[actions]]
id        = "correct_him"
label     = "Cut him off"
detail    = "He's wrong. You designed this. Say so."
condition = "w.hasTrait('CONFIDENT') || w.hasTrait('ANALYTICAL')"
prose     = """
The first fifteen slides go without interruption. Carter writes things down. Devin nods. Marcus reads.

Slide nineteen. Kevin leans forward. "So this is the token exchange," he says, and gets four words in before you cut across him.

"The lifespan is asymmetric." You point at the diagram and walk through it — token refresh window, the edge case, the reason the architecture is shaped the way it is. Kevin stops. The room goes quiet.

{% if w.hasTrait("CONFIDENT") %}
"Section 4.2 has the detail." You advance the slide. The next one covers the edge case Kevin was heading toward. You walk through it and move on.

Devin goes back to his laptop. Carter writes something down. Marcus watches you advance the deck.

{% elif w.hasTrait("ANALYTICAL") %}
Devin: expression neutral, unsurprised. Carter: writing something that isn't about the token lifespan. Marcus: still, watching you from across the table. Kevin: nodding, adjusting.

You move to the next slide. The correction was four sentences.

{% endif %}

The rest of the deck runs without interruption. Marcus asks about operational latency at slide thirty-four. You have the benchmarks. The answer lands.

In the hallway, Marcus stops at the water station.

"That was direct," he says.

"He was wrong."

"He was." Marcus fills his bottle. "Send me the load test data when you get a chance."

{% if w.getSkill("FEMININITY") < 30 %}
You walk back to your desk. Your hands are warm from where you gripped the laptop. The hallway is quiet behind you.
{% endif %}
"""

  [[actions.effects]]
  type = "set_game_flag"
  flag = "FIRST_MEETING_DONE"

  [[actions.effects]]
  type = "set_npc_role"
  npc  = "m"
  role = "ROLE_MARCUS"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 3

  [[actions.effects]]
  type  = "add_npc_liking"
  npc   = "m"
  delta = 2

  [[actions.effects]]
  type   = "change_stress"
  amount = 1

  [[actions.next]]
  finish = true
