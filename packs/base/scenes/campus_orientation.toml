[scene]
id          = "base::campus_orientation"
pack        = "base"
description = "Freshman orientation. The quad, the panels, the men who talk to her like she's someone new — which she is."

[intro]
prose = """
Freshman orientation is a series of large rooms with name tags and people who have practiced their welcome. The Dean of Students speaks for thirty minutes. Two upperclassmen do a skit about campus resources that is slightly painful. Someone explains the honor code with genuine conviction, which Camila finds almost touching.

You're at a round table with seven other freshmen. The table has been given an icebreaker card: *Share one thing you're excited about and one thing you're nervous about.*

The people at her table go around. One person is nervous about the workload. One person is excited about the research opportunities. A guy two seats over — broad, easy smile, one of those people who are comfortable everywhere — says he's excited to "meet new people" and nervous about nothing, which gets a laugh, which he clocked and aimed for.

When it gets to her: excitement about the coursework. Nerves about time management.

The broad guy across the table — his name tag says ADAM — gives you the smile that you now know what to do with, which is to clock it and file it and decide later whether it has implications.

It's the same smile you gave to women at parties. You know exactly what it's for. You know exactly how it reads from the other side now.

{% if w.hasTrait("SHY") %}
Nobody asks follow-up questions. The card moves on. You're relieved.
{% elif w.hasTrait("AMBITIOUS") %}
Three people at the table ask follow-up questions. You field them with the ease of someone who's been in rooms where she needs to be taken seriously and has learned how.
{% else %}
Adam asks what you're studying. He nods like it's interesting, which it probably is, or probably isn't, and you can't quite tell which.
{% endif %}
"""

[[intro_variants]]
condition = "w.getSkill('FEMININITY') < 15"
prose = """
Freshman orientation. The assigned table. The icebreaker card says *Share something.*

Time management. The real answer is different but the real answer is not for this table.

The guy two seats over — broad, easy smile — does the thing with the smile. You watch him do it. Watch it land in the room. You've been on the other side of that smile and you know exactly what it's encoding.

*You're watching this from the outside now*, she thinks, and then corrects herself: *No. You're watching it from the other side.* That's different. That's the whole thing.

Orientation continues.
"""

[[thoughts]]
condition = "w.getSkill('FEMININITY') < 50"
style     = "inner_voice"
prose = """
At break you get coffee at the table in the back and a junior introduces himself and asks if you're enjoying orientation, and you say yes, and he recommends two clubs, and you nod, and he says *nice to meet you* and means it in the specific way that a junior means it to a freshman woman he thinks is attractive.

You know what that means. You've done it. The specific warmth of it, the manufactured interest, the slight lean-in that says *I'm not hitting on you, I'm just engaged with what you're saying.*

You're standing on the other side of it. He hasn't done anything wrong — he's being perfectly nice. You're just seeing the blueprint now instead of the wall.

No clear protocol for this information. It goes on the list.
"""

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id    = "engage"
label = "Engage with the orientation"
detail = "You're here. You might as well get something out of it."
allow_npc_actions = true
prose = """
You stay for the afternoon sessions — academic resources, financial aid, the campus wellness center — and actually take notes on things you didn't know. The financial aid session in particular is useful. You talk to an advisor for ten minutes after and come out with information that you wouldn't have if you'd cut early.

By four she's back in the dorm with a folder of pamphlets and a slightly better sense of where everything is.

Janette is in the room, already complaining cheerfully about the icebreaker cards. Camila drops her bag. You agree that the icebreaker cards were bad. Janette laughs. This is a fine basis for a living situation.
"""

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::campus_opening"
  to_state = "dorm_life"

  [[actions.next]]
  finish = true

[[actions]]
id    = "skip_afternoon"
label = "Cut the afternoon session"
detail = "You've got the map. You know where things are. Go explore."
prose = """
You walk the campus instead. Find the library — main reading room, the kind with high ceilings and the specific hush of people performing focus. Find the coffeehouse near the science building. Find the river path that goes behind the dorms and curves toward the athletic center.

The campus is smaller than it looks in photos. You can imagine living in it. You're going to live in it.

A group of guys playing Frisbee on the far side of the quad. You watch for a second, the way you do, and then keep walking.

One of them looks over. You don't slow down.
"""

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::campus_opening"
  to_state = "dorm_life"

  [[actions.next]]
  finish = true

# ── NPC Actions ────────────────────────────────────────────────────

[[npc_actions]]
id        = "adam_talks"
label     = "Adam keeps the conversation going"
weight    = 7
condition = "!scene.hasFlag('adam_done')"
prose = """
After the morning session Adam materializes next to her at the coffee table with the ease of someone who is used to materializing next to people at coffee tables.

"Your major's actually kind of interesting," he says. "I was thinking about doing something similar but then I took one look at the prerequisites."

{% if w.hasTrait("AMBITIOUS") %}
"The prerequisites are the easy part," she says, and he laughs, which was not the intended effect but she'll take it.
{% elif w.hasTrait("FLIRTY") %}
"The prerequisites are miserable," you agree. "Worth it though." You say it like you know, which you do, and he leans slightly more toward you than the conversation requires.
{% else %}
You say something noncommittal. He says something about how he's pre-law anyway, which is why he's here, and the conversation drifts along without ever turning into much of anything.
{% endif %}

He wanders off toward someone else eventually. You watch him go and think: *six months ago I would have done exactly that.*
"""

  [[npc_actions.effects]]
  type = "set_scene_flag"
  flag = "adam_done"

  [[npc_actions.next]]
  goto = "engage"
