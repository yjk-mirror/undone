[scene]
id          = "base::opening_callback_mirror_afterglow"
pack        = "base"
description = "Week-two callback. The first-clothes branch leaves a quieter, more deliberate memory around presentation and self-recognition."

[intro]
prose = """
You stop at the hallway mirror on the way out — not a full stop, just a pause with one hand on the door handle.

{% if gd.hasGameFlag("FIRST_CLOTHES_MIRROR") %}
The department-store dressing room had better light. Bigger glass. The blouse was the same one. The hallway mirror is smaller and meaner, and the silhouette is still there.
{% elif gd.hasGameFlag("FIRST_CLOTHES_FUNCTIONAL") %}
The first shopping trip was efficiently impersonal: find the size, pay, leave. The blouse came out of the bag and went on the hanger and has been in the rotation since. The hallway mirror catches the line of it the same way every morning.
{% else %}
The sales associate at the department store pulled three options and waited while you decided. The one you chose has been in the rotation since. The hallway mirror shows you roughly the same thing it showed in the store.
{% endif %}

You smooth the fabric once at the waist.
"""

[[actions]]
id     = "take_the_win"
label  = "Take the small win"
detail = "Not vanity. Calibration."
prose  = """
The door clicks shut behind you.

{% if gd.hasGameFlag("FIRST_CLOTHES_FUNCTIONAL") %}
The blouse solved the problem. It keeps solving the problem. That is enough for this morning.
{% else %}
The hallway is narrow and the light is bad and none of that changed what the mirror showed.
{% endif %}

The street is loud. You head for the train.
"""

  effect = 'gd.setGameFlag("OPENING_CALLBACK_MIRROR_AFTERGLOW"); w.changeAnxiety(-1); w.skillIncrease("FEMININITY", 1);'

  [[actions.next]]
  finish = true
