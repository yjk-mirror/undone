[scene]
id          = "base::work_marcus_drinks"
pack        = "base"
description = "A bar near the office. After work. He suggested it as they were leaving. Two drinks in."

[intro]
prose = """
The bar is three blocks from the office and smells like old wood and the fryer in the back. Half the tables empty. A couple at the bar end talking over each other, a group of four near the window with pints and work lanyards still on.

You're in a booth. Two glasses on the table. His is half empty. Yours is close to that.

Marcus is leaned back, arm along the top of the booth, watching the room without watching it. The conversation stopped being about the Hendricks integration somewhere between the first drink and the second.

{% if w.getSkill("FEMININITY") < 30 %}
The second drink hit faster than the first. His forearm rests on the back of the booth. You've looked at it twice already.
{% elif w.getSkill("FEMININITY") < 50 %}
Two drinks in. His voice carries differently in here — not a meeting room, not the break room. Just a booth.
{% endif %}

His glass comes up. He looks at you over the rim.
"""

[[thoughts]]
condition = "w.getSkill('FEMININITY') < 35"
style = "observation"
prose = "Two drinks deep. Marcus's forearm is resting on the back of the booth behind you."

# ── Actions ──────────────────────────────────────────────────────────────────

[[actions]]
id     = "another_round"
label  = "Have another round"
detail = "The evening's not done. His knee is against yours under the table."
prose  = """
"One more?" you say.

He flags the server without checking if you're sure. Like it was already decided and you just needed to say it.

{% if w.hasTrait("AMBITIOUS") %}
Monday. The open floor plan. The three people who sit between your desks. You order anyway.
{% elif w.hasTrait("ANALYTICAL") %}
The signals have been there all evening: the leaning back, the eye contact that holds a beat past professional, the way the last question landed — not "so what are you working on" but "what's the thing you actually care about right now." The third drink arrives. His knee is still against yours.
{% elif w.hasTrait("CONFIDENT") %}
You meet his eyes when the server comes. You order what you want. Something in his face shifts — not surprise, closer to acknowledgment.
{% else %}
The server comes. You order. The booth has gotten smaller over the last hour — not the room, just the far end of it has stopped registering.
{% endif %}

The drinks arrive. His knee doesn't move from yours. The conversation finds a different register — not work, not quite personal, somewhere between. He asks you something real. You answer it.

{% if w.getSkill("FEMININITY") < 30 %}
His voice is lower here than it is in a meeting room. You noticed it an hour ago. Still noticing it.
{% endif %}

When you check your phone it's past nine. The couple is gone. The four with the lanyards are still there. It's mostly just them and two of you in a booth.

Marcus walks you to the subway. Cold after the warmth of the bar. At the entrance he says, "Next week." Not a question. You go down the steps.
"""

  [[actions.effects]]
  type  = "set_game_flag"
  flag  = "MARCUS_DRINKS"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.effects]]
  type  = "change_alcohol"
  delta = 1

  [[actions.effects]]
  type  = "add_npc_liking"
  npc   = "m"
  delta = 2

  [[actions.effects]]
  type  = "add_arousal"
  delta = 1

  [[actions.next]]
  finish = true

[[actions]]
id     = "split_the_check"
label  = "Split the check"
detail = "Professional boundary reasserted. The math stays clean."
prose  = """
"We should probably—" you start, and Marcus is already putting his card on the table. You put yours next to it. The server takes both without comment.

{% if w.hasTrait("AMBITIOUS") %}
Two drinks. Tab split down the middle. You can walk into Monday without a variable you can't account for.
{% elif w.hasTrait("ANALYTICAL") %}
Two cards on the table. The math is unambiguous. The direction you didn't take is still visible for about three seconds while the server runs the cards. Then it's gone.
{% else %}
Clean. Efficient.
{% endif %}

Outside, the cold hits fast. You walk to the subway together — same direction for four blocks. The conversation stays easy. What the team's building next quarter. A movie he mentioned that you've been meaning to see.

At the corner where you split off, he says, "Good talk." He means it professionally. You go your way. He goes his.

{% if w.getSkill("FEMININITY") < 50 %}
On the train, the warmth from the bar takes a while to leave.
{% endif %}
"""

  [[actions.effects]]
  type  = "set_game_flag"
  flag  = "MARCUS_DRINKS"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.effects]]
  type  = "change_alcohol"
  delta = 1

  [[actions.effects]]
  type  = "add_npc_liking"
  npc   = "m"
  delta = 1

  [[actions.next]]
  finish = true

[[actions]]
id     = "tell_him_something_real"
label  = "Tell him something true"
detail = "Not about work. Something that wouldn't come out sober."
prose  = """
The conversation is already somewhere else and then you're just — saying it.

{% if w.hasTrait("AMBITIOUS") %}
You tell him about the job before this one. The thing you built there that isn't on your current resume because the company folded and the work went with it. You've never said this to a colleague. Two drinks in and you say it to Marcus, across a booth, without calculating what it costs.
{% elif w.hasTrait("ANALYTICAL") %}
You tell him you knew the Hendricks integration was going to break six weeks before it did. You could see it in the dependency graph. You didn't say anything because it wasn't your call and you were still mapping who listened and who didn't. He goes quiet. Then: "I knew too." A beat. "I thought I was the only one."
{% elif w.hasTrait("CONFIDENT") %}
You tell him what you actually think about the direction the team is heading — not the meeting version, the real one. He listens. Disagrees with part of it. Tells you where his read diverges and gives you a reason. It's the best conversation you've had here.
{% else %}
Something comes out — not a secret, just a true thing you wouldn't say in a meeting. He receives it straight. No "thanks for sharing." No posture adjustment. He takes it in and gives you something back in the same register.
{% endif %}

Marcus looks at you differently after. "That tracks," he says. Like that covers it.

At some point you both notice it's late. Outside he says, "We should do this again." He means the conversation. He might mean the rest of it too.
"""

  [[actions.effects]]
  type  = "set_game_flag"
  flag  = "MARCUS_DRINKS"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.effects]]
  type  = "change_alcohol"
  delta = 1

  [[actions.effects]]
  type  = "add_npc_liking"
  npc   = "m"
  delta = 3

  [[actions.next]]
  finish = true

[[actions]]
id        = "touch_his_hand"
label     = "Touch his hand"
detail    = "On the table. A signal. See what he does with it."
condition = "w.hasTrait('FLIRTY') || w.getSkill('FEMININITY') > 35"
prose     = """
Your hand moves before anything is decided. On the table, over his — not grabbing, just there.

Marcus goes still. Not pulling away — stilling. He looks down at your hand and then up at you, and something in his face that's usually managed isn't, just for a second.

{% if w.hasTrait("FLIRTY") %}
You don't take it back. He turns his hand over under yours.

"This is a bad idea," he says.

"Probably," you say.

He doesn't move his hand.
{% elif w.hasTrait("ANALYTICAL") %}
You tracked this possibility hours ago — the trajectory from the break room to this booth. You saw where it was going. You put your hand on his anyway. His hand is warm. He looks at you and the look has no professional component left in it.
{% elif w.hasTrait("CONFIDENT") %}
He looks at your hand on his. Then at you. He turns his hand over and closes it around yours.

"We're not doing this at work," he says.

"I know," you say.
{% else %}
His hand turns over. He doesn't say anything. The bar noise fills the space where something was just decided.
{% endif %}

{% if w.getSkill("FEMININITY") < 50 %}
His thumb moves once across the back of your hand.
{% endif %}

You leave separately. On the subway platform you stand in the warmth underground and the train comes.
"""

  [[actions.effects]]
  type  = "set_game_flag"
  flag  = "MARCUS_DRINKS"

  [[actions.effects]]
  type  = "set_game_flag"
  flag  = "MARCUS_TOUCHED"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.effects]]
  type  = "change_alcohol"
  delta = 1

  [[actions.effects]]
  type  = "add_npc_liking"
  npc   = "m"
  delta = 2

  [[actions.effects]]
  type  = "add_arousal"
  delta = 1

  [[actions.next]]
  finish = true
