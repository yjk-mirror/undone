[scene]
id          = "base::workplace_first_night"
pack        = "base"
description = "First night in the empty apartment. The boxes aren't here. The city is outside. The bra problem is tonight's problem."

[intro]
prose = """
Unit 4B is empty.

The boxes aren't here. The shipping company said Monday. The confirmation email is in the inbox. None of that changes the fact of an empty apartment, a carry-on bag, and a body that has been awake for thirty-three hours.

The apartment is fine — old floors, good light, a kitchen with real counter space, a bedroom big enough for more than a mattress. The radiator in the bedroom is quiet and cold. Frank's wife said it takes a few minutes.

The phone has a list open. Furniture: Monday. Bedding: forgot. Towels: forgot. Food: obviously.

{% if w.hasTrait("AMBITIOUS") %}
The list expands fast and gets sorted into a single column by priority before the clock hits eleven. The shipping company gets a confirmation text. The manager's welcome email gets a reply flagged for morning.
{% elif w.hasTrait("DOWN_TO_EARTH") %}
The list stays short and practical. Floors have been slept on before. The essentials column is two items long.
{% else %}
The list gets long. Then a new line appears between *food* and *towels* and sits there, concrete and immediate in a way the rest of the list isn't.
{% endif %}

The bra from the airport gift shop has been doing the job it was never designed for since six this morning. It is not, in any meaningful sense, still doing that job.

The day ran on forward momentum — airport, keys, landlord, deposit. The problem is that momentum has run out.
"""

[[intro_variants]]
condition = "w.getSkill('FEMININITY') < 15"
prose = """
Unit 4B is empty.

The boxes aren't here. The Monday window was confirmed. The confirmation is in the email.

Bedroom, bathroom, kitchen, living room. The phone has a list open. Furniture. Bedding. Food. Towels.

The cursor blinks at the end of *towels*. There's something else. The list said *clothes*, generally, somewhere around the third week of planning, meaning Monday, meaning a vague gestural plan that hadn't extended to include the specific practical reality of tonight, this body, this sports bra from the airport gift shop that's been digging into the underside of both arms since the first layover.

The word goes on the list between *food* and *towels*. The note app autocorrects it, then uncorrects it, then gives up.

The list will get solved. Lists get solved.
"""

[[thoughts]]
condition = "w.getSkill('FEMININITY') < 25"
style     = "observation"
prose = """
The floor is clean enough, and the city is out the window. The building across the street has lit windows in a grid. Someone nearby is watching something with the sound turned too high. A siren moves through the neighborhood without urgency — just the city doing its thing.

The dark glass of the window gives back a reflection. Petite. Young-looking. Hair that still doesn't sit quite right. The hands visible at the hem of the shirt are small, the knuckles unfamiliar.
"""

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id    = "order_food_sleep"
label = "Order food and sleep"
detail = "Food. Phone charging on the floor. Eight hours. Tomorrow is tomorrow."
prose = """
You open the delivery app and order from the first Thai place with four stars and a fifteen-minute estimate. While you wait, you sit on the floor with your back against the wall and reread the email from your new manager: parking you don't need, badge pickup instructions, the name of the person meeting you in the lobby — all the ordinary infrastructure of a job that started without waiting for any of this.

The food arrives in thirteen minutes. You eat on the floor. The radiator has warmed up.

You charge the phone, roll your jacket into a rough pillow, and lie down on the bedroom floor. It's not comfortable. You're out in four minutes.

Tomorrow: shopping. The bra problem specifically. The rest of the list after that.
"""

  [[actions.effects]]
  type   = "change_stress"
  amount = -5

  [[actions.effects]]
  type   = "change_money"
  amount = -18

  [[actions.effects]]
  type = "set_game_flag"
  flag = "FIRST_NIGHT_CRASHED"

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "week_one"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.next]]
  finish = true

[[actions]]
id    = "research_bra_situation"
label = "Figure out the bra situation"
detail = "How hard can it be. Open a browser. Figure it out."
prose = """
You open your phone and start searching.

Forty minutes later: bra sizing is a system apparently designed by someone who found the metric system too merciful. H-cup does not mean what you assumed it meant. Most department stores stop at DDD and then become theoretical. Specialty stores exist. The specialty stores have names you are going to have to say out loud to a sales associate. Underwire, it turns out, is doing something specific and structural, and the airport gift shop sports bra is not.

You put your phone down.

{% if w.hasTrait("DOWN_TO_EARTH") %}
You add *department store, early* to the list. Numbers, measurements, practical terms — it's a solvable problem. You set the phone face-down and go to sleep.
{% else %}
Outside, someone is honking at someone else, and a dog is barking at the honking, and a siren is two blocks away deciding not to be dramatic about it. You add *specialty store — ask someone??* to the list, plug in the phone, and lie down on the floor.
{% endif %}
"""

  [[actions.effects]]
  type   = "change_anxiety"
  amount = 3

  [[actions.effects]]
  type = "set_game_flag"
  flag = "FIRST_NIGHT_RESEARCHED"

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "week_one"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.next]]
  finish = true

[[actions]]
id    = "call_someone"
label = "Call someone back home"
detail = "There's a name in the contacts. You're not going to explain anything. You just need to hear a voice."
prose = """
You pick a contact without thinking too hard about it: Marcus, who you've known since grad school, who would pick up no matter what time it is.

He picks up on the second ring. "Hey, where'd you end up landing?"

"The city," you say. "Just got in."

"How's the apartment?"

"Empty. Boxes on Monday."

"Classic." A pause. "You okay? You sound weird."

{% if w.hasTrait("SHY") %}
"Tired," you say.

Which is true. You leave it there. He lets you.

"Get some sleep," he says. "Text me when you're settled."

"Yeah."

You hang up and hold the phone for a moment before setting it on the floor.
{% else %}
"Just tired. Long day."

"Thirty-one hours or something, right? You're insane." He says it like it's a compliment.

"Thirty-three now."

He laughs. You laugh. It doesn't explain anything.

"Go to sleep," he says. "Text when you're alive."

"Good night." You lean your head back against the wall.
{% endif %}

You plug the phone in on the floor beside you. The radiator ticks.
"""

  [[actions.effects]]
  type   = "change_stress"
  amount = -3

  [[actions.effects]]
  type = "set_game_flag"
  flag = "FIRST_NIGHT_CALLED_BACK_HOME"

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "week_one"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.next]]
  finish = true

[[actions]]
id    = "unpack_and_stage_tomorrow"
label = "Stage tomorrow anyway"
detail = "Bathroom kit. Charger. One outfit. Pretend preparation is the same as control."
prose = """
You unzip the carry-on on the bedroom floor and start working through it.

Toiletries in the bathroom cabinet. Charger by the outlet. Laptop on the kitchen counter. One blouse and one pair of underwear laid over the back of the chair — no closet system yet, but the clothes are out and accessible.

{% if w.hasTrait("AMBITIOUS") %}
The badge paperwork goes on top of the laptop. Shoes by the door. The carry-on gets repacked into a tight rectangle and pushed against the wall. Fifteen minutes, corner to corner.
{% elif w.hasTrait("ANALYTICAL") %}
Badge paperwork on the laptop, shoes by the door, phone charging beside the jacket. Each item positioned for tomorrow morning, not for comfort. The apartment doesn't feel settled, but the path from the bed to the door is clear.
{% else %}
Badge paperwork goes on top of the laptop. Shoes by the door. It's not much, but the room stops feeling like a problem for a few minutes.
{% endif %}

The apartment is still empty when you're done. The difference is that it looks like someone intends to wake up here on purpose.
"""

  [[actions.effects]]
  type   = "change_anxiety"
  amount = -2

  [[actions.effects]]
  type = "set_game_flag"
  flag = "FIRST_NIGHT_STAGED_TOMORROW"

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "week_one"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.next]]
  finish = true
