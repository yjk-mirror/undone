[scene]
id          = "base::workplace_first_night"
pack        = "base"
description = "First night in the empty apartment. The boxes aren't here. The city is outside. The bra problem is tonight's problem."

[intro]
prose = """
Unit 4B is empty.

You knew the boxes were not here yet. The shipping company said Monday. You confirmed Monday. The confirmation email is still in your inbox. None of that changes the fact of standing in an empty apartment with a carry-on bag and a body that has been awake for thirty-three hours.

The apartment is fine. Better than fine, actually: old floors, good light, a kitchen with real counter space, a bedroom big enough for more than a mattress if you ever get one in here. There is a radiator in the bedroom. It is not warm yet. Frank's wife said it takes a few minutes.

You set your carry-on down and do a circuit. Bedroom, kitchen, bathroom, living room. Furniture: Monday. Bedding: forgot. Towels: forgot. Food: obviously. You open a note on your phone and start typing.

{% if w.hasTrait("AMBITIOUS") %}
The list is organized in twenty minutes. Priority-ranked. You text the shipping company to confirm the Monday window before you remember it's 11 PM. You send it anyway.
{% elif w.hasTrait("DOWN_TO_EARTH") %}
The list is practical. You don't overthink it. You've slept on floors before. This is not the worst situation you've been in.
{% else %}
The list gets long. You look at it for a moment. Add *bra* and then look at that word sitting there between *food* and *towels*.
{% endif %}

Right. The bra problem.

You got through the day on forward momentum alone: airport, keys, landlord, deposit, the manageable fiction that logistics were the hard part. What you are wearing under your shirt is a sports bra from the airport gift shop, and it is not doing the job.

*Right. Okay.*
"""

[[intro_variants]]
condition = "w.getSkill('FEMININITY') < 15"
prose = """
Unit 4B is empty.

You knew the boxes weren't here. You'd confirmed the Monday window. The confirmation is in your email.

You set the carry-on down and do a circuit. Bedroom, bathroom, kitchen, living room, back to the door. You make a list on your phone. Furniture. Bedding. Food. Towels. You try to think of what you're forgetting.

*Bra*, you think, and then don't think anything for a moment.

Right. You don't — the list said *clothes*, generally, meaning Monday, meaning you'd had a vague plan to deal with *clothes* and hadn't extended that plan to include the specific practical reality of —

You add *bra* to the list. The word looks wrong in the note. You stare at it.

*On the list. Lists get solved.*
"""

[[thoughts]]
condition = "w.getSkill('FEMININITY') < 25"
style     = "inner_voice"
prose = """
You sit on the floor, because there is no furniture and the floor is clean enough, and look out at the city through the window. The building across the street has lit windows in a grid. Someone nearby is watching something with the sound too high. A siren moves through the neighborhood at a speed that says *not an emergency, just the city*.

Your reflection in the dark glass is someone you are still learning to recognize. The proportions. The hair. The way your shoulders fall. You tilt your head and the reflection tilts with you and for one second the distance between recognition and ownership feels measurable.
"""

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id    = "order_food_sleep"
label = "Order food and sleep"
detail = "Food. Phone charging on the floor. Eight hours. Tomorrow is tomorrow."
prose = """
You open the delivery app and order from the first Thai place with four stars and a fifteen-minute estimate. While you wait, you sit on the floor with your back against the wall and reread the email from your new manager: parking you do not need, badge pickup, the name of the person who will meet you in the lobby, all the ordinary details of a life that somehow did not pause for any of this.

The food arrives. You eat on the floor. The radiator has warmed up.

You charge your phone, roll your jacket into a pillow, and lie down on the floor of your bedroom. It's not comfortable. You're asleep in four minutes.

Tomorrow: shopping. The bra problem specifically. The rest of the list after that.
"""

  [[actions.effects]]
  type   = "change_stress"
  amount = -5

  [[actions.effects]]
  type   = "change_money"
  amount = -18

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "week_one"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.next]]
  finish = true

[[actions]]
id    = "research_bra_situation"
label = "Figure out the bra situation"
detail = "How hard can it be. Open a browser. Figure it out."
prose = """
You open your phone and start searching.

Forty minutes later you have learned that bra sizing is a system apparently designed by someone who found the metric system too merciful; that H-cup does not mean what you assumed it meant; that most department stores stop at DDD and then become theoretical; that specialty stores exist; that the specialty stores have names you are going to have to say out loud to a sales associate; and that you have, apparently, misunderstood underwire for your entire life.

You put your phone down.

{% if w.hasTrait("DOWN_TO_EARTH") %}
You add *department store, early* to your list. You'll tell them what you need in factual terms and get what works. Sleep first.
{% else %}
The city is outside being the city. Someone is honking. A dog is barking. You sit on the floor of your empty apartment and think about H-cups, specialty stores, and the number of times in your life you walked past a lingerie department without granting it a second of thought.

You add *specialty store??* to your list and go to sleep.
{% endif %}
"""

  [[actions.effects]]
  type   = "change_anxiety"
  amount = 3

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "week_one"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.next]]
  finish = true

[[actions]]
id    = "call_someone"
label = "Call someone back home"
detail = "There's a name in the contacts. You're not going to explain anything. You just need to hear a voice."
prose = """
You pick a contact without thinking too hard about it: Marcus, who you've known since grad school, who would pick up no matter what time it is.

He picks up on the second ring. "Hey, where'd you end up landing?"

"The city," you say. "Just got in."

"How's the apartment?"

"Empty. Boxes on Monday."

"Classic." A pause. "You okay? You sound weird."

{% if w.hasTrait("SHY") %}
"I'm tired," you say. Which is true. You leave it there. He lets you.

"Get some sleep," he says. "Text me when you're settled."

"Yeah," you say. "Yeah."

You hang up and hold the phone for a moment. You couldn't explain it even if you tried. You're not going to try.
{% else %}
"Just tired," you say. "Long day."

"Thirty-one hours or something, right? You're insane." He says it like it's a compliment.

"Thirty-three now," you say, and somehow that's the funniest thing either of you have said all week. He laughs. You laugh. It doesn't explain anything. It doesn't need to.

"Go to sleep," he says. "Text when you're alive."

"Yeah." You lean your head against the wall. "Good night."
{% endif %}

You plug your phone in on the floor beside you. The radiator ticks.
"""

  [[actions.effects]]
  type   = "change_stress"
  amount = -3

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "week_one"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.next]]
  finish = true
