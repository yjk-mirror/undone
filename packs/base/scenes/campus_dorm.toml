[scene]
id          = "base::campus_dorm"
pack        = "base"
description = "Camila's first night in the dorm. The body, what happens in the dark, the phone call home."

[intro]
prose = """
Janette arrived at two with her parents and a cheerful willingness to talk that Camila managed for about forty minutes before inventing a reason to take a walk.

It's after midnight now. Janette is asleep on her side of the room, one arm over her face, breathing the steady rhythm of someone who went to bed at eleven without apparent difficulty. The dorm is not quiet — down the hall someone's doing something that involves a lot of muffled laughing — but Camila's curtains are drawn and the room has settled into its own dark.

You've been lying here for an hour.

The problem is the dream. Not the one you're having — you haven't been asleep yet — but the one from the night before, and the night before that. You woke up last Tuesday knowing what you'd been dreaming and not being able to figure out what to do with the information. You'd been dreaming the way your body apparently dreams now, in the new grammar of this body, and you'd woken up with evidence of it and spent twenty minutes in the bathroom not thinking about it.

You're thinking about it now.

You trip over the pronouns in your own head and make yourself sit with the correction instead of rushing past it. The body is responding with a certainty you don't know how to explain, and the fact of that presses harder than the dorm mattress does.

Outside, someone laughs loud enough that Camila hears it through the wall. College. It's college. You're at college.
"""

[[thoughts]]
condition = "w.getSkill('FEMININITY') < 20"
style     = "anxiety"
prose = """
The want is there — clear, physical, undeniable — and it's not happening tonight. Not with another person in the room. Not when the meaning of it is still an open question. Blanket up. Ceiling.

The thing about shame is it doesn't argue. You can't reason with it. It just sits there saying *you know what this means* and you say *I don't know what it means* and it says *yes you do.*

You don't. You're not going to. Not tonight.
"""

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id    = "try_to_sleep"
label = "Try to sleep"
detail = "You're overthinking this. It's late. Sleep."
prose = """
You make yourself stop thinking about it with the force of will you've applied to everything else in your life, which is considerable, and eventually, sometime after 1 AM, you fall asleep.

You dream. You wake up at 6:30 with the understanding that whatever you were trying not to think about, your body has a position on the question and is prepared to be clear about it.

*Okay*, she thinks. *File it. Move on.*

You get up and shower and tell yourself it will make more sense when you're less tired.
"""

  [[actions.effects]]
  type   = "change_stress"
  amount = -3

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::campus_opening"
  to_state = "orientation"

  [[actions.next]]
  finish = true

[[actions]]
id    = "text_someone"
label = "Text someone from home"
detail = "You're not explaining anything. You just want to know someone's awake."
prose = """
You pick up your phone. It's 12:30, which is actually fine for the people you know from home, who are like that.

You text Marcus — not *your* Marcus, you keep having to remember the new geography of pronouns, the old friend Marcus, Raul's friend Marcus — and say: *you up?*

He responds in four seconds. *yeah, can't sleep either. college?*

*yeah*, she types.

*how's the room?*

You think about this. *fine. weird. the usual.*

*lol fair.* A pause. Then: *you good?*

{% if w.hasTrait("SHY") %}
You type *yeah* and send it and then lie there holding the phone and wishing you could explain it, and don't.
{% else %}
You type *getting there* and send it. Which is true. You think it's true.

*good*, he says. *get some sleep.*

You put the phone face-down. You're not going to explain it. You can't explain it. But you texted someone and someone texted back, and that's not nothing.
{% endif %}
"""

  [[actions.effects]]
  type   = "change_anxiety"
  amount = -2

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::campus_opening"
  to_state = "orientation"

  [[actions.next]]
  finish = true

[[actions]]
id    = "explore_it"
label = "Stay with it. See what you actually think."
detail = "You're alone. The lights are off. No one's watching. Figure out what this is."
prose = """
You lie in the dark for a while longer and let yourself think it through instead of away from.

*The old explanations don't help here*, you think, and then stop, because the thought doesn't go anywhere useful. The old explanations don't have much to say about the present situation.

The present situation is: you're attracted to men. The present situation is: this arrived without your permission and with considerable force. The present situation is: you're lying in a dorm room at a prestigious university thinking about a boy you saw on the quad for three seconds this afternoon and cannot remember his face but can remember the specific way he held a coffee cup.

*This is insane*, she thinks.

Then she thinks: *okay. but is it?*

You don't fall asleep for another hour. When you do, you don't have the other dream. You have a regular dream, about something forgettable. In the morning you decide this is neither resolution nor progress, just information, and you have orientation at nine.
"""

  [[actions.effects]]
  type   = "change_anxiety"
  amount = 4

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::campus_opening"
  to_state = "orientation"

  [[actions.next]]
  finish = true
