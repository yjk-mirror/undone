[scene]
id          = "base::campus_dorm"
pack        = "base"
description = "Camila's first night in the dorm. The body, what happens in the dark, the phone call home."

[intro]
prose = """
Janette arrived at two with her parents and a cheerful willingness to talk that you managed for about forty minutes before inventing a reason to take a walk.

It's after midnight now. Janette is asleep on her side of the room, one arm over her face, breathing the steady rhythm of someone who went to bed at eleven without apparent difficulty. The dorm is not quiet — down the hall someone's doing something that involves a lot of muffled laughing — but your curtains are drawn and the room has settled into its own dark.

You've been lying here for an hour.

The sheets are unfamiliar. The mattress is too soft in one spot and too hard in another. Sometime in the last few nights something started happening in your sleep, and the evidence of it has been there when you wake up — warmth that doesn't belong to the blanket, a tension low in your body that doesn't come from anxiety. You woke up last Tuesday with your heart going and your hands flat against your own stomach, and spent twenty minutes in the bathroom before going to class.

The laughing down the hall goes quiet. The building settles. Your body is still doing what your body is doing.
"""

[[thoughts]]
condition = 'w.getSkill("FEMININITY") < 20'
style     = "anxiety"
prose = """
There's warmth between your hips that has nothing to do with the blanket. You pull the covers up anyway. The ceiling is a rectangle of faint grey where light comes in around the curtains. You stare at it. The warmth doesn't go anywhere.

You roll onto your side. Janette's breathing is steady across the room. The ceiling is still there when you roll back.
"""

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id    = "try_to_sleep"
label = "Try to sleep"
detail = "You're overthinking this. It's late. Sleep."
prose = """
You make yourself stop moving, stop adjusting, stop paying attention to what your body is doing, and eventually — sometime after 1 AM — you go under.

You dream. You wake up at 6:30 and the sheets are warm in a way they weren't when you got into them.

You get up and shower and tell yourself it will make more sense when you're less tired.
"""

  effect = 'w.changeStress(-3); gd.advanceArc("base::campus_opening", "orientation");'

  [[actions.next]]
  finish = true

[[actions]]
id    = "text_someone"
label = "Text someone from home"
detail = "You're not explaining anything. You just want to know someone's awake."
prose = """
You pick up your phone. It's 12:30, which is actually fine for the people you know from home, who are like that.

You text Marcus and say: *you up?*

He responds in four seconds. *yeah, can't sleep either. college?*

*yeah*, you type.

*how's the room?*

You look at the dark ceiling. *fine. weird. the usual.*

*lol fair.* A pause. Then: *you good?*

{% if w.hasTrait("SHY") %}
You type *yeah* and send it and then lie there holding the phone, and don't type anything else.
{% else %}
You type *getting there* and send it.

*good*, he says. *get some sleep.*

You put the phone face-down on the mattress. The screen goes dark. The room is quiet again.
{% endif %}
"""

  effect = 'w.changeAnxiety(-2); gd.advanceArc("base::campus_opening", "orientation");'

  [[actions.next]]
  finish = true

[[actions]]
id    = "explore_it"
label = "Stay with it. See what you actually think."
detail = "You're alone. The lights are off. No one's watching. Figure out what this is."
prose = """
You lie on your back and stop trying to get away from it.

This afternoon, crossing the quad, there was a guy — dark jacket, coffee cup, heading somewhere — and something pulled in your chest the way things don't usually pull in your chest. You clocked it the way you'd clock a car accident. He was halfway across the green before the feeling caught up to itself.

The body has been keeping a record. It has been doing this for weeks, and the record is longer than you'd like it to be.

You stare at the ceiling for another hour. The building makes its sounds. Janette breathes. At some point the tension bleeds off into something closer to tired, and you go under.

In the morning there's orientation at nine.
"""

  effect = 'w.changeAnxiety(4); gd.advanceArc("base::campus_opening", "orientation");'

  [[actions.next]]
  finish = true
