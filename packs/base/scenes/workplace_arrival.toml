[scene]
id          = "base::workplace_arrival"
pack        = "base"
description = "First hours in the city. Airport exit, the ID that doesn't match, the ride to your new apartment."

# Content level: VANILLA — no sexual content.
# Two rounds of choices: (1) ID checkpoint, (2) transport.
# AlwaysFemale players skip the ID round and go straight to transport.

[intro]
prose = """
The seat belt sign clicks off.

Around you, people are already standing, pulling bags from overheads. A flight attendant in the aisle ahead is crouched at someone's row. The plane smells like recycled air and bad sleep.

You stand up. The overhead bin is higher than you remember overhead bins being. You reach for your carry-on and a man behind you gets to it first, lifts it down one-handed.

"Here you go."

{% if w.hasTrait("ANALYTICAL") %}
"Thanks." You take the bag. That's twice in the last minute someone has reached something for you without being asked. You file the pattern.
{% elif w.hasTrait("SHY") %}
"Thanks." It comes out quiet. He was being helpful. You take the bag and go.
{% else %}
"Thanks." You take the bag and keep moving.
{% endif %}

Jet bridge. Terminal. Big, bright, the kind of institutional lighting that doesn't care what time zone you're in. Signs for Ground Transportation, Baggage Claim, Rental Cars.

{% if not w.alwaysFemale() %}
At the exit checkpoint, the agent takes your ID. Looks at the photo. Looks at you.

**{{ w.beforeName() }}**, says the card. The face in the photo is not the face standing here. His hand pauses.
{% endif %}
"""

[[thoughts]]
condition = "!w.alwaysFemale() && w.getSkill('FEMININITY') < 20"
style     = "inner_voice"
prose = "*Okay.* Problems, in order. You keep reaching for things at the wrong height. Your voice is at a pitch you haven't mapped. Your hands are cold — they didn't get cold like this before. The city is tomorrow's problem. Tonight: keys, door, sleep."

# ── Round 1: The ID check ────────────────────────────────────────────

[[actions]]
id        = "id_preempt"
label     = "\"I know. I just look young.\""
detail    = "Get ahead of it."
condition = "!scene.hasFlag('id_done') && !w.alwaysFemale()"
prose = """
You say it before he can figure out the question.

{% if w.hasTrait("ANALYTICAL") %}
The sentence was prepared. You rehearsed it on the plane without realizing you were rehearsing. It worked. You'll use it again.
{% elif w.hasTrait("SHY") %}
You said it too fast — the words came out in a rush, but the tone was even. He blinks, looks at the ID again, looks at the line behind you.
{% elif w.hasTrait("CONFIDENT") %}
You say it the way you'd say something in a standup — clear, informational, moving on. He doesn't have a follow-up.
{% else %}
He looks at the card. Looks at you. The line behind you is getting longer.
{% endif %}

He waves you through.
"""

  [[actions.effects]]
  type = "set_scene_flag"
  flag = "id_done"

[[actions]]
id        = "id_wait"
label     = "Wait for him to work it out"
detail    = "It's your ID. He'll get there."
condition = "!scene.hasFlag('id_done') && !w.alwaysFemale()"
prose = """
He turns the card over. Looks at the photo again. You can see the math happening — the name, the face, the age that doesn't add up.

{% if w.hasTrait("CONFIDENT") %}
You wait. It's your ID. The answer is yes, and he'll arrive at it.
{% elif w.hasTrait("SHY") %}
The line behind you is growing. Someone shifts their weight. The guard opens his mouth.

"It's me," you say. "I just look young."
{% else %}
"I just look young," you say, when the silence has gone on long enough.
{% endif %}

He studies the card one more time. Waves you through.
"""

  [[actions.effects]]
  type = "set_scene_flag"
  flag = "id_done"

# ── Round 2: Transport ────────────────────────────────────────────────

[[actions]]
id        = "take_subway"
label     = "Take the subway"
detail    = "Platform B. Transfer at Central. The app says twenty-two minutes."
condition = "scene.hasFlag('id_done') || w.alwaysFemale()"
prose = """
The platform is underground and ten degrees cooler than the terminal. A transit map on the wall confirms what your phone already says: Platform B, transfer at Central, eleven stops.

The train arrives with a screech and a rush of displaced air. You board. The car is half full — evening commuters, a man with a bicycle wedged against the door, a woman reading a paperback with headphones in.

You find a seat near the door. Your bag goes on your lap because the overhead rack is a reach you'd rather not attempt in public.

{% if w.hasTrait("BEAUTIFUL") %}
A man across the aisle looks up when you sit down. The look lasts about two seconds — the automatic scan, the quick read — and then he's back on his phone. You're past it and into the next thought before the train starts moving.
{% endif %}

{% if w.hasTrait("OBJECTIFYING") %}
You know that look. The two-second read, the inventory. You've done it yourself, from the same kind of seat. You just didn't know it had a texture from this side.
{% endif %}

{% if w.hasTrait("SHY") %}
You keep your eyes on your phone. The train fills and empties at each stop. Nobody talks to you. Nobody expects anything. The city scrolls past the windows in strips of light, then goes underground, then comes back.
{% elif w.hasTrait("ANALYTICAL") %}
Eleven stops. You count them. The neighborhoods change through the windows — commercial, residential, a stretch of construction, then trees. Your station is the one after the park. The transit system makes sense.
{% endif %}

Twenty-two minutes. Your stop.

The building is a five-minute walk from the station. Four stories, brick, a bodega on the corner. The lockbox on the front door has your keys.

{% if w.hasTrait("AMBITIOUS") %}
*Okay.* Apartment. Unpack. Sleep. Monday.
{% else %}
You stand outside for a second with your bag and your keys and the cold air of a city you don't know yet.
{% endif %}
"""

  [[actions.effects]]
  type = "set_game_flag"
  flag = "ROUTE_WORKPLACE"

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "arrived"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.next]]
  finish = true

[[actions]]
id        = "call_a_cab"
label     = "Call a cab"
detail    = "Skip the subway. Forty dollars."
condition = "scene.hasFlag('id_done') || w.alwaysFemale()"
prose = """
You open your phone and request a ride. Forty dollars. You've been awake for thirty-one hours and you're not navigating a transit map right now.

The driver is a middle-aged man who asks where you're headed and then stops talking, which is exactly what you needed. The city scrolls past the window — downtown glass, a park, a stretch of fast food joints, then residential. Trees. Actual trees. Then the neighborhood the listing described as "up-and-coming," which looks about halfway through the process.

{% if w.hasTrait("ANALYTICAL") %}
You watch the neighborhoods change and build a mental map as they pass. The commercial strip near the station. The cross street with a bodega. Residential blocks with front stoops and small yards. There's a logic to this city. You'll learn it.
{% elif w.hasTrait("SHY") %}
The back seat of a cab is its own kind of quiet. Nobody looks at you. Nobody expects conversation. You watch the city go by and let your shoulders drop for the first time since the plane landed.
{% endif %}

The car stops in front of your building. Four stories, brick, a bodega on the corner.

"This is it," the driver says.

You get out into the early spring cold. The lockbox on the front door has your keys. The street is quiet. A cat watches you from a fire escape across the road.

{% if w.hasTrait("AMBITIOUS") %}
*Okay.* Keys. Address. Monday is three days away and you're going to be ready.
{% else %}
You stand there for a second with your bag and your keys and the fact of being here.
{% endif %}
"""

  [[actions.effects]]
  type   = "change_money"
  amount = -40

  [[actions.effects]]
  type = "set_game_flag"
  flag = "ROUTE_WORKPLACE"

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "arrived"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.next]]
  finish = true
