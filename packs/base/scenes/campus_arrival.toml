[scene]
id          = "base::campus_arrival"
pack        = "base"
description = "Camila arrives on campus. Move-in day. Being greeted as a girl for the first time in public."

[intro]
prose = """
Move-in day at the Ivy is a production. Parents with Volvos and Range Rovers double-parked along the quad, upperclassmen in university t-shirts holding clipboards, someone somewhere already playing music too loud for 10 AM. A banner over the gate: WELCOME CLASS OF 2032.

There's a check-in table under a white canopy near the main gate. A junior in a yellow t-shirt types names into a laptop and hands over lanyards with the efficiency of someone who has done this forty times this morning.

"Name?" the junior says to the person ahead of you. They answer. A lanyard slides across. The junior looks up at you.

{% if w.hasTrait("SHY") %}
You say the name. The junior types it without looking up, finds it, and hands over a lanyard and a campus map. "Aldrich Hall, room 214. Elevator's on the left. Welcome!" She's already looking past you before the lanyard is in your hand.
{% elif w.hasTrait("AMBITIOUS") %}
You say the name. The junior finds it, hands over the lanyard and a campus map. "Aldrich Hall, room 214. Elevator's on the left. Welcome!" You already know where Aldrich Hall is — east of the quad, second-tallest building in the residential cluster. The map goes in the bag.
{% else %}
You say the name. The junior types it, finds it, hands over a lanyard and a campus map. "Aldrich Hall, room 214. Elevator's on the left. Welcome!" The lanyard is light in your hand. The junior moves on to the person behind you.
{% endif %}
"""

[[intro_variants]]
condition = "w.getSkill('FEMININITY') < 15"
prose = """
Move-in day. The check-in table. The junior asks for a name, types it, and a lanyard slides across with a campus map. "Welcome!" she says, and means it, in the way someone means something they've said forty times today.

The campus is full of families doing the thing families do on move-in day: carrying boxes, pointing at buildings, taking photos. A woman nearby — someone's mother — glances over and smiles the way people smile at freshmen who look slightly lost.

The smile lasts a second. Then she's back to reading a map with her daughter.
"""

[[thoughts]]
condition = "w.getSkill('FEMININITY') < 50"
style     = "observation"
prose = """
The junior didn't pause. Didn't double-check the photo on the ID, didn't do the small recalibration you've clocked on faces before. Just typed, found it, handed it over.

Around you, other freshmen are doing the same thing — trading names for lanyards, folding campus maps, texting their parents they made it. Nobody is looking at you with the look that means anything. You're just another girl with a duffel bag on move-in day.
"""

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id    = "find_the_room"
label = "Find room 214"
detail = "Aldrich Hall. Second floor. Get your bearings."
allow_npc_actions = true
prose = """
The dorm is already half-chaos — doors propped open, the elevator slow and crowded, parents navigating hallways with boxes they can't see over. You take the stairs.

Room 214 is at the end of the hall. Your roommate isn't there yet — just furniture, a bare mattress on each side, and a window that looks onto a courtyard. You set your duffel down.

{% if w.hasTrait("POSH") %}
The furniture is institutional. You'd expected institutional. You pull out your phone and open the campus store app. Rug. Better lamp. Maybe a desk light that doesn't look like a hospital. You start a list.
{% elif w.hasTrait("DOWN_TO_EARTH") %}
The room is fine. You've slept in worse at lacrosse away games. You unzip the duffel and start putting things away.
{% else %}
You sit on the mattress. The springs are mediocre. Outside in the hall, someone is asking their parent to please just let them handle the boxes. The parent is not letting them. You look at the courtyard through the window and watch a squirrel dismantle someone's abandoned granola bar on the bench below.
{% endif %}
"""

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::campus_opening"
  to_state = "arrived"

  [[actions.next]]
  finish = true

# ── NPC Actions (resident advisor) ────────────────────────────────────

[[npc_actions]]
id     = "ra_checks_in"
label  = "The RA introduces herself"
weight = 8
prose = """
A knock on the open door. A junior — tall, natural hair, clipboard — leans in.

"Hey, I'm Priya, your RA. Just doing a quick check-in. You get the key okay?"

"Yeah," you say. "Thank you."

Priya glances at the room. "Your roommate's Janette — she's usually here by noon." She gives the spiel: quiet hours, common room, her door is always open, weekly study breaks on Wednesdays. She delivers it with the warmth of someone who's done it enough times to mean it.

{% if w.hasTrait("SHY") %}
You nod at the right moments. When Priya leaves you go back to unpacking and the hallway sounds a little less loud than before.
{% else %}
You ask one question — where's the nearest laundry — and Priya answers it and is gone in thirty seconds.
{% endif %}

You go back to unpacking.
"""

  [[npc_actions.effects]]
  type     = "advance_arc"
  arc      = "base::campus_opening"
  to_state = "arrived"

  [[npc_actions.next]]
  finish = true
