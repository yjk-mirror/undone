[scene]
id          = "base::opening_callback_transactional_defense"
pack        = "base"
description = "Dormant callback hook. Early defensive transactionality can later resurface in routine city interactions."

[intro]
prose = """
The bodega clerk holds the receipt over the counter and asks if you want it.

He is looking at a point somewhere past your shoulder. His hand is still out.

{% if gd.hasGameFlag("OPENING_ID_PREEMPTED") %}
At the airport you answered before the gate agent got the second question out. The response ready before the pause landed. The clerk's hand is still out.
{% elif gd.hasGameFlag("OPENING_ID_WAITED_OUT") %}
At the airport you held the gate agent's eye and let the silence go long enough that she moved on without the follow-up. The clerk's hand is still out.
{% else %}
The clerk's hand is still out.
{% endif %}

The bag is on the counter. The line behind you is short.
"""

[[actions]]
id     = "keep_it_narrow"
label  = "Keep it narrow"
detail = "Transaction first. Everything else later."
prose  = """
"No thanks." You take the bag and step left around the person coming in.

The door swings shut. The street is cold and loud and does not ask you anything.
"""

  [[actions.effects]]
  type = "set_game_flag"
  flag = "OPENING_CALLBACK_TRANSACTIONAL_DEFENSE"

  [[actions.next]]
  finish = true
