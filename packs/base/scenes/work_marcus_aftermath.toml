[scene]
id          = "base::work_marcus_aftermath"
pack        = "base"
description = "Monday morning. The office. After what happened with Marcus. The normality of the building and the abnormality of what happened in it."

# Post-marcus_closet. The professional mask and what's behind it.
# The other people don't know. The question: can the mask hold?
# NOT explicit. Tension, consequences, the weight of a shared secret.

[intro]
prose = """
Monday.

The elevator is the same elevator. The lobby is the same lobby. Badge beep, the same as every other morning. The open floor plan stretches out — desks, monitors, the low hum of people arriving, coffee already going in the kitchen.

Marcus is at his desk. You can see the back of his head from here. He's typing. Same posture as every other Monday. Same shoulders. Same angle.

{% if w.getSkill("FEMININITY") < 30 %}
His hands on you. The conference room door. The thirty seconds between the latch clicking and anything else. Your stomach tightens and you keep walking and nobody in this room knows a thing.
{% elif w.getSkill("FEMININITY") < 50 %}
The walk to your desk is the same walk. Bag on your shoulder, same nod to the same receptionist. Everything is the same except the man sitting thirty feet from your monitor.
{% else %}
The conference room door is down the hall. Closed. Just a door.
{% endif %}

Dan is at his desk. He says good morning. Good morning back. Screen on. Slack has forty unread. The week starts.
"""

[[thoughts]]
condition = 'w.getSkill("FEMININITY") < 40'
style     = "observation"
prose     = "Same floor. Same desk. Same badge on the lanyard."

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id     = "act_normal"
label  = "Act normal"
detail = "Professionalism. The mask holds."
prose  = """
You work. Slack messages answered. Kevin's PR reviewed — two comments that need addressing, otherwise fine. Coffee at your desk. Normal.

{% if w.hasTrait("AMBITIOUS") %}
The accounting has been running since the elevator. Nobody suspects. Marcus is at his desk and his posture is the same it always is and the work is the same work. The conference room. His hand on your jaw. The sound he made. You close it. Give Kevin's PR another pass. By ten o'clock you've cleared seventeen messages, your calendar is blocked through lunch, and the morning is holding.

{% elif w.hasTrait("ANALYTICAL") %}
Typing speed: normal. Slack response length: normal. Eye contact with Dan: the right amount, the right duration, the right amount of small talk about the weekend.

At 10:15 Marcus walks past your desk toward the kitchen. He doesn't stop. He doesn't look. You don't look. Both of you are fluent in the not-looking.

At 10:23: **Marcus**: *Reviewed the Chen proposal. Your numbers are better than mine. Sending updated deck.* The attachment opens. The numbers are real. The work is real.

{% elif w.hasTrait("CONFIDENT") %}
Monday morning. Laptop open, coffee from the kitchen, the standup at nine-fifteen. The work hasn't changed.

At 10:15 Marcus walks past and you look up and your eyes meet for exactly one second and his face says nothing and your face says nothing and the second passes. Clean.

{% else %}
The morning moves. Marcus walks past to get coffee and you don't look up and then he's past and nobody noticed because there was nothing to notice.

He sends a Slack about the Chen proposal. Business. You respond with business. Four messages. Nothing underneath it shows.
{% endif %}

{% if w.getSkill("FEMININITY") < 30 %}
At 11:00 you go to the bathroom and stand in the stall for thirty seconds longer than you need to. His hand. The door. The sound of his breath. All of it still right here, running under the fluorescent normalcy of the floor.

You flush. Wash your hands. Go back to your desk.
{% endif %}
"""

  [[actions.effects]]
  type = "set_game_flag"
  flag = "MARCUS_AFTERMATH"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.effects]]
  type   = "change_stress"
  amount = 2

  [[actions.next]]
  finish = true

[[actions]]
id     = "find_him"
label  = "Find him"
detail = "You need to know where they stand. Not feelings. Logistics."
prose  = """
You wait until 10:30. Standup done, first round of coffee cleared. You walk to the kitchen and Marcus is there — refilling his mug, back to the door.

"Hey," you say.

He turns. His face does something fast and then it does nothing. "Hey."

{% if w.hasTrait("CONFIDENT") %}
"We should talk about Friday," you say. No hedge.

He sets the mug down. Checks the kitchen doorway — sightline clear — then looks back at you. "Yeah."

"Not here."

"Lunch?"

"The place on Third."

"Noon."

You nod, take your coffee, go back to your desk. Sixteen words. He'll be at the place on Third at noon.

{% elif w.hasTrait("AMBITIOUS") %}
"Are we okay?" you ask. Meaning: at work. Meaning: does this change Monday.

He reads it. "We're fine." Meaning: nobody knows. Meaning: I'm not making this a problem.

"Good."

Twelve seconds. You take your coffee back. The ambiguity is narrower now, which is what you needed.

{% elif w.hasTrait("ANALYTICAL") %}
"I'm running the variables," you say. Marcus stares at you for a second.

"And?"

"The primary risk is behavioral. If we change how we interact on the floor, people notice." You're holding your mug with both hands. "So we don't change."

He considers this. "Agreed."

"The secondary risk is repetition."

A beat. "Is that a risk?"

You don't answer. You take your coffee and go.

{% else %}
"Are we —" You don't finish. Marcus looks at you and waits. The kitchen is empty but it won't stay that way.

"We're good," he says. Quiet. Certain. "The work doesn't change."

"Okay."

"Okay."

Three seconds too long and then you take your coffee and go.
{% endif %}

{% if w.getSkill("FEMININITY") < 30 %}
Three feet away from him in the kitchen. He smells the same as he did Friday. Your body responds to it the same way it did then.
{% endif %}
"""

  [[actions.effects]]
  type = "set_game_flag"
  flag = "MARCUS_AFTERMATH"

  [[actions.effects]]
  type  = "add_npc_liking"
  npc   = "m"
  delta = 1

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.effects]]
  type   = "change_stress"
  amount = -2

  [[actions.next]]
  finish = true

[[actions]]
id     = "avoid_him"
label  = "Avoid him"
detail = "Not ready. Reroute through the day. Minimize contact."
prose  = """
Long way to the kitchen — around the back of the floor, past the server room, the route that doesn't pass his desk. Coffee timed for when he's in standup. Lunch at your desk.

{% if w.hasTrait("SHY") %}
The precision of it would be impressive if anyone could see it, which is the point — no one can. Kitchen at 9:15, standup at 10, lunch at 12:30 at the Thai place or 1:00 at his desk. You build your day around the gaps.

By 3 PM you haven't been in the same room as Marcus since 9 AM. The distance doesn't help. He's thirty feet away and the conference room door is still a door.

{% elif w.hasTrait("ANALYTICAL") %}
The constraint problem: minimize unplanned proximity while maintaining normal work patterns. The constraints include his schedule, the kitchen, the bathroom route, and three meetings you're both in.

The 11 o'clock meeting is unavoidable. Marcus is across the table. You pull up the slides. The meeting runs normally because meetings have structure and structure is what you need right now. He asks a question about the timeline. You answer it. His voice is his voice. The meeting ends.

{% elif w.hasTrait("AMBITIOUS") %}
Avoidance is a strategy, not a retreat. Monday is for getting your read back. By Tuesday you'll know how to walk past his desk without the conference room following you.

He sends a Slack at 2 PM: the Chen numbers. You respond in three minutes. A question about the projections. Professional. Clean.

{% else %}
Coffee at the wrong time. Lunch at your desk. The bathroom on the other floor. At 3 PM Marcus walks past and you're looking at your screen and his shadow crosses the edge of your monitor and your hands stop typing for one second and start again.
{% endif %}

{% if w.getSkill("FEMININITY") < 30 %}
Every time you pass the conference room. Every time his voice carries across the floor.

You get through Monday.
{% endif %}
"""

  [[actions.effects]]
  type = "set_game_flag"
  flag = "MARCUS_AFTERMATH"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.effects]]
  type   = "change_stress"
  amount = 3

  [[actions.next]]
  finish = true
