[scene]
id          = "base::workplace_first_clothes"
pack        = "base"
description = "Shopping for work clothes. The department store, the dressing room, the mirror. The gaze arrives before you're ready for it."

[intro]
prose = """
You find the department store by searching *bra fitting near me* and taking the highest-rated result that does not require a train. It is still a fifteen-minute walk. Close enough.

Sunday morning. The store is half-empty, the good light from the tall windows hitting the displays. You take the escalator to the second floor and follow the signs.

The lingerie department is in the back, which you have already learned is always where it is, as if the store would prefer not to acknowledge it too directly. A sales associate with reading glasses on a chain and an expression of complete professional equilibrium looks up when you approach.

"Hi. I need help with sizing."

"Sure." She looks at you with the practiced clinical look, not the other kind, and names a section. "Starting there. Your measurements, or you haven't been fitted?"

"Haven't been fitted."

"Okay. I can do that. Two minutes."

{% if w.hasTrait("SHY") %}
You stand very still for the measurement. The associate is brisk, efficient, and utterly uninterested in making the moment larger than it is. You are still slightly mortified.
{% elif w.hasTrait("POSH") %}
You submit to the measurement with the awareness that you are in a department store rather than somewhere with a fitting room that has natural light. You don't say this. It's not relevant.
{% elif w.hasTrait("DOWN_TO_EARTH") %}
The measurement takes ninety seconds. You watch the associate write a number down. Same as you expected from last night's research. Good. Information is useful.
{% else %}
Two minutes is approximately right. The associate writes something and says "okay" and leads you to a rack with the specific efficiency of someone who has been told a number and knows where the numbers live.
{% endif %}
"""

[[intro_variants]]
condition = "w.getSkill('FEMININITY') < 20"
prose = """
You find the department store. Nine AM. You are the first customer in the lingerie section.

The associate who helps you has been doing this for approximately forever and does not make a single thing about it. She measures. She says a number. She says *follow me* and leads you to a rack of options with the efficiency of a professional who knows exactly where the numbers live.

You follow. Your face is neutral. Your hands are in your pockets because you don't know what else to do with them.
"""

[[thoughts]]
condition = "w.getSkill('FEMININITY') < 20"
style     = "inner_voice"
prose = """
Dressing room. Door closed. Four options on the hook.

You put on the first one. The clasp is in the back. Your fingers find it on the second try. Something tightens and settles and you look down and — *oh.* That's what it does.

The second one is different. Different shape, different support. You didn't know there were different shapes. You are learning that there are different shapes.
"""

[[thoughts]]
condition = "w.getSkill('FEMININITY') < 25"
style     = "inner_voice"
prose = """
The dressing room mirror is well-lit and angled in a way you have not seen yet. Fluorescent overhead, three-panel setup, nowhere to hide in it.

Your collarbones. Your waist. The way the fabric sits across your chest. Two days ago you were on a plane and this body was still a series of logistics. Now it's in a department store dressing room and the light is very, very honest.
"""

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id    = "get_basics"
label = "Get what you need, efficiently"
detail = "Bras, underwear, basics. In and out. You have a list."
allow_npc_actions = true
prose = """
You spend forty minutes and come out with three bras, a week of underwear, a pair of dress pants that need only minimal alteration, two work blouses, and a sweater. You pay. The total is more than you expected and exactly what you should have expected.

Outside the store, you check the list on your phone. The most urgent items are crossed off. You get coffee from the Dunkin' across the street instead of the independent place with the Sunday line and drink it on the walk back.

Boxes Monday. Work Monday. You're ahead of schedule, approximately.
"""

  [[actions.effects]]
  type   = "change_money"
  amount = -180

  [[actions.effects]]
  type   = "change_stress"
  amount = -4

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "clothes_done"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 5

  [[actions.next]]
  finish = true

[[actions]]
id    = "dwell_on_mirror"
label = "Take a minute in the dressing room"
detail = "The mirror. You've been avoiding this. You don't have to, particularly."
prose = """
You stay in the dressing room longer than you need to.

The mirror is what it is: full length, well lit, impossible to negotiate with. The dress pants sit on your hips differently than any pants have sat before. The blouse buttons the wrong way. You fasten it anyway.

{% if w.hasTrait("OVERACTIVE_IMAGINATION") %}
You think about Monday. You, in the office, in the dress pants and the work blouse. The manager's face when you say *I know, I wrote that spec.* You've practiced this face in your head so many times that you almost know what it looks like. You think you look competent. You hope you look competent. You decide to look competent regardless.
{% elif w.hasTrait("DOWN_TO_EARTH") %}
You note what's true. You don't spend time on it that you don't have. You get dressed and take the practical items to the register.
{% else %}
The person in the mirror looks like someone you might pass on the street without a second thought. Average height. Brown hair. Professional clothes that fit correctly. Ready for Monday. That is enough.

You take what you need to the register.
{% endif %}
"""

  [[actions.effects]]
  type   = "change_money"
  amount = -180

  [[actions.effects]]
  type   = "change_anxiety"
  amount = 2

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "clothes_done"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 5

  [[actions.next]]
  finish = true

# ── NPC Actions ────────────────────────────────────────────────────

[[npc_actions]]
id        = "shopper_notices"
label     = "A man in the aisle notices her"
weight    = 6
condition = "!scene.hasFlag('noticed')"
prose = """
You are comparing two options, same brand and different cut, when you become aware of a man at the edge of your peripheral vision.

He's shopping, technically. He has a bag. He's looking at you. The two-second look, the held gaze that's slightly too long.

{% if w.getSkill("FEMININITY") < 25 %}
Something warm moves through your stomach before you've decided what to think about it. Your skin prickles. You don't turn toward him and you don't turn away and you stand very still until it passes.
{% endif %}

He moves on. The store continues at its Sunday pace. You pick the one on the left.
"""

  [[npc_actions.effects]]
  type = "set_scene_flag"
  flag = "noticed"

  [[npc_actions.next]]
  goto = "get_basics"
