[scene]
id          = "base::workplace_first_clothes"
pack        = "base"
description = "Shopping for work clothes. The department store, the dressing room, the mirror. The gaze arrives before you're ready for it."

[intro]
prose = """
Nine AM. The department store is mostly empty, the morning light cutting across the displays in long rectangles. You take the escalator to the second floor. Signs overhead: lingerie, foundations, intimates.

The shirt you have on is a men's medium. The sleeves come past your knuckles. The jeans are belted twice and still sit wrong on your hips. You've been wearing variations of this for two days.

The lingerie department is in the back. A sales associate with reading glasses on a chain looks up from a display and holds a measuring tape.

{% if w.hasTrait("SHY") %}
The tape comes off, two numbers go on a card without comment. The associate's expression has the complete neutrality of someone who has done this ten thousand times. Your face goes hot anyway. You stand with your arms out and wait for it to be over.
{% elif w.hasTrait("POSH") %}
Two numbers on a card, then a rack at the back of the section. The store is fine. It is not somewhere you would have come before. You follow the associate past the displays.
{% elif w.hasTrait("DOWN_TO_EARTH") %}
Two numbers on a card. Ninety seconds. You look at the card. The number matches the one from last night's research.
{% else %}
Two numbers on a card, then a rack at the back of the section. The associate moves with the efficiency of someone who has been told a measurement and knows exactly where those measurements live.
{% endif %}
"""

[[intro_variants]]
condition = 'w.getSkill("FEMININITY") < 20'
prose = """
Nine AM. The department store is mostly empty, the morning light cutting across the displays in long rectangles. You take the escalator to the second floor. Signs overhead: lingerie, foundations, intimates.

The shirt you have on is a men's medium. The sleeves come past your knuckles. The jeans are belted twice and still sit wrong on your hips. You've been wearing variations of this for two days.

The lingerie department is in the back. A sales associate with reading glasses on a chain looks up from a display and holds a measuring tape. She reads it, writes a number on a small card, and leads you to a rack without making it anything other than that.

The rack holds maybe forty options. You put your hands in your pockets.
"""

[[thoughts]]
condition = 'w.getSkill("FEMININITY") < 20'
style     = "observation"
prose = """
Dressing room. Door closed. Four options on the hook.

The clasp goes in the back. Your fingers find it on the second try. Something tightens across your chest and the weight shifts — sitting differently now, held. You look down at your hands. They look small against the fabric.

The second one is a different shape. Different band, different cup, different where the pressure lands. Four options, four shapes. There is apparently a whole vocabulary here.
"""

[[thoughts]]
condition = 'w.getSkill("FEMININITY") < 25'
style     = "observation"
prose = """
The dressing room has a three-panel mirror and a fluorescent overhead. The angle catches your side profile whether you want it or not.

Your collarbones sit differently than you expect. The bra band leaves a faint pink line across your ribs where it rested. The fabric of the blouse pulls slightly at the chest and hangs loose at the waist. In the left panel your hips make a shape that doesn't match the pants you came in wearing.
"""

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id    = "get_basics"
label = "Get what you need, efficiently"
detail = "Bras, underwear, basics. In and out. You have a list."
allow_npc_actions = true
prose = """
Forty minutes. Three bras, a week of underwear, dress pants that fit close enough, two work blouses, a cardigan. The register total comes up higher than your estimate. You tap the card and don't do the math until you're outside.

The list on your phone. Most of the urgent line is checked off. There's a Dunkin' across the street with no line, and you get coffee there instead of the independent place on the corner with its Sunday crowd and take it on the walk back.

The bags hit your knees with each step. Your new shoes have a heel, just enough to change the weight distribution, and the pavement feels different under them.
"""

  [[actions.effects]]
  type   = "change_money"
  amount = -180

  [[actions.effects]]
  type   = "change_stress"
  amount = -4

  [[actions.effects]]
  type = "set_game_flag"
  flag = "FIRST_CLOTHES_FUNCTIONAL"

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "clothes_done"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 5

  [[actions.next]]
  finish = true

[[actions]]
id    = "dwell_on_mirror"
label = "Take a minute in the dressing room"
detail = "The mirror. You've been avoiding this. You don't have to, particularly."
prose = """
The dressing room has a three-panel mirror and a hook with six options on it. The dress pants go on first. They sit on your hips differently than pants have sat before — lower, following a curve. The blouse buttons left over right. You fasten each button slowly, top to bottom.

{% if w.hasTrait("OVERACTIVE_IMAGINATION") %}
You turn sideways in the left panel and the office is suddenly very present: the open-plan floor, the glass-walled conference room, the manager with the email responses that clock in at six words. The shoulder seam sits flush. The collar is flat. The blouse fits the way a Monday blouse should fit.
{% elif w.hasTrait("DOWN_TO_EARTH") %}
Shoulder seam sits flush. The pants break at the ankle. The blouse drapes right across the chest. You hang the rejects back on the hook and carry the rest out.
{% else %}
The mirror shows the blouse's collar sitting flat, the pants hem landing just above the floor, the fabric smooth across both shoulders. You turn to check the side. The line is clean.

You carry the stack to the register.
{% endif %}
"""

  [[actions.effects]]
  type   = "change_money"
  amount = -180

  [[actions.effects]]
  type   = "change_anxiety"
  amount = 2

  [[actions.effects]]
  type = "set_game_flag"
  flag = "FIRST_CLOTHES_MIRROR"

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "clothes_done"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 5

  [[actions.next]]
  finish = true

[[actions]]
id    = "ask_for_help_outright"
label = "Ask for full help"
detail = "Tell her what you actually need: a workweek, not one bra."
prose = """
"I need enough for a first week at a new office," you tell the associate. "Basics, work clothes. I don't know where to start."

The measuring tape goes down on the counter. A notepad comes up.

"What's the dress code? Do you have a color preference?"

The next forty-five minutes run at the associate's pace. Blouses appear in sets of three — one to keep, one maybe, one back on the rack. Pants in two cuts. A blazer pulled from a rack one section over. You step in and out of the dressing room and answer yes and no and the selection adjusts accordingly.

{% if w.hasTrait("SHY") %}
A hand on your shoulder steers you into better dressing room light to check a seam. Your whole body goes rigid for a second, and then the moment's already past. The associate is looking at the shoulder line, not at you.
{% elif w.hasTrait("DOWN_TO_EARTH") %}
By the third blouse you've stopped second-guessing the color choices and started just asking which one holds its shape after washing.
{% endif %}

You leave with a full bag and a smaller version of the problem than the one you walked in with.
"""

  [[actions.effects]]
  type   = "change_money"
  amount = -240

  [[actions.effects]]
  type   = "change_stress"
  amount = -5

  [[actions.effects]]
  type = "set_game_flag"
  flag = "FIRST_CLOTHES_ASKED_HELP"

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "clothes_done"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 6

  [[actions.next]]
  finish = true

[[actions]]
id    = "buy_minimum_and_leave"
label = "Buy the minimum and leave"
detail = "One bra. One blouse. Enough to survive Monday."
prose = """
One bra, well-fitted enough. One blouse in a neutral color that drapes correctly across the chest. One backup pair of underwear. You take the three items to the register and pay before you can extend the list.

{% if w.hasTrait("ANALYTICAL") %}
The rest can wait until after Monday when you have a better read on the dress code. One data point is not enough to shop from.
{% else %}
The rest can wait. Three items solve the immediate problem. You step out into the Sunday street with a small bag and the rest of the afternoon free.
{% endif %}

The store's automatic doors close behind you. The street is bright and quiet.
"""

  [[actions.effects]]
  type   = "change_money"
  amount = -95

  [[actions.effects]]
  type   = "change_anxiety"
  amount = -1

  [[actions.effects]]
  type = "set_game_flag"
  flag = "FIRST_CLOTHES_MINIMUM"

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "clothes_done"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 3

  [[actions.next]]
  finish = true

# ── NPC Actions ────────────────────────────────────────────────────

[[npc_actions]]
id        = "shopper_notices"
label     = "A man in the aisle notices her"
weight    = 6
condition = '!scene.hasFlag("noticed")'
prose = """
You are holding two options — same brand, different cut — when a man stops near the end of the aisle. He has a bag over one shoulder. He is not shopping. He is looking at you with the particular quality of attention that has a duration.

{% if w.getSkill("FEMININITY") < 25 %}
Your hands go still on the fabric. The back of your neck prickles. He holds it another second and then moves off toward the escalator.
{% endif %}

He rounds the corner. The aisle goes quiet again. You put one blouse back on the rack and keep the other.
"""

  [[npc_actions.effects]]
  type = "set_scene_flag"
  flag = "noticed"

  [[npc_actions.next]]
  goto = "get_basics"
