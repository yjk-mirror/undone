[scene]
id          = "base::work_marcus_late"
pack        = "base"
description = "Office at 8 PM. Most people gone. Marcus is still here too."

[intro]
prose = """
8 PM, and the floor is mostly dark.

Half the overhead panels switched off an hour ago. Your station is an island — monitor, task lamp, a sticky note about a deploy window you've been ignoring since five. The building settles in a way it doesn't during the day. A duct pops above the drop ceiling. The elevator makes a sound two floors up.

You're finishing something. You were going to finish by seven, then seven-thirty. Now it's eight and the code is almost right.

Footsteps down the hall. Wrong gait for the guard, wrong shoes. They stop at your row.

"Thought I was the only one."

Marcus. Jacket still on — he was about to leave. Coffee cup from the machine down the hall — he wasn't.

{% if w.getSkill("FEMININITY") < 30 %}
His voice carries differently with no one else on the floor. You keep your eyes on the monitor.
{% elif w.getSkill("FEMININITY") < 50 %}
During the day this floor has eleven people on it. Right now it has two.
{% endif %}
"""

[[intro_variants]]
condition = 'w.hasTrait("AMBITIOUS")'
prose = """
8 PM, and the floor is mostly dark.

Half the overhead panels switched off an hour ago. Your station is an island: monitor, task lamp, the deploy window that became tonight's problem. The plan was to leave by seven. At six you found the race condition in the integration layer. Now it's eight and you've fixed the race condition and you're not leaving until the tests pass clean.

The building settles. A duct somewhere above the ceiling. The elevator two floors up.

Footsteps. Not the guard. They stop at the end of your row.

"Thought I was the only one still here."

Marcus. Jacket still on. Coffee from the hall machine. He was about to leave and then didn't.

{% if w.getSkill("FEMININITY") < 30 %}
His voice carries differently with no one else on the floor. Your eyes stay on the screen.
{% elif w.getSkill("FEMININITY") < 50 %}
During the day this floor has eleven people and their noise. Right now it has two.
{% endif %}
"""

[[thoughts]]
condition = 'w.getSkill("FEMININITY") < 35'
style = "observation"
prose = "The floor is empty. Marcus's voice carries differently without the daytime noise."

# ── Actions ────────────────────────────────────────────────────────────────────

[[actions]]
id     = "keep_working"
label  = "Keep working"
detail = "You're almost done. He can find somewhere to be."
prose  = """
"Almost done," you say, and leave it at that.

He doesn't take it as a cue to leave. He pulls a chair from the nearest empty desk — not to your station, a few feet away — and opens his laptop. Settled, not crowding.

{% if w.hasTrait("AMBITIOUS") %}
Fine. Better than fine — someone else pulling a late night means the thing you're finishing has company. You open the terminal.
{% elif w.hasTrait("ANALYTICAL") %}
Far enough to be professional. Close enough that you can hear his keyboard when he types. The distance was chosen.
{% elif w.hasTrait("SHY") %}
You look at your monitor. The code is right there. You were almost done.
{% else %}
You go back to your code. He goes to his. The floor is quiet enough that you can hear the difference in your keyboard cadences.
{% endif %}

Twenty minutes. Maybe thirty. The tests come back green. You sit back.

He's still typing. The reflection of his screen shows in the window — not the content, just the glow.

{% if w.getSkill("FEMININITY") < 30 %}
You know exactly where he's sitting. The awareness of it has been in your shoulders this whole time.
{% endif %}

You pack up without making it a production. He looks up. "Night," he says, and goes back to his screen.

You get in the elevator. The lobby is empty. The cold outside hits fast.
"""

  effect = 'gd.setGameFlag("MARCUS_LATE_NIGHT"); w.skillIncrease("FEMININITY", 2);'

  [[actions.next]]
  finish = true

[[actions]]
id     = "take_a_break"
label  = "Take a break. You've earned it."
detail = "The vending machines are down the hall. He's already heading that way."
prose  = """
"Good timing," you say. "I need to step away from this for ten minutes."

{% if w.hasTrait("AMBITIOUS") %}
True — the tests are running anyway. You're waiting, not procrastinating.
{% endif %}

The vending hall is two floors up. The elevator ride is short enough to not require conversation. He holds the door. You don't make anything of it.

The machines are frosted-front models with the little rotating shelves. The floor up here is carpeted, which feels wrong on a weeknight — too quiet, too formal. He gets something from the top row without checking the labels. You pick what you actually want.

He leans against the wall the way he does in the break room — settled, cup in one hand. The break room has eleven people's worth of ambient noise. Up here it's just the refrigerated hum and the building doing its thing.

"What are you finishing?" he asks.

{% if w.hasTrait("ANALYTICAL") %}
Not making conversation — acquiring information. You give him the actual answer: the integration issue, the race condition, the three hours that became eight. He listens the way he does in meetings when someone is actually saying something worth hearing.

When you finish he says, "That's a better fix than the workaround Priya put in last quarter." A pause. "She knows it too."

You didn't know that. He just handed you something useful for free.

{% elif w.hasTrait("SHY") %}
You tell him. More than you meant to — the context comes out before the summary, and then you're explaining the workaround you chose not to take. He doesn't look bored. He asks one question that goes straight to the problem and then nods.

"Yeah," he says. Not a compliment. Just: yeah, that's the problem, and you found it.

The silence after isn't comfortable exactly. But it doesn't need to be filled, either.

{% elif w.hasTrait("AMBITIOUS") %}
You give him the shape of it — the deploy window, the race condition, the fix. He listens, then: "Is that going to hold under concurrent writes?"

Real question. You think about it for three seconds. "Yes. Different lock scope."

"Okay." He nods. That's it — he wanted to know if the fix was solid, and now he knows. His elbow shifts against the wall.

{% else %}
You tell him what you've been fixing. He asks a question that goes somewhere it didn't have to go — into the architecture, the tradeoff you chose, what you'd have done with more time. The conversation turns technical before either of you decided to let it.

Eleven minutes. You come out with a cleaner read on a dependency you hadn't fully mapped.

{% endif %}

On the elevator down, the floor numbers tick. Neither of you fills the silence.

{% if w.getSkill("FEMININITY") < 50 %}
His shoulder is close enough that half a step would close it. The elevator opens.
{% endif %}

You finish the tests in another twenty minutes. He's still there when you pack up. He looks up. You say good night. He says good night.

The lobby is empty. You walk to the subway and sit with your bag on your lap and look at nothing.
"""

  effect = 'gd.setGameFlag("MARCUS_LATE_NIGHT"); w.skillIncrease("FEMININITY", 2); npc("m").addLiking(2);'

  [[actions.next]]
  finish = true

[[actions]]
id     = "call_it_a_night"
label  = "Call it a night"
detail = "The code can wait until tomorrow. You're done."
prose  = """
"I was just wrapping up," you say. Near enough to true.

{% if w.hasTrait("AMBITIOUS") %}
You look at the terminal. The tests aren't done. You save the state and close the lid. Tomorrow is early.
{% endif %}

You pack up with the efficiency of someone who's done this long enough to have a system: laptop, charger, badge clipped to the bag. He steps back to give you room. Not crowding — just out of the way.

"Night," you say.

"Night."

{% if w.hasTrait("SHY") %}
You don't look back. The hall is long. The elevator takes too long to arrive and you stand facing the doors and listen to him settle back into his chair.
{% else %}
The elevator is empty. The lobby is empty. The cold hits as soon as you push through the door.

Four blocks to the subway. The trains are on the late schedule. You get there just as one is pulling out and wait on the platform with two other people for the next.
{% endif %}

{% if w.getSkill("FEMININITY") < 50 %}
The building is two blocks behind you. His light was still on on the fourth floor. You caught it through the glass on the way out.
{% endif %}
"""

  effect = 'gd.setGameFlag("MARCUS_LATE_NIGHT"); w.skillIncrease("FEMININITY", 2);'

  [[actions.next]]
  finish = true
