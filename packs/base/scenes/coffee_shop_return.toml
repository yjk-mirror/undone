[scene]
id          = "base::coffee_shop_return"
pack        = "base"
description = "Back at the coffee shop. Jake is there. The question of whether you're going to be someone who acknowledges him."

[intro]
prose = """
The coffee shop on Union and Third. Same mismatched chairs, same chalkboard menu. The barista with the sleeve tattoos is running two drinks at once without looking flustered. You didn't come here for Jake — you came for coffee. But he's at the second table from the door, laptop open, coffee half-empty, not looking up. Settled in like he was here an hour before you arrived.
"""

[[intro_variants]]
condition = 'w.getSkill("FEMININITY") < 20'
prose = """
The coffee shop on Union and Third. Same mismatched chairs, same chalkboard menu. You didn't come here for Jake — you came for coffee. But he's at the second table from the door, laptop open, not looking up.

Your hands find the strap of your bag. The line is short. The chalkboard menu is already memorized.
"""

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id                = "acknowledge_him"
label             = "Catch his eye on the way to the counter"
detail            = "He nods. You nod. The thing is acknowledged."
allow_npc_actions = false
prose = """
You catch his eye on the way to the counter — the half-second of recognition, a nod from him and one from you. Clean.

You order, you wait. The owner writes nothing on the cup.

On your way out he glances up. "Hey — you come here a lot?" Not a line. The tone of someone noting a fact.

"Most mornings," you say, which is close enough to true.

"Good taste," he says, and goes back to his screen.

{% if w.getSkill("FEMININITY") < 35 %}
Your face is warm for the next half-block. The coffee is still good.
{% endif %}
"""

  effect = 'w.skillIncrease("FEMININITY", 1); npc("m").addLiking(1);'

  [[actions.next]]
  finish = true

[[actions]]
id        = "sit_near_him"
label     = "Take the table next to his"
detail    = "You've already met. This isn't a thing."
condition = 'gd.npcLikingAtLeast("ROLE_JAKE", "Ok")'
prose = """
You take the table next to his — the one by the window, which happens to also be the good table — and open your own laptop.

Quiet for a few minutes. He's in the middle of something. Then: "What is that?"

You look up. He's gesturing at your screen. You explain it. You expect the explanation to take thirty seconds and land politely. Instead he asks a question that's actually about it, and then another one. Twenty minutes of a coffee shop conversation and he's followed it somewhere most people don't bother going.

The work sits between you for forty minutes, the conversation picking up and going quiet in natural intervals. When he finally packs up he says "same time Thursday?" in the way someone says something they've already decided.

You tell him probably.
"""

  effect = 'w.skillIncrease("FEMININITY", 1); npc("m").addLiking(1); gd.setGameFlag("COFFEE_SHOP_SECOND_VISIT");'

  [[actions.next]]
  finish = true

[[actions]]
id    = "pretend_not_to_see_him"
label = "Get your coffee. Find a seat at the back."
detail = "It's a quiet morning. That's allowed."
prose = """
You order, pay, and take the table by the radiator at the back — the one nobody wants because it runs warm — and sit down with your coffee.

{% if w.getSkill("FEMININITY") < 35 %}
He glanced up when you came in. He's back on his laptop now. The back table is warm and quiet and the coffee is good.
{% else %}
The table by the radiator is warmer than it needs to be. The coffee is fine. That's enough.
{% endif %}
"""

  [[actions.next]]
  finish = true
