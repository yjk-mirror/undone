[scene]
id          = "base::coffee_shop"
pack        = "base"
description = "A local coffee shop, a man in line, the city doing what it does."

[intro]
prose = """
The coffee shop on Union and Third is not a Starbucks, which is the first thing people say about it. Mismatched chairs, a chalkboard menu, an owner who remembers what you ordered last time even if you've only been in once. The line moves at its own speed. Nobody complains.

You're third in line. A woman ahead of you is getting her order corrected for the second time, waiting it out with the calm of someone who has been through worse this morning. Behind the counter, a barista with sleeve tattoos and a septum ring runs drinks with the steady competence of someone who stopped thinking about the steps a long time ago.

The man ahead of you turns around. Just the half-turn, enough to see you. He's mid-twenties, maybe a year or two older. Good shoulders. The kind of jaw that gets noticed. He's holding a phone, but his eyes are up.

{% if w.hasTrait("SHY") %}
You look at the menu board. You already know what you want, but the menu board is there and it's easier than whatever this is.
{% elif w.hasTrait("BEAUTIFUL") %}
He clocks you in that way — the quick take, the small pause, something shifting behind his eyes. He looks away first. You face forward.
{% elif w.hasTrait("BITCHY") %}
He looks you over, a beat too long. You look back with the flat expression of someone who has been looked at before and isn't performing a reaction about it.
{% elif w.hasTrait("FLIRTY") %}
Eye contact opens up — his or yours first, it doesn't particularly matter. A smile. The line keeps moving.
{% else %}
He nods. You nod back. The line moves.
{% endif %}

{% if w.getSkill("FEMININITY") < 35 %}
Bag against your hip, shoulders slightly in. The line moves and you move with it, taking up the space you take up and no more. The man ahead of you is just here for coffee. So are you, and there is also this other thing, the geometry of it, which you have stopped trying to explain.
{% endif %}
"""

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id                = "wait_turn"
label             = "Wait your turn"
detail            = "The line moves. Let it."
allow_npc_actions = true

[[actions]]
id        = "say_something"
label     = "Say something"
detail    = "He turned around. Might as well."
condition = "!scene.hasFlag('talked')"
prose     = """
{% if w.hasTrait("SHY") %}
"Busy today." You say it toward the counter rather than at him. A beat passes. He half-turns.

"Always is," he says. "Monday thing." A smile that isn't asking for anything. You get one back out before the line moves and you're both facing forward again.
{% elif w.hasTrait("FLIRTY") %}
"Is the oat milk latte actually good here, or is it one of those things?" A pause. "Virtue signaling in cup form."

He laughs — the real kind. "It's actually good. The chai's a trap though."

"Good to know." You're grinning. He is too.
{% elif w.hasTrait("BITCHY") %}
"You're staring at your phone like it owes you money."

He looks up. Surprised, then amused. "It kind of does, actually." He pockets it. "Better?"

"Marginally."
{% else %}
"Long line today."

"Could be worse," he says. "Coffee's worth it." He says it with the mild conviction of someone who comes here enough to mean it.

The line moves.
{% endif %}
"""

  [[actions.effects]]
  type = "set_scene_flag"
  flag = "talked"

  [[actions.effects]]
  type  = "add_npc_liking"
  npc   = "m"
  delta = 1

[[actions]]
id        = "order_and_leave"
label     = "Order and go"
detail    = "You came here for coffee, not conversation."
condition = "scene.hasFlag('reached_counter')"
prose     = """
{% if w.hasTrait("POSH") %}
"Cortado, please." The barista nods and writes nothing on the cup. You tap your card, leave a dollar in the jar, and collect your drink at the end of the counter.
{% elif w.hasTrait("DOWN_TO_EARTH") %}
"Medium drip. Room for cream." The barista barely looks up. The transaction takes fifteen seconds. Good.
{% else %}
You order, you pay, you wait at the pickup end. The cup is warm and the shop smells like espresso and whoever ordered the croissant. The line keeps moving behind you.
{% endif %}

{% if scene.hasFlag("talked") and not w.hasTrait("SHY") %}
On the way out you pass him at a table by the window. He looks up.

"Enjoy your Monday," he says.

"You too." The door closes behind you and the street takes over.
{% else %}
You push through the door. The cold comes back. The coffee is already cooling.
{% endif %}
"""

  [[actions.effects]]
  type   = "change_money"
  amount = -5

  [[actions.effects]]
  type = "set_game_flag"
  flag = "COFFEE_SHOP_VISITED"

  [[actions.next]]
  finish = true

[[actions]]
id        = "sit_with_him"
label     = "Sit with him"
detail    = "He gestured at the empty chair. Why not."
condition = "scene.hasFlag('invited')"
prose     = """
You take the chair across from him. Small table — knees nearly touching, both of you adjusted for it without discussion.

{% if w.hasTrait("ROMANTIC") %}
He wraps both hands around his mug. He's looking at you, not out the window, which means the conversation has his actual attention. You wrap both hands around your cup.
{% elif w.hasTrait("SULTRY") %}
You sit, cross your legs, take a sip. He looks. You let the quiet stretch one beat past comfortable, then say something ordinary — and watch him come back from wherever that sent him.
{% elif w.hasTrait("AMBITIOUS") %}
You take the chair. You've got a few minutes. He says the next right thing or he doesn't; you'll find out.
{% else %}
You sit down. Without asking, he slides a sugar packet toward you. You take it, because you take sugar.
{% endif %}

"I'm Jake," he says. He puts his hand out — formal for a coffee shop, but it works somehow.

{% if w.getSkill("FEMININITY") < 35 %}
His hand is warm and your fingers disappear in his grip for a second before he lets go. Something in your stomach does a small, fast thing that you don't have a name for yet.
{% endif %}
"""

  [[actions.effects]]
  type  = "add_npc_liking"
  npc   = "m"
  delta = 1

  [[actions.effects]]
  type   = "change_money"
  amount = -5

  [[actions.effects]]
  type = "set_game_flag"
  flag = "MET_JAKE"

  [[actions.effects]]
  type = "set_npc_role"
  npc  = "m"
  role = "ROLE_JAKE"

  [[actions.effects]]
  type = "set_npc_name"
  npc  = "m"
  name = "Jake"

  [[actions.effects]]
  type = "set_game_flag"
  flag = "COFFEE_SHOP_VISITED"

  [[actions.next]]
  finish = true

# ── NPC Actions ────────────────────────────────────────────────────────

[[npc_actions]]
id        = "he_orders"
condition = "!scene.hasFlag('reached_counter')"
weight    = 8
prose     = """
The line moves. He steps up to the counter and orders without hesitation — medium black, no room, no sugar. The barista doesn't write anything on the cup, which means he's been here before.

He steps aside to wait, and now it's your turn.
"""

  [[npc_actions.effects]]
  type = "set_scene_flag"
  flag = "reached_counter"

[[npc_actions]]
id        = "he_chats"
condition = "scene.hasFlag('talked') && !scene.hasFlag('invited')"
weight    = 10
prose     = """
He's sitting at a table by the window now, coffee in hand. He catches your eye and tips his cup slightly — the coffee equivalent of a wave.

"You should sit," he says. Not a demand. Not a question, either. The empty chair across from him is already pulled out, like he planned this or like he's just optimistic.

{% if w.hasTrait("PLAIN") %}
He says it the way people say things — easy, no particular weight behind it. Friendly. The empty chair is just a chair.
{% elif w.hasTrait("BEAUTIFUL") %}
He says it with the careful lightness of someone who has made a small decision. His eyes hold on yours a beat past the question.
{% endif %}
"""

  [[npc_actions.effects]]
  type = "set_scene_flag"
  flag = "invited"

[[npc_actions]]
id        = "background_noise"
condition = "!scene.hasFlag('reached_counter')"
weight    = 4
prose     = """
Someone's laptop makes the FaceTime ring at full volume. The entire shop turns. The guy with the laptop mouths *sorry* with the expression of a man who is not sorry, and a woman at the next table puts her headphones in with pointed finality.

The barista makes eye contact with no one and keeps making drinks. Professionals.
"""
