[scene]
id          = "base::workplace_landlord"
pack        = "base"
description = "Robin meets the landlord. The lease, the ID, the voice that doesn't match the photo."

[intro]
prose = """
The building has a buzzer panel with half the nameplates missing and the other half yellowed with age. Yours is not on it yet. You called ahead last week and the landlord said Saturday afternoon. You buzz the manager unit.

The man who opens the door is mid-fifties, flannel shirt, reading glasses pushed up on his forehead. He looks at your face, then at the folder in your hand: lease printout, ID, first month's check, arranged in the order you'll need them.

"Robin?" he says.

{% if w.hasTrait("SHY") %}
He waits for you to fill the silence. You don't.
{% elif w.hasTrait("BITCHY") %}
You hold his gaze. He drops it back to the folder.
{% else %}
A question, not a greeting.
{% endif %}

He opens the folder. The check is correct. The lease is signed in the right places. The ID is a valid driver's license — clear photo of a white man in his early thirties.

He looks at the photo. He looks at you. He looks at the photo again.
"""

[[thoughts]]
condition = "w.getSkill('FEMININITY') < 20"
style     = "observation"
prose = """
{% if w.hasTrait("ANALYTICAL") %}
His gaze moves from the photo to your face to the signature line. He's not going to say it. He's doing the math and waiting for the numbers to tell him something.
{% else %}
His thumb moves across the photo like he's checking the laminate. Then he looks at your hands. Then back at the signature.
{% endif %}
"""

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id                = "wait_him_out"
label             = "Let him work through it"
detail            = "He'll get there. Give him time."
allow_npc_actions = true
prose = """
He looks at the ID again. Looks at you. Back to the paperwork.

{% if w.hasTrait("SHY") %}
You stand still. Your hands are at your sides, not quite touching the folder. The silence does what it does.
{% elif w.hasTrait("ANALYTICAL") %}
He's working through it. You let him. From somewhere above, the low drone of a television.
{% else %}
From somewhere upstairs, a television. He works through it. You wait.
{% endif %}

A woman's voice from upstairs: "Frank, is that the new tenant?"

"Yeah," he calls back.

A pause. "Tell her the radiator in the bedroom takes a few minutes to warm up."

He looks at you. "The radiator in the bedroom takes a few minutes."

"Understood," you say.

He hands back the folder — keeping the check — and takes a key from a hook by the door. Unit 4B. Third floor, no elevator. Garbage Tuesday and Thursday. You say yes, got it, thank you. He says welcome to the building. He seems to mean it.

{% if w.getSkill("FEMININITY") < 25 %}
The key is warm from sitting on the hook. Small and brass in your palm.
{% endif %}
"""

  [[actions.effects]]
  type = "set_game_flag"
  flag = "MET_LANDLORD"

  [[actions.effects]]
  type = "set_game_flag"
  flag = "LANDLORD_WAITED_HIM_OUT"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.next]]
  finish = true

[[actions]]
id    = "explain_briefly"
label = "Give him a sentence"
detail = "One sentence. Enough to move things along."
prose = """
{% if w.hasTrait("SHY") %}
"The photo's a little old," you say. It comes out quieter than intended. He looks at you. Then at the photo. Then back at you.

"Okay," he says. He says it twice. Then he closes the folder and decides that's enough.
{% elif w.hasTrait("POSH") %}
"I look different than the photo." Flat, direct. He nods once and the folder comes closed.
{% elif w.hasTrait("CONFIDENT") %}
"I just look different than the photo." You say it before he can land the question. He looks at you for a beat, then nods.
{% else %}
"I look younger than the photo." He tilts his head. Then he nods, the way people nod when something is close enough to go on with.
{% endif %}

He hands you the key. Unit 4B. Third floor. You thank him and take the stairs.

{% if w.getSkill("FEMININITY") < 25 %}
Three flights. The banister is cold. You take it two steps at a time until the second landing, then you don't.
{% endif %}
"""

  [[actions.effects]]
  type = "set_game_flag"
  flag = "MET_LANDLORD"

  [[actions.effects]]
  type = "set_game_flag"
  flag = "LANDLORD_EXPLAINED_BRIEFLY"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.next]]
  finish = true

[[actions]]
id    = "keep_it_transactional"
label = "Keep it on the paperwork"
detail = "Point to the lease. Treat the moment like admin, not confession."
prose = """
You slide the lease printout half an inch forward with one finger.

{% if w.hasTrait("ANALYTICAL") %}
"The signed copy, the cashier's check, and the move-in addendum are all there." You say it like a list because it is one.
{% elif w.hasTrait("CONFIDENT") %}
"Everything you need is in the folder." You hold the moment until he looks down at it.
{% else %}
"The paperwork should all be in order," you say, and tap the folder once.
{% endif %}

He looks at the lease. The check. The signature line. He nods.

From upstairs: "Frank, did you tell her about the radiator?"

"In a second," he calls back.

He hands you the key — Unit 4B, third floor, no elevator — and runs through the rest: garbage Tuesday and Thursday, super's number on the board by the mailboxes. Logistics. You meet them the same way.

You thank him and take the stairs.
"""

  [[actions.effects]]
  type = "set_game_flag"
  flag = "MET_LANDLORD"

  [[actions.effects]]
  type = "set_game_flag"
  flag = "LANDLORD_KEPT_TRANSACTIONAL"

  [[actions.effects]]
  type   = "change_stress"
  amount = -1

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.next]]
  finish = true

# ── NPC Actions (Frank, the landlord) ────────────────────────────────

[[npc_actions]]
id        = "frank_radiator"
label     = "His wife calls down about the radiator"
weight    = 8
condition = "!scene.hasFlag('frank_called')"
prose = """
From upstairs: "Frank." A pause. "The radiator."

He tilts his head toward the ceiling. "Bedroom radiator takes a minute to get going," he says. "Just so you know."

"Thanks," you say.

He closes the folder. Pulls a key off a hook by the door — unit 4B, brass, the number worn down from years of handling. Third floor, no elevator.
"""

  [[npc_actions.effects]]
  type = "set_scene_flag"
  flag = "frank_called"

  [[npc_actions.effects]]
  type = "set_game_flag"
  flag = "MET_LANDLORD"

  [[npc_actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[npc_actions.next]]
  finish = true
