[scene]
id          = "base::evening_home"
pack        = "base"
description = "A free evening with no agenda. What you do with it."

[intro]
prose = """
Seven in the evening and nobody expects anything from you. The apartment is quiet in the ordinary way — not the wrong way, not the heavy way, just the low hum of a building going about its business and the light changing outside your window the way it does in late afternoon when the day has decided to wrap up without consulting you.

You have the whole evening. That's the situation.

The sofa. The kitchen. The phone on the counter with its three notifications you haven't looked at yet.

The evening is yours.
"""

[[intro_variants]]
condition = 'gd.hasGameFlag("MARCUS_INTIMATE") && !gd.hasGameFlag("MARCUS_APARTMENT") && w.getSkill("FEMININITY") < 35'
prose = """
Seven in the evening. The apartment is quiet. Your apartment. Not the office. Not the conference room with the cold stripe of hallway light.

The sofa. The phone. The particular silence of a place where you live alone and something has changed about who that person is.

Your phone has three notifications and you haven't looked at any of them. One might be from him. The might is doing more work than the three notifications combined.

The evening is yours. What that means has shifted.
"""

[[intro_variants]]
condition = '(gd.hasGameFlag("JAKE_INTIMATE") || gd.hasGameFlag("BAR_STRANGER_SLEPT") || gd.hasGameFlag("PARTY_STRANGER_SLEPT")) && w.getSkill("FEMININITY") < 30'
prose = """
Seven in the evening. The apartment is quiet, and the quiet is a different shape now.

A few weeks ago this was just silence — the hum of the building, the neighbor's TV, the specific emptiness of a place where one person lives. Now the quiet has texture. Your body remembers things the apartment doesn't know about — hands, weight, heat, the particular sound of breathing that isn't yours. The couch is the same couch. The window is the same window. The person sitting between them is someone who has done things.

The phone is on the counter. The notifications are waiting.

The evening is yours.
"""

[[intro_variants]]
condition = 'w.getSkill("FEMININITY") < 20'
prose = """
Seven in the evening and nobody expects anything. The apartment is yours for the night.

The free evening sits there with no particular shape. You've built a few habits — the tea, the window, the specific couch cushion — but the routine hasn't solidified yet. Your body wants to do something with its hands and hasn't decided what.

You've got the time. You'll figure out what to do with it.
"""

[[thoughts]]
condition = 'w.getSkill("FEMININITY") < 40'
style     = "observation"
prose     = "The couch is already where you end up. The tea is already on. The window is where you look next. The order of things has sorted itself out."

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id    = "watch_something"
label = "Find something to watch"
detail = "An hour becomes two. Fine."
prose = """
You find something — a documentary you've had queued since whenever, or the third episode of that show you started a month ago and keep meaning to get back to. An hour becomes two without any particular effort. Dinner happens in front of it, without guilt, which is the correct way to eat dinner.

The apartment does its evening thing around you. Pipes, upstairs neighbor, the faint sound of someone's TV through the shared wall doing something with a laugh track. None of it needs your attention.

{% if w.hasTrait("ANALYTICAL") %}
Halfway through you find yourself working out the structure of the thing — the edit choices, the arc, what they're trying to do and whether it's working. You can't entirely turn it off. At some point this becomes thinking about something else entirely, which is fine. The screen is still there when you come back.
{% elif w.hasTrait("ROMANTIC") %}
There's a scene near the end that gets to you slightly more than you expected. Nothing dramatic. Just a moment that lands. You sit with it for a few seconds before the next thing starts.
{% if gd.hasGameFlag("JAKE_INTIMATE") %}
The couple on screen has the kind of morning you've started having. The recognition sits warm and low and you pull the blanket up a little higher.
{% endif %}
{% else %}
It's a fine evening, and the notifications are answered at some point; you're not sure when.
{% endif %}
"""

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 1

  [[actions.effects]]
  type   = "change_stress"
  amount = -10

  [[actions.next]]
  finish = true

[[actions]]
id     = "read_or_work"
label  = "Open a book. Or a side project."
detail = "The good kind of evening."
prose = """
You settle in — book, or the side project you've been picking at in the margins of actual work. There's a difference between the thing you have to do and the thing you work on when you want to, and this is the second kind. The apartment is quiet in the right way.

{% if w.hasTrait("ANALYTICAL") %}
You get into it properly. One of those stretches where the problem clarifies itself and you find yourself close to something you didn't know you were close to. You look up and an hour has gone, which is the best thing that can happen with an hour.
{% elif w.hasTrait("AMBITIOUS") %}
You finish something. Not a big thing, but a task that wasn't technically due and that you've been carrying around as a low-level irritant for two weeks. The particular satisfaction of clearing it is disproportionate to the task, which is exactly how it should be.
{% else %}
You lose track of time in the way that means you were actually present for it. By the time you surface, the light has gone completely and you haven't thought about anything you didn't want to think about for a couple of hours, which is worth something.
{% endif %}
"""

  [[actions.effects]]
  type   = "change_stress"
  amount = -15

  [[actions.next]]
  finish = true

[[actions]]
id     = "spend_time_on_yourself"
label  = "Spend the evening on your appearance"
detail = "No occasion. Just because."
prose = """
You spend the evening on your appearance without a reason for it — something with your hair, or the makeup you've been learning, or the outfit you bought two weeks ago and still haven't actually worn. The bathroom mirror gets a fair amount of your time. So does your reflection in the dark window above the kitchen sink, which gives a different angle.

{% if w.getSkill("FEMININITY") < 25 %}
The makeup takes a few tries before it looks right instead of wrong. Your hands are steadier than last week. The mascara brush hits where it's supposed to on the first pass, and the eyeliner — the eyeliner is still a negotiation, but a shorter one.

An hour in, you've stopped accounting for it. Just looking. The woman in the mirror looks back. She looks like someone who spent an hour getting ready and isn't apologizing for it.

You find some things there that you expected. Some things you didn't. You stay longer than you planned, and when you finally turn away from the mirror it's because the bathroom light has shifted, not because you wanted to stop.
{% elif w.getSkill("FEMININITY") < 50 %}
No occasion. No audience. Just the thing itself, which turns out to be its own reason.

The line you've been practicing comes out right on the second try now. You know what this face does with this light, which contour to trust and which to overrule. The result earns the time you put in. Tonight you're not pretending otherwise.
{% else %}
You take your time because it's yours to take. No occasion, no audience — just the thing itself.

You know what you like now. You know how to get there. An hour passes without being tracked. You look at yourself and decide it's good, and the evening continues from there.
{% endif %}
"""

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.next]]
  finish = true

[[actions]]
id        = "text_jake"
label     = "Text Jake"
detail    = "The phone. His name. The cursor."
condition = 'gd.hasGameFlag("JAKE_INTIMATE")'
prose = """
The phone. His name in the contacts. The cursor blinking in the empty text field.

{% if w.hasTrait("SHY") %}
You type something. Delete it. Type something else. Delete that too. The third attempt is three words and you stare at them for fifteen seconds before hitting send. The read receipt appears almost immediately and your stomach does something with that information.

He types back. Four words. Easy, warm, like he was already thinking about texting you and you just got there first.

{% elif w.hasTrait("FLIRTY") %}
*Thinking about you.* Send. No overthinking, no drafts. The response takes forty seconds and it's longer than yours and warmer and by the time you've read it twice there's a grin on your face that the apartment doesn't need to know about.

{% elif w.hasTrait("ANALYTICAL") %}
The calculus of texting first. You know the calculus. Who texts first, how quickly, how much, what it signals. The data says this is fine. The data says this is what people in relationships do. The data is correct, and the phone is still in your hand, and the cursor is still blinking, and the gap between knowing and doing is exactly one sent message wide.

You send it. He answers. You put the phone down and pick it up again forty seconds later.

{% else %}
You send something short. Not flirty, not distant — just a check-in, the kind of text that says *I'm here and you were on my mind*.

He responds before you've put the phone down. Something about his evening, a question about yours. The conversation is small and warm and takes up the next twenty minutes without either of you running out of things to say.
{% endif %}

{% if w.getSkill("FEMININITY") < 30 %}
The phone goes on the nightstand eventually. The conversation trails off the way conversations do — not ended, just paused. His name is still on the screen when you turn over. The light from it makes a small blue rectangle on the ceiling.

A man's name on your phone. On your nightstand. In your apartment. The ordinariness of it and the strangeness of it, side by side.
{% endif %}
"""

  [[actions.effects]]
  type   = "change_stress"
  amount = -8

  [[actions.effects]]
  type   = "add_npc_liking"
  npc    = "ROLE_JAKE"
  delta  = 1

  [[actions.next]]
  finish = true

[[actions]]
id        = "take_a_bath"
label     = "Run a bath"
detail    = "Hot water. Quiet. Just you."
condition = 'gd.hasGameFlag("JAKE_INTIMATE") || gd.hasGameFlag("MARCUS_INTIMATE") || gd.hasGameFlag("BAR_STRANGER_SLEPT")'
prose = """
The bath takes four minutes to fill and the bathroom fills with steam. The mirror fogs over. Good. You don't want the mirror right now.

{% if w.getSkill("FEMININITY") < 30 %}
The water is almost too hot. Your body slides in and the heat takes everything — the day, the office, the men, the mirror, all of it going soft and indistinct under the steam. Your breasts float. Your hair fans out in the water. The body in the bath is a body, and for a few minutes that's all it needs to be.

Your hands rest on your thighs under the water. The skin is smooth. The knees are close together. The hips are wide enough that the tub fits differently than it used to. You breathe and the water moves.

{% elif w.getSkill("FEMININITY") < 50 %}
The heat settles in. Your shoulders drop. The apartment sounds come through the door — pipes, the building's particular language of ticks and creaks — and none of it requires anything from you.

{% if w.hasTrait("ROMANTIC") %}
The phone is in the other room and you left it there on purpose. The bath is just the bath. No screens, no notifications, no names. The water and the quiet and the woman in it.
{% endif %}

{% else %}
The bath is an hour and a half and you don't apologize for any of it. Face mask, hair treatment, the works. The bathroom is warm and private and when you finally drain the tub and wrap yourself in a towel the world feels slightly more manageable.
{% endif %}
"""

  [[actions.effects]]
  type   = "change_stress"
  amount = -15

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.next]]
  finish = true
