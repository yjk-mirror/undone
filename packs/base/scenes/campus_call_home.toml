[scene]
id          = "base::campus_call_home"
pack        = "base"
description = "A friend from home calls for Raul. You have to be someone who knows where Raul is."

[intro]
prose = """
Your phone rings on Wednesday evening. The name on the screen: Diego.

Diego is your best friend from home. He's the kind of person who calls instead of texts — calls because he says texting lacks inflection and he is correct about this in a way you've always found slightly insufferable.

Three rings. You answer.

"Yo, is Raul there?"

{% if w.hasTrait("SHY") %}
"He — stepped out." The words are out before anything better arrives. "He'll call you back."

"Oh, okay." Diego's voice dips a little. "No problem. Tell him I called."

"I will."

The line clicks off. The screen goes dark.
{% elif w.hasTrait("AMBITIOUS") %}
Half a second. "He's not available right now — I'm his roommate. Can I take a message?"

"Oh." A pause. "Okay. Tell him Diego called. It's not urgent."

The line clicks off.
{% else %}
"He's not around right now." A beat. "Can I take a message?"

"Uh, yeah." Another beat. "Tell him Diego called." He pauses. "His roommate?"

"Yeah. His roommate."

"Cool. Tell him to call me when he gets a chance."

The call ends.
{% endif %}
"""

[[intro_variants]]
condition = 'w.getSkill("FEMININITY") < 15'
prose = """
Diego calls on Wednesday.

His name on the screen. Three rings. You answer.

"Yo, is Raul there?"

"He's not available." A pause, half a breath. "I can take a message."

A pause on his end. "Okay. Tell him Diego called."

"I'll tell him."

The line goes dead. Phone on the desk. Screen going dark.
"""

[[thoughts]]
condition = 'w.getSkill("FEMININITY") < 50'
style     = "observation"
prose = """
The call is over. The phone sits on the desk face-up, Diego's name still on the recent list.

You don't pick it back up. You don't put it in a drawer. You just leave it there.
"""

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id    = "call_him_back"
label = "Call him back. Figure it out on the call."
detail = "You don't have a plan. You'll figure it out when he answers."
prose = """
He answers on the first ring, which is Diego. "Hey, uh — who's this?"

"It's me," you say, and then have to decide what that means. You go with: "It's Camila. I'm — I know Raul."

"Oh hey." A pause. "Is Raul okay?"

{% if w.hasTrait("SHY") %}
"He's fine," you say. "He's going through some stuff. He asked me to reach out."

"Oh, okay." Diego sounds uncertain. "Like, should I be worried?"

"No," you say. "He's okay. He just needs some time."

The call ends on that. You hang up. Your hands are shaking slightly.
{% else %}
"He's okay," you say. "He's going through something. I'm a friend of his from the city. He asked me to let people know he needs some space."

A long pause. "Space from what?"

"Just — things got complicated. He's safe. He'll reach out when he's ready."

"Tell him to call me," Diego says, and his voice has the quality of someone who has too many questions to know which one to ask first. "Tell him I don't care what it is."

"I'll tell him," you say.

You hang up. The phone sits in your hands.
{% endif %}
"""

  [[actions.effects]]
  type   = "change_anxiety"
  amount = 5

  [[actions.effects]]
  type = "set_game_flag"
  flag = "CALL_HOME_DONE"

  [[actions.next]]
  finish = true

[[actions]]
id    = "dont_call_back"
label = "Don't call back. Not yet."
detail = "You're not ready. Diego will be fine."
prose = """
You put your phone face-down on the desk.

Diego will be fine. He's always fine. He'll text a few more times, then less, then occasionally, the way friendships do when the geography changes.

You pick up your textbook. You have a problem set due Friday.
"""

  [[actions.effects]]
  type   = "change_stress"
  amount = 3

  [[actions.effects]]
  type = "set_game_flag"
  flag = "CALL_HOME_DONE"

  [[actions.next]]
  finish = true

[[actions]]
id    = "text_instead"
label = "Text him instead. Control what you say."
detail = "In text you have time to think before you send."
prose = """
You open a text to Diego. You type: *hey, it's camila. raul's friend. he asked me to reach out — he's going through something and needs some space. he's okay.*

You read it four times. You send it.

He replies in a minute: *okay. thanks for letting me know. tell him to call me when he can?*

You type: *I will.*

You put the phone in your bag. Not *who are you* or *that's weird*. Just *thanks.* Diego replied like that was a normal thing to receive.
"""

  [[actions.effects]]
  type   = "change_anxiety"
  amount = -2

  [[actions.effects]]
  type = "set_game_flag"
  flag = "CALL_HOME_DONE"

  [[actions.next]]
  finish = true
