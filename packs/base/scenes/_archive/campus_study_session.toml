[scene]
id          = "base::campus_study_session"
pack        = "base"
description = "Trying to study. The body is the problem. An assumption surfaces."

[intro]
prose = """
The study room in the science building is open until midnight and mostly empty on Tuesday afternoons. You got here at two. You've been here for an hour. Your notebook has twelve lines in it, three of which are useful.

The material is not the problem. You know this because you read the chapter twice the night before and it clicked — all of it, the kind of clicking that used to make you feel better about yourself than it had any right to. Raul was the student who could just sit down and go. You've been sitting down for an hour and you have twelve lines.

The room has a whiteboard along one wall with someone's problem set still on it from the morning, half-erased. There are three other people — two over by the windows working on something you can't see, and one guy at the table two spots down from you, reading a textbook, occasionally writing something in the margin. You know this because you've been clocking all of it instead of doing the reading. You can't seem to stop.

It's the body. Specifically: you don't know how to sit in it. You've tried three positions. In two of them you're aware of your hair against your neck. In the third you're aware of your posture in a way that makes you think about your posture, which is the opposite of working. You keep wanting to run a hand through your hair the way you used to, and when you do it, it lands wrong — too long, too much of it.

Pen down. The ceiling for a moment. Fluorescent lights and a water stain shaped like nothing in particular.

Five minutes. Then work. The study room.
"""

[[actions]]
id     = "distraction"
label  = "Continue"
detail = "Something pulls your attention before the five minutes are up."
prose = """
{% if w.hasTrait("SEXIST") %}
The two students by the windows are sharing notes on something. One of them is showing the other a diagram — you can see them pointing at it, back and forth. The one doing the explaining is a girl, maybe a year older, talking through something with patient precision.

You watch this for a second and catch yourself having a thought.

It's not a loud thought. It's the kind of thought that arrives fully formed, pre-verbal, the way old opinions do before you've examined them: *yeah, but does she actually understand it, or is she just explaining what someone else told her?*

The thought is already gone before you recognize what it was.

You look down at your notebook. Twelve lines. Most of them copied from the chapter you read last night, which you understood because you read it carefully and it clicked, because you've always been good at this, because — because —

You put the pen down again. The girl by the window is still explaining, and her lab partner is nodding and writing things down, and it looks like the exact, unremarkable way smart people talk through problems together. It looks exactly like that.

*Oh.* The thought doesn't finish.

The guy at the table two spots down turns a page in his textbook. Outside, someone is walking by with a coffee. The fluorescent light over the whiteboard flickers once and goes still, and you pick up your pen.
{% elif w.hasTrait("HOMOPHOBIC") %}
The guy at the table two spots down has been reading for an hour. He looks up at some point — to think, or to rest his eyes, you don't know — and for a second he's looking in your direction.

He's not looking at you. His eyes are somewhere in the middle distance between you and the whiteboard, the way people's eyes go when they're solving something. He has good cheekbones and the specific kind of tiredness that looks like concentration. He doesn't register you at all.

You look back at your notebook.

Three lines down, you realize you've thought about his cheekbones twice more. You don't do anything about this. You just notice the direction of it, the specific person it keeps returning to, the fact that it happens without your deciding anything. You hold that for a moment before anything else.

Then the rest of it arrives. You know what those jokes meant. You've known for a while. The registering came first — before you knew what you were registering, before any decision — and then the recognition, and then the accounting of what the jokes were, which is a different kind of knowing and worse.

He turns a page. You read the same sentence for the third time and this time you actually read it.
{% elif w.hasTrait("AMBITIOUS") %}
Ninety minutes in, you count what you've actually done.

Two-thirds of the reading. The first three problems out of eight. A page of notes that are mostly repetition from the chapter rather than your own working through it. The kind of session that looks productive if you squint and don't count the time.

You've always been able to work. Not in the sense of working hard — you've never loved the effort — but in the sense of just sitting down and doing it, of being able to close off everything external and point yourself at the problem until it resolved. It was one of the things you were quietly sure of. You weren't the most organized. You weren't always the most prepared. But you could always, when it mattered, just *go*.

You are not going. You've been here ninety minutes and you have two-thirds of a reading and three problems, and the study room is quiet and there are no external distractions and the work is not even particularly hard. You understand the material. You checked. When you actually read a sentence you know what it means.

The problem is you keep not reading the sentences.

You flip back through the notebook to the first useful line. You wrote it forty minutes ago. The handwriting after it deteriorates for two lines and then stops. You were going to finish the thought and then you lost the thread and started writing about something else for a line and a half and then stopped entirely.

You were going to be the person in this building who had things under control. You had a very clear plan for who you were going to be, arriving here.

You draw a line under the last useful line and start from there.
{% else %}
The two students by the windows pack up and leave sometime after three, and the study room is quieter without them, and you still haven't produced anything useful.

You're not distracted by anything specific. That's the part you keep turning over. There's no reason. The room is quiet. The material is fine. You had a plan for this afternoon — two hours of reading, problem set started, at least forty minutes of real productive time — and you've been sitting here for ninety minutes doing an impression of a person who is about to start.

Your body keeps interrupting you. Not dramatically. Just the awareness of it: the hair, the chair, the way you're holding your pen, the specific way the light is hitting your hand. You catch yourself noticing these things and then spend a second being annoyed that you noticed them and then you've lost another half a minute.

You've always been able to just start. That's the part you can't account for. There's nothing external to blame. The room is quiet. The material is fine. You have always been the kind of person who sits down and does the work.

You read the next sentence in the chapter. You understand it. You write it down.

Okay. Okay.
{% endif %}

{% if w.hasTrait("SEXIST") %}
You work through the rest of the problem set in order. It takes you an hour. The work is solid; the problems go the way problems go when you understand the material, which you do, and you finish before you expected to.

You don't look at the students by the window again. You don't not-look at them either, which would be its own kind of thing. You just work.

Somewhere in the last hour, the girl who was explaining the diagram finishes whatever she was explaining and both of them close their notebooks and leave together, talking. You hear a fragment of what they're saying — something about a lab section, something about Thursday — and it sounds exactly the way any two students sound when they're leaving a study session that went well.

You finish problem eight, close the notebook, and sit for a second.

You had that thought before you'd finished forming it. You caught it, but you caught it late, which is different from not having it. You don't know what to do with the difference yet. You put your notebook in your bag and head for the door.

The girl was clearly explaining the diagram to someone who didn't understand it yet.
{% elif w.hasTrait("HOMOPHOBIC") %}
You finish the reading. You do all eight problems. You don't look up again — not deliberately, just out of a kind of focused attention that is ninety percent real and ten percent protective, and you take the productivity where you find it.

The guy two spots down leaves around four-thirty. You hear the chair. You don't look.

You stay another twenty minutes, working through the last two problems, and then you pack up and go. In the hall outside you pass a group heading to dinner, laughing at something, and the sound of it is just people, just a Tuesday.

The shame came after. You catch yourself being careful about the order, making sure you have it right, because the order matters. The registering came first — before you knew what you were registering, before you'd made any decision — and then came the recognition of what it was, and then the jokes you used to make.

You can't unknow what the jokes meant. You've known for a while. But knowing something and having it land in your body in a study room on a Tuesday afternoon are different kinds of knowing, and you've had both of them now, and you don't know what to do with the gap.

You go to dinner. The food is cafeteria food, hot enough to count.
{% elif w.hasTrait("AMBITIOUS") %}
You get through it. That's the honest version: you get through it, with effort, over the next ninety minutes, in a way that feels like work in the bad sense.

Problems four through eight go slowly. You have to read some of the chapter sections twice. Not because you don't understand them — you do, you check, you quiz yourself — but because you have to read them twice to actually hold them, and the second read takes twice as long as it should because you're spending part of your attention managing the fact that you're not working as fast as you should be.

You finish at five-fifteen. The problem set is done. The reading is done. You have notes you can actually use.

It took you three and a half hours to do something that should have taken two. You know this. You're doing the math while you pack up your bag.

You're not bad at this. You know you're not bad at this; you were at the top of your class for four years and you read fast and you understood everything in that chapter. You were not bad at this today. You were just slower than you're supposed to be, slower than you used to be, and the gap between supposed to be and actually was is going to bother you for the rest of the night and you know it.

You zip up the bag. Stand up. The study room is still quiet, the whiteboard still half-erased.

You'll be faster next time. You'll have to be.
{% else %}
You work. Slowly, then not-slowly. The reading comes together across the next hour and a half in the way that work sometimes does when you stop waiting for it to feel right and just do it — not inspired, not flowing, just sentence by sentence until there's enough of them and they add up.

The problems go okay. Three of them are straightforward. The other two take longer than you'd like.

At five o'clock you have everything done and you sit for a minute, your hands flat on the notebook, letting the end of the session settle. The study room is nearly empty. Someone outside the door is on a phone call, voice low and fast.

Your body is still there — it's always there, always slightly too present — but you're not thinking about it right now, which is maybe as much as you can ask for on a Tuesday.

You'll figure out how to sit in it. Probably. You've figured out other things.

You pack up and go.
{% endif %}
"""

  [[actions.effects]]
  type = "set_game_flag"
  flag = "STUDY_SESSION_DONE"

  [[actions.effects]]
  type   = "change_stress"
  amount = 3

  [[actions.next]]
  finish = true
