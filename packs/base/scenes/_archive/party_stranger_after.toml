{% if w.hasTrait("OBJECTIFYING") %}
You know this shape from the inside out: the crowd, the balcony, the smaller space after, the point where private attention goes from possible to decided. You saw it forming before he held the door for you.
{% elif w.hasTrait("SHY") %}
