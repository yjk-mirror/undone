[scene]
id          = "base::campus_call_home"
pack        = "base"
description = "A friend from home calls for Raul. You have to be someone who knows where Raul is."

[intro]
prose = """
Your phone rings on Wednesday evening. The name on the screen: Diego.

Diego is your best friend from home. Was. Diego is the person who would have called Raul on a Wednesday to check in, because that's what Diego does — he calls, which is unusual, because everyone texts, but Diego calls because he says texting lacks inflection and he is correct about this in a way you've always found slightly insufferable.

The name stares back for three rings. An answer.

"Yo, is Raul there?"

Diego says this because he doesn't know. He doesn't know because you haven't told him. You haven't told him because you don't know how to tell him and the longer you don't, the harder it gets, and it's been two weeks now.

{% if w.hasTrait("SHY") %}
A stammered excuse — he stepped out, he'll call back. The line goes dead before Diego can ask questions. The dorm room is dark. The call-back is owed and the words for it don't exist yet.
{% elif w.hasTrait("AMBITIOUS") %}
The math takes about half a second. Not available right now. His roommate. The lies come out smooth, one after another, geography be damned.

"Oh." A pause. "Okay. Tell him Diego called. It's not urgent."

The line clicks off.
{% else %}
Some version of "not around right now" and "can I take a message" comes out. The words sound like someone else's.

A beat. "Uh, yeah. Tell him Diego called." Another beat. "His roommate?"

"Yeah. His roommate."

"Cool. Tell him to call me when he gets a chance."

The call ends.
{% endif %}
"""

[[intro_variants]]
condition = "w.getSkill('FEMININITY') < 15"
prose = """
Diego calls on Wednesday.

His name on the screen. Three rings. An answer.

"Yo, is Raul there?"

*He's right here. He's always right here. He's the only one who's right here.*

"He's not available." A pause. "I'm his — I can take a message."

A pause. "Okay. Tell him Diego called."

"I'll tell him."

The call ends. The phone on the desk. The screen going dark.

*File it for later. File everything for later. Later will come.*

No clear sense of when later is.
"""

[[thoughts]]
condition = "w.getSkill('FEMININITY') < 50"
style     = "inner_voice"
prose = """
The lie is still easier than the truth, which means you still don't have the truth in a form you can say out loud.

You know what happened. You know what you are now. You can write it in a note on your phone at 2 AM and delete it. But saying it to Diego — saying it to anyone who knew Raul — would make it a story, and you don't have the story yet.

*He'll figure it out eventually.* And then: *No, he won't. He'll just think Raul stopped calling.*

The phone. The desk. The phone again.
"""

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id    = "call_him_back"
label = "Call him back. Figure it out on the call."
detail = "You don't have a plan. You'll figure it out when he answers."
prose = """
He answers on the first ring, which is Diego. "Hey, uh — who's this?"

"It's me," you say, and then have to decide what *me* means. You go with: "It's Camila. I'm — I know Raul."

"Oh hey." A pause. "Is Raul okay?"

{% if w.hasTrait("SHY") %}
You haven't thought about what to say beyond *hi.* "He's fine," you say. "He's — going through some stuff. He asked me to reach out."

You are going through some stuff. You are reaching out. Nothing you said was technically a lie.

"Oh, okay." Diego sounds uncertain. "Like, should I be worried?"

"No," you say. "He's okay. He just needs some time."

The call ends on that. You hang up and your hands are shaking slightly and you don't know if you made things better or worse.
{% else %}
"He's okay," you say. "He's going through something. I'm — I'm a friend of his from the city. He asked me to let people know he needs some space."

A long pause. "Space from what?"

"Just — things got complicated. He's safe. He'll reach out when he's ready."

You don't know if this is true. You are Raul. You are not reaching out. You haven't decided if you ever will.

"Tell him to call me," Diego says, and his voice has the quality of someone who has too many questions to know which one to ask. "Tell him I don't care what it is."

"I'll tell him," you say.

You hang up. You sit with the phone in your hands for a moment. Diego doesn't care what it is. You didn't know that. You still don't know what to do with it.
{% endif %}
"""

  [[actions.effects]]
  type   = "change_anxiety"
  amount = 5

  [[actions.effects]]
  type = "set_game_flag"
  flag = "CALL_HOME_DONE"

  [[actions.next]]
  finish = true

[[actions]]
id    = "dont_call_back"
label = "Don't call back. Not yet."
detail = "You're not ready. Diego will be fine."
prose = """
You put your phone face-down on the desk.

Diego will be fine. He's always fine. He'll text a few more times, then less, then occasionally, the way friendships do when the geography changes. By the time you figure out what to say, it might not matter anymore.

You don't know if that's a plan or a failure. You pick up your textbook. You have a problem set due Friday.

*You'd have called back eventually*, you think, and then revise it. Diego was always the one who called first. You've been on the receiving end of that long enough to know the pattern.
"""

  [[actions.effects]]
  type   = "change_stress"
  amount = 3

  [[actions.effects]]
  type = "set_game_flag"
  flag = "CALL_HOME_DONE"

  [[actions.next]]
  finish = true

[[actions]]
id    = "text_instead"
label = "Text him instead. Control what you say."
detail = "In text you have time to think before you send."
prose = """
You open a text to Diego. You type: *hey, it's camila. raul's friend. he asked me to reach out — he's going through something and needs some space. he's okay.*

You read it four times. You send it.

He replies in a minute: *okay. thanks for letting me know. tell him to call me when he can?*

You type: *I will.*

You put the phone in your bag. You will, eventually. You don't know when eventually is.

You think: he said *thanks for letting me know*. Not *who are you* or *that's weird* — just *thanks.* Diego is, you think, probably fine. Better at this than you expected.
"""

  [[actions.effects]]
  type   = "change_anxiety"
  amount = -2

  [[actions.effects]]
  type = "set_game_flag"
  flag = "CALL_HOME_DONE"

  [[actions.next]]
  finish = true
