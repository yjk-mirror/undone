[scene]
id          = "base::rain_shelter"
pack        = "base"
description = "Caught in rain, a stranger in a bus shelter. The city's first small test."

# Content level: VANILLA — no explicit content.
# 2-round flow using NPC actions:
#   Round 1: Wait or run (!umbrella_offered)
#   Round 2: Accept or decline his umbrella (umbrella_offered)

[intro]
prose = """
The sky opened up three blocks from your apartment. Not a drizzle — the kind of rain that turns gutters into rivers and puts everyone on the street into a fast walk.

The bus shelter on Clement Ave is the nearest cover. Glass walls, metal bench, an ad for a personal injury lawyer peeling off the back panel. A man is already in there — mid-twenties, decent jacket, one of those compact umbrellas people in this city carry.

{% if w.hasTrait("BEAUTIFUL") %}
He looks up when you step in. Holds the look a beat longer than he needs to.
{% else %}
He glances up when you step in. Quick read, back to his phone.
{% endif %}

The rain hammers the roof. A bus goes by without pulling over. Across the street, a woman wrestles an inside-out umbrella and loses.
"""

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id                = "main"
label             = "Wait it out"
detail            = "Stay put. Let the rain handle itself."
allow_npc_actions = true
prose = """
{% if w.hasTrait("SHY") %}
You take the far end of the bench. Water drips from your jacket onto the concrete. He's on his phone. You're looking at the rain. The shelter is small enough that you're aware of the distance between you and precise about keeping it.
{% elif w.hasTrait("ANALYTICAL") %}
You lean against the glass and track the rain patterns on the street — the drainage grade, the way the awnings direct water onto the sidewalk instead of the gutter. His umbrella is leaning against the bench. Compact, good brand.
{% else %}
You lean against the glass. The rain hammers on. He's got his phone out. The shelter does what shelters do.
{% endif %}

{% if w.getSkill("FEMININITY") < 25 %}
Your jacket hangs lower on you than it should. The sleeves cover your hands. You fold your arms and the fabric bunches at your elbows.
{% endif %}
"""

[[actions]]
id        = "leave"
label     = "Make a run for it"
detail    = "Three blocks. You'll survive."
condition = "!scene.hasFlag('umbrella_offered')"
prose     = """
{% if w.hasTrait("SHY") %}
You're already moving before you've decided. Better soaked than stuck in silence. The rain hits your face and you walk fast, shoulders up.
{% elif w.hasTrait("AMBITIOUS") %}
Three blocks is three blocks. You step out and walk with purpose.
{% else %}
You hunch your shoulders and step back into it. The rain is cold and immediate.
{% endif %}

By the time you reach your building, you're soaked through. Your shoes leave prints across the lobby floor.
"""

  [[actions.effects]]
  type   = "change_stress"
  amount = 3

  [[actions.next]]
  finish = true

[[actions]]
id        = "accept_umbrella"
label     = "Share his umbrella"
detail    = "He offered. You're deciding."
condition = "scene.hasFlag('umbrella_offered')"
prose     = """
{% if w.hasTrait("SHY") %}
"Thanks." You step under. The umbrella is small enough that your shoulders almost touch. He smells like whatever detergent he uses. You look at the rain. He looks at the rain.
{% elif w.hasTrait("FLIRTY") %}
"My hero." You step under the umbrella and stand close enough that he has to adjust his grip. He smells like coffee and something that probably costs more than it should.
{% elif w.hasTrait("POSH") %}
"That's kind of you." You step under, careful not to brush against him. The umbrella is barely adequate for two. He holds it slightly more toward your side.
{% else %}
"Sure, thanks." You step under. It's not quite big enough for two — the rain still catches your far shoulder — but it's better than nothing. He tilts it toward you without being asked.
{% endif %}

{% if w.getSkill("FEMININITY") < 30 %}
He's close enough that you can feel warmth coming off his arm. The top of your head is level with his chin. The umbrella smells like nylon and rain. You're standing in the space someone else made for you, which is a sentence that didn't used to apply.
{% endif %}

"I'm David," he says. Not a question. Just information.
"""

  [[actions.effects]]
  type  = "add_npc_liking"
  npc   = "m"
  delta = 1

  [[actions.effects]]
  type = "set_game_flag"
  flag = "RAIN_SHELTER_MET"

  [[actions.next]]
  finish = true

[[actions]]
id        = "decline_umbrella"
label     = "Decline politely"
detail    = "Generous, but no."
condition = "scene.hasFlag('umbrella_offered')"
prose     = """
{% if w.hasTrait("SHY") %}
"I'm okay, thanks." Quieter than you intended. He nods once, puts the umbrella back at his side.
{% elif w.hasTrait("BITCHY") %}
"I'm fine." Something in how you say it makes him take a half-step back.
{% else %}
"I'm good, but thanks." He shrugs — not offended, not invested. Just a guy who tried something small and moved on.
{% endif %}

The rain fills the silence. Eventually it eases to something survivable and you walk the three blocks home with wet shoes and dry pride.
"""

  [[actions.effects]]
  type = "set_game_flag"
  flag = "RAIN_SHELTER_MET"

  [[actions.next]]
  finish = true

# ── NPC Actions ────────────────────────────────────────────────────────

[[npc_actions]]
id        = "umbrella_offer"
condition = "!scene.hasFlag('umbrella_offered')"
weight    = 12
prose     = """
He looks at the rain. Then at you. Then at the umbrella leaning against the bench.

"Rain's not letting up. I've got this, if you want."

{% if w.hasTrait("BEAUTIFUL") %}
He says it like the offer was already decided before he opened his mouth.
{% elif w.hasTrait("PLAIN") %}
It takes him a beat to commit to the ask.
{% endif %}
"""

  [[npc_actions.effects]]
  type = "set_scene_flag"
  flag = "umbrella_offered"

[[npc_actions]]
id        = "small_talk"
condition = "scene.hasFlag('umbrella_offered')"
weight    = 5
prose     = """
"You live around here?" He says it the way people in this city ask — filling air, not expecting much.

{% if w.hasTrait("POSH") %}
"Nearby." You leave it at that.
{% elif w.hasTrait("DOWN_TO_EARTH") %}
"Yeah, Clement and Fifth." He says he's on Union. Close enough to be relevant.
{% else %}
"Close by," you say. He nods. The rain keeps going.
{% endif %}
"""
