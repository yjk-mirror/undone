[scene]
id          = "base::campus_arrival"
pack        = "base"
description = "Camila arrives on campus. Move-in day. Being greeted as a girl for the first time in public."

[intro]
prose = """
Move-in day at the Ivy is a production. Parents with Volvos and Range Rovers double-parked along the quad, upperclassmen in university t-shirts holding clipboards, someone somewhere already playing music too loud for 10 AM. A banner over the gate: WELCOME CLASS OF 2032.

You have a duffel bag and a laptop case and a driver's license that says Raul, and you're standing at the check-in table while a junior in a yellow t-shirt smiles at you with the practiced warmth of someone who has done this forty times this morning.

"Name?" the junior says.

You almost say Raul.

"Camila," you say instead.

The junior types it. Finds it. Because *Camila* is in the system — your parents' emergency contact, which you'd filled out months ago under your old name, had been quietly updated when the enrollment office got your email last week. You'd called it "a legal name update." The office person had been completely normal about it, which you had not expected and still don't know what to do with.

"Here you go." The junior hands you a lanyard with your room key and a campus map. "Aldrich Hall, room 214. Elevator's on the left. Welcome!"

{% if w.hasTrait("SHY") %}
The lanyard changes hands. The junior has moved on before anything else can follow.
{% elif w.hasTrait("AMBITIOUS") %}
The lanyard, the map — unnecessary, the PDF version was memorized days ago. Aldrich Hall is east of the quad.
{% else %}
The junior has already moved on to the next person. The lanyard is light. The campus stretches ahead.
{% endif %}
"""

[[intro_variants]]
condition = "w.getSkill('FEMININITY') < 15"
prose = """
Move-in day. The check-in table. A name, when asked. The junior types it into a laptop and a lanyard slides across.

*Welcome.*

The campus is full of families doing the thing families do on move-in day: carrying boxes, pointing at buildings, taking photos. A woman — a mother — smiles the way people smile at freshmen on move-in day.

A smile back. The woman looks away.

*That happened*, you think. *That was that.* It goes on the list. Filed under *later*.
"""

[[thoughts]]
condition = "w.getSkill('FEMININITY') < 50"
style     = "inner_voice"
prose = """
The junior said *Welcome!* like she meant it, which she probably did, and meant it toward you specifically, which is the part that's strange.

You've been welcomed to things before. Orientation at your private school. The lacrosse team. College interviews where the alumni assessors leaned forward when you spoke. You know what *welcome* feels like from the inside and this is different in a way you can't locate yet.

Camila, the junior just assumed. Not *welcome, whichever gender you are* — just *welcome.* Like it was obvious.

It was obvious, you suppose. You suppose that's the whole situation.
"""

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id    = "find_the_room"
label = "Find room 214"
detail = "Aldrich Hall. Second floor. Get your bearings."
allow_npc_actions = true
prose = """
The dorm is already half-chaos — doors propped open, the elevator slow and crowded, parents navigating hallways with boxes they can't see over. You take the stairs.

Room 214 is at the end of the hall. Your roommate isn't there yet — just furniture, a bare mattress on each side, and a window that looks onto a courtyard. You set your duffel down. You look at the room.

{% if w.hasTrait("POSH") %}
The furniture is institutional. You'd expected institutional. You're going to need a rug and better lighting and possibly a lamp from somewhere that isn't the campus store. You make a note.
{% elif w.hasTrait("DOWN_TO_EARTH") %}
The room is fine. You've slept in worse at lacrosse away games. You start unpacking.
{% else %}
You sit on the mattress. The springs are mediocre. Outside, someone is asking their parent to please just let them handle the boxes. The parent is not letting them.

You have a room at college. You have a name on the lanyard. You're at the Ivy, which was the plan, and the plan still more or less happened. You just didn't expect to be here like this.
{% endif %}
"""

  [[actions.effects]]
  type = "set_game_flag"
  flag = "ROUTE_CAMPUS"

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::campus_opening"
  to_state = "arrived"

  [[actions.next]]
  finish = true

# ── NPC Actions (resident advisor) ────────────────────────────────────

[[npc_actions]]
id     = "ra_checks_in"
label  = "The RA introduces herself"
weight = 8
prose = """
A knock on the open door. A junior — tall, natural hair, clipboard — leans in.

"Hey, I'm Priya, your RA. Just doing a quick check-in. You get the key okay?"

"Yeah," you say. "Thank you."

Priya glances at the room. "Your roommate's Janette — she's usually here by noon." She gives the spiel: quiet hours, common room, her door is always open, weekly study breaks on Wednesdays. She delivers it with the warmth of someone who's done it enough times to mean it.

{% if w.hasTrait("SHY") %}
You nod at the right moments. When Priya leaves you feel slightly better about the whole thing, which you didn't expect.
{% else %}
You ask one question — where's the nearest laundry — and Priya answers it and is gone in thirty seconds. Efficient. Approved.
{% endif %}

You go back to unpacking.
"""

  [[npc_actions.effects]]
  type = "set_game_flag"
  flag = "ROUTE_CAMPUS"

  [[npc_actions.effects]]
  type     = "advance_arc"
  arc      = "base::campus_opening"
  to_state = "arrived"

  [[npc_actions.next]]
  finish = true
