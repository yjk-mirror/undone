[scene]
id          = "base::jake_morning_after"
pack        = "base"
description = "Morning. His place or hers. Waking up next to someone for the first time in this body."

# Aftermath of jake_apartment. The physical evidence of last night.
# His arm across her. The question isn't "did I enjoy it" — the body
# answered that. The question is what this means for who she is now.
# NOT explicit. The morning-after register: tender, quiet, real.

[intro]
prose = """
You wake up and it takes a second.

The pillow is different. Or the light is different. Or the weight across your waist is different — warm, heavy, the particular gravity of another person's arm. Jake is behind you, breathing slow, asleep or close to it.

{% if w.getSkill("FEMININITY") < 25 %}
Sore in places that are new — your hips, the inside of your thighs, the space between your legs tender in a way it wasn't yesterday. His arm is heavy across your waist. His hand rests against your stomach. The heat of him along your back is a wall of warmth and you've already pressed into it before you've fully woken up.

The sheets are tangled. The room smells like sleep and him and something underneath both.
{% elif w.getSkill("FEMININITY") < 50 %}
Sore, warm, the weight of last night still in your limbs. His arm across your waist. His breathing against the back of your neck, slow, still asleep. The sheets smell like both of you.
{% else %}
His arm across your waist. His breathing on the back of your neck. Morning light on the sheets tangled around you both.
{% endif %}

The ceiling has a crack in it. His apartment, then. You don't recognize the ceiling.
"""

[[intro_variants]]
condition = "w.hasTrait('ROMANTIC')"
prose = """
You wake up slowly.

The light is golden — his bedroom faces east and the curtains are thin and the morning comes through them in a long stripe across the bed. Jake is behind you, one arm across your waist, his breathing slow and even against the back of your neck.

{% if w.getSkill("FEMININITY") < 30 %}
Soft and sore and warm. His hand rests against your stomach. His heartbeat comes through his chest against your back, slow and steady.
{% endif %}

The room smells like sleep and coffee that someone made yesterday and didn't finish. His apartment. The ceiling has a crack in it shaped like a question mark.
"""

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id     = "stay"
label  = "Stay"
detail = "The morning with him. Coffee. Whatever comes next."
prose  = """
You don't move. His arm stays. The morning happens around you — light shifting, the radiator clicking, the city starting its Saturday through the window.

{% if w.hasTrait("ROMANTIC") %}
He wakes up slowly. The breathing changes. The arm tightens slightly. Then his mouth on the back of your neck, brief, warm, still mostly asleep.

"Morning," he says. Voice rough with sleep.

"Morning."

He doesn't move to get up. Neither do you. The silence is heavier than it was at the coffee shop — warmer, with all of last night in it. Eventually he says "coffee" like it's a whole position on the matter, and gets up, and you watch him cross the room and he knows you're watching and neither of you says anything about it.

{% elif w.hasTrait("ANALYTICAL") %}
He wakes up — you know the exact moment, the breathing shifts, the arm adjusts — and you've been awake for twenty minutes already, cataloging. The ceiling crack. The weight of his arm. The soreness in your hip flexor.

"Hey," he says.

"Hey."

"How long have you been awake?"

"A while." He makes coffee. The apartment is small enough that you can see the kitchen from the bed. He measures grounds with the precision of a man who has opinions about ratios.

{% elif w.hasTrait("SHY") %}
He wakes up. His hand moves once across your stomach — slow, warm, checking.

"Hey," he says. Quiet.

"Hey."

The silence is enormous. Not bad. Just full. You pull the sheet up slightly. He doesn't comment. He gets up and comes back with two cups and sits on the edge near your hip and hands you one and says nothing while you drink it.

{% else %}
He wakes up. His arm tightens once, then he's shifting, blinking, the transition from sleep to present. He sees you and something in his face settles.

"Hey."

"Hey."

He makes coffee and brings you a cup without asking how you take it. Gets it right. The morning finds its shape — two people drinking coffee in a bed, the city doing its thing outside.
{% endif %}

{% if w.getSkill("FEMININITY") < 30 %}
Your bra is draped over his desk chair. The sight of it there, in his room, is a small specific fact and your throat tightens around it.

He sits close and your bare shoulder touches his arm and the contact registers differently than it did before last night.
{% endif %}
"""

  [[actions.effects]]
  type = "set_game_flag"
  flag = "JAKE_MORNING_AFTER"

  [[actions.effects]]
  type  = "add_npc_liking"
  npc   = "m"
  delta = 2

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 3

  [[actions.effects]]
  type   = "change_stress"
  amount = -3

  [[actions.next]]
  finish = true

[[actions]]
id     = "get_up_quietly"
label  = "Get up quietly"
detail = "You need to process alone."
prose  = """
You slide out from under his arm. Slow. He shifts but doesn't wake — a murmured sound, the breathing evens back out.

Your clothes are on the floor. Underwear. Jeans. The shirt that smells like last night and like him.

{% if w.hasTrait("ANALYTICAL") %}
You dress in the bathroom. The mirror: hair tangled, a mark on your collarbone you touch once and then button your shirt over. You splash water on your face. The analysis can happen on the walk.
{% elif w.hasTrait("SHY") %}
You dress fast, in the hallway, listening for his breathing to change. It doesn't. His keys on the counter. His coffee maker. His whole small apartment with you leaving it.

The deadbolt needs a quarter-turn and the click when it opens is loud in the quiet.
{% elif w.hasTrait("AMBITIOUS") %}
Up, dressed, at the door in four minutes. Not running — efficient. There's a morning you need to have alone before you have one with him, and last night changed something you haven't named yet.
{% else %}
You dress. You look at him one more time — asleep, the sheet at his waist, one arm where you were. The room smells like both of you. You let yourself out.
{% endif %}

{% if w.getSkill("FEMININITY") < 25 %}
The street is cold and bright. Your hips are sore. Your inner thighs. The places his hands were are still registering, quieter now but present. You walk. Nobody on this sidewalk knows. You're just a woman walking home on a Saturday morning.
{% elif w.getSkill("FEMININITY") < 50 %}
Twenty minutes home. Headphones in, nothing playing. The city goes by. Your body carries last night quietly, the soreness small and specific.
{% endif %}
"""

  [[actions.effects]]
  type = "set_game_flag"
  flag = "JAKE_MORNING_AFTER"

  [[actions.effects]]
  type  = "add_npc_liking"
  npc   = "m"
  delta = 1

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.effects]]
  type   = "change_stress"
  amount = -1

  [[actions.next]]
  finish = true

[[actions]]
id     = "wake_him"
label  = "Wake him up"
detail = "The morning is its own thing. You're not done."
prose  = """
You turn over. His face is close — eyes closed, mouth slightly open, the particular slack of a man deeply asleep. His jaw in the morning light. You touch it.

His eyes open. Not startled. Just there.

"Hey," he says. The word is rough with sleep.

"Hey."

{% if w.hasTrait("FLIRTY") %}
You lean in and kiss him. His hand comes up to the back of your head, threading into your hair. The kiss is slow and warm and tastes like sleep and you're smiling into it.

"Good morning," you say against his mouth.

"It is now." The worst line. The worst delivery. You both laugh and then you're kissing again and the morning gets very simple.

{% elif w.hasTrait("CONFIDENT") %}
"Coffee?" he asks.

"Later."

He reads it. His hand moves from the pillow to your hip and stays there, waiting. You move closer. The morning light is doing something to the sheets, to his arms, to the particular geometry of two bodies that already know each other.

"Yeah?" he says.

"Yeah."

{% elif w.hasTrait("ROMANTIC") %}
You trace his jaw. The stubble is rougher than last night. His eyes track you with the soft focus of someone who's been awake for about ten seconds and is already fully present.

"You're staring," he says.

"I'm looking."

He smiles. His arm comes around you and pulls you in and his chest is warm against yours.

{% else %}
"Morning," you say.

His hand finds your waist under the sheet. Lighter than last night — a hello. He pulls you slightly closer. You let him.

"Sleep okay?" he asks.

"Yeah."

The morning fills with small things — his hand on your hip, the radiator clicking, the city doing its Saturday thing outside. Nothing requires analysis.
{% endif %}

{% if w.getSkill("FEMININITY") < 30 %}
His chest against yours. His heartbeat under your ear, slow and steady. Yours faster. Both present.
{% endif %}
"""

  [[actions.effects]]
  type = "set_game_flag"
  flag = "JAKE_MORNING_AFTER"

  [[actions.effects]]
  type  = "add_npc_liking"
  npc   = "m"
  delta = 2

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 3

  [[actions.effects]]
  type   = "change_stress"
  amount = -4

  [[actions.next]]
  finish = true
