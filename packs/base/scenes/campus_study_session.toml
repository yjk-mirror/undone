[scene]
id          = "base::campus_study_session"
pack        = "base"
description = "Trying to study. The body is the problem. An assumption surfaces."

[intro]
prose = """
The study room in the science building is open until midnight and mostly empty on Tuesday afternoons. You got here at two. You've been here for an hour. Your notebook has twelve lines in it, three of which are useful.

The material is not the problem. You read the chapter twice last night and it clicked — all of it, cleanly, the way material does when you're actually paying attention. That's done. What isn't done is the problem set in front of you, the one you've been staring at for an hour.

The room has a whiteboard along one wall with someone's problem set still on it from the morning, half-erased. Three other people — two over by the windows working on something you can't see, and one guy at the table two spots down from you, reading a textbook, occasionally writing something in the margin. You know this because you've been clocking all of it instead of doing the reading. You can't seem to stop.

It's the body. Specifically: you don't know how to sit in it. You've tried three positions. In two of them you're aware of your hair against your neck. In the third you're aware of your posture in a way that makes you think about your posture, which is the opposite of working. You reach up to push the hair back and there's more of it than your hand expects, and it doesn't land the way you were aiming.

Pen down. The ceiling for a moment. Fluorescent lights and a water stain shaped like nothing in particular.

Five minutes. Then work. The study room.
"""

[[actions]]
id     = "distraction"
label  = "Continue"
detail = "Something pulls your attention before the five minutes are up."
prose = """
{% if w.hasTrait("SEXIST") %}
The two students by the windows are sharing notes on something. One of them is showing the other a diagram — you can see them pointing at it, back and forth. The one doing the explaining is a girl, maybe a year older, walking her lab partner through it with patient precision.

You watch for a second. Your eyes slide past her to the diagram itself, checking the labels, and she points to exactly the part you were looking at and explains it correctly. Your eyes come back to her face.

The explanation keeps going. Her lab partner nods and writes things down. The explanation is solid — you can tell from here, from the specific way she's moving through it, step by step, not skipping anything. The kind of explanation that means you actually understand the thing, not just the summary.

You look back at your notebook. The pen is still in your hand.

The guy at the table two spots down turns a page in his textbook. Outside, someone is walking by with a coffee. The fluorescent light over the whiteboard flickers once and goes still, and you pick up your pen.
{% elif w.hasTrait("HOMOPHOBIC") %}
The guy at the table two spots down has been reading for an hour. He looks up at some point — to think, or to rest his eyes, you don't know — and for a second he's looking in your direction.

He's not looking at you. His eyes are somewhere in the middle distance between you and the whiteboard, the way people's eyes go when they're solving something. He has good cheekbones and the specific kind of tiredness that looks like concentration. He doesn't register you at all.

You look back at your notebook.

Three lines down, you've thought about his cheekbones twice more. You don't do anything about this. You just notice the direction of it, the specific person it keeps returning to, the fact that it happens without your deciding anything. You hold that for a moment before anything else.

Then the rest of it arrives, and you sit with that too, and you know what it costs. He turns a page. You read the same sentence for the third time and this time you actually read it.
{% elif w.hasTrait("AMBITIOUS") %}
Ninety minutes in, you count what you've actually done.

Two-thirds of the reading. The first three problems out of eight. A page of notes that are mostly repetition from the chapter rather than your own working through it. The kind of session that looks productive if you squint and don't count the time.

You flip back through the notebook to the first useful line. You wrote it forty minutes ago. The handwriting after it deteriorates for two lines and then stops. You were going to finish the thought and then you lost the thread and started writing about something else for a line and a half and then stopped entirely.

The room is quiet. The material is not hard. You know this because when you actually read a sentence you understand it. That's not the problem.

The problem is you keep not reading the sentences.

You draw a line under the last useful line and start from there.
{% else %}
The two students by the windows pack up and leave sometime after three, and the study room is quieter without them, and you still haven't produced anything useful.

There's no reason. The room is quiet. The material is fine. You had a plan for this afternoon — two hours of reading, problem set started, at least forty minutes of real productive time — and you've been sitting here for ninety minutes doing an impression of a person who is about to start.

Your body keeps interrupting you. Not dramatically. Just the awareness of it: the hair, the chair, the way you're holding your pen, the specific way the light is hitting your hand. You catch yourself noticing these things and then spend a second being annoyed that you noticed them and then you've lost another half a minute.

You read the next sentence in the chapter. You understand it. You write it down.

Okay. Okay.
{% endif %}

{% if w.hasTrait("SEXIST") %}
You work through the rest of the problem set in order. It takes you an hour. The work is solid; the problems go the way problems go when you understand the material, which you do, and you finish before you expected to.

You don't look at the students by the window again. You don't not-look at them either, which would be its own kind of thing. You just work.

Somewhere in the last hour, the girl who was explaining the diagram finishes whatever she was explaining and both of them close their notebooks and leave together, talking. You hear a fragment of what they're saying — something about a lab section, something about Thursday — and it sounds exactly the way any two students sound when they're leaving a study session that went well.

You finish problem eight, close the notebook, and sit for a second.

Your eyes went past her to check the diagram before they came back. You caught it, but you caught it after. You put your notebook in your bag and head for the door.

The girl was clearly explaining the diagram to someone who didn't understand it yet.
{% elif w.hasTrait("HOMOPHOBIC") %}
You finish the reading. You do all eight problems. You don't look up again — not deliberately, just out of a kind of focused attention that is ninety percent real and ten percent protective, and you take the productivity where you find it.

The guy two spots down leaves around four-thirty. You hear the chair. You don't look.

You stay another twenty minutes, working through the last two problems, and then you pack up and go. In the hall outside you pass a group heading to dinner, laughing at something, and the sound of it is just people, just a Tuesday.

The registering came first — before you knew what you were registering. Then the recognition. Then the accounting of what it means, which lands differently in a study room on a Tuesday afternoon than it ever did as an abstraction, and you've had both of them now, and you don't know what to do with the gap.

You go to dinner. The food is cafeteria food, hot enough to count.
{% elif w.hasTrait("AMBITIOUS") %}
You get through it. That's the honest version: you get through it, with effort, over the next ninety minutes, in a way that feels like work in the bad sense.

Problems four through eight go slowly. You have to read some of the chapter sections twice. Not because you don't understand them — you do, you check, you quiz yourself — but because you have to read them twice to actually hold them, and the second read takes twice as long as it should because you're spending part of your attention managing the fact that you're not working as fast as you want to be.

You finish at five-fifteen. The problem set is done. The reading is done. You have notes you can actually use.

It took you three and a half hours to do something you'd budgeted two for. You know this. You're doing the math while you pack up your bag.

You're not bad at this. You understood everything in that chapter. You were not bad at this today. You were just slower than the schedule, and the gap between the schedule and the actual is going to bother you for the rest of the night and you know it.

You zip up the bag. Stand up. The study room is still quiet, the whiteboard still half-erased.

You'll be faster next time. You'll have to be.
{% else %}
You work. Slowly, then not-slowly. The reading comes together across the next hour and a half in the way that work sometimes does when you stop waiting for it to feel right and just do it — not inspired, not flowing, just sentence by sentence until there's enough of them and they add up.

The problems go okay. Three of them are straightforward. The other two take longer than you'd like.

At five o'clock you have everything done and you sit for a minute, your hands flat on the notebook, letting the end of the session settle. The study room is nearly empty. Someone outside the door is on a phone call, voice low and fast.

Your body is still there — it's always there, always slightly too present — but you're not thinking about it right now, which is maybe as much as you can ask for on a Tuesday.

You pack up and go.
{% endif %}
"""

  effect = 'gd.setGameFlag("STUDY_SESSION_DONE"); w.changeStress(3);'

  [[actions.next]]
  finish = true
