[scene]
id          = "base::transformation_intro"
pack        = "base"
description = "Night flight to the new city. You board as the person you were and fall asleep."

# Content level: VANILLA — no sexual content.

[intro]
prose = """
Gate C31 smells like coffee, disinfectant, and wet coat sleeves.

Your boarding pass says **{{ w.beforeName() }}**. Your old name still fits in your hand like a tool you have used for years.

The gate agent scans your phone. A green light, a nod, and you step into the jet bridge with everyone else.

{% if gd.hasGameFlag("ROUTE_WORKPLACE") %}
You are not flying for a vacation. You are flying because a company in a city you barely know offered you a job, and you said yes.

The apartment lease starts tomorrow. Your boxes are already in transit. There is a badge photo waiting somewhere in a new HR system with your old face attached to your old name.
{% elif gd.hasGameFlag("ROUTE_CAMPUS") %}
You are not flying for a vacation. You are flying toward orientation week, dorm check-in, and a campus that has been described to you as if it were a destiny.

You have the student portal bookmarked, a class schedule screenshot in your camera roll, and exactly enough confidence to believe the city will make room for you.
{% else %}
You are not flying for a vacation. You are flying toward a new city and a life you have not tested yet.

Your old place is behind you, your next place is waiting, and the middle distance between those two facts is this airplane aisle.
{% endif %}

{% if w.hasTrait("AMBITIOUS") %}
You count next steps without meaning to: landing, ride, keys, sleep, first morning, first impression. The list calms you.
{% elif w.hasTrait("ANALYTICAL") %}
You run inventory because that is how you move through uncertainty: route, timing, contingencies, expected failures.
{% elif w.hasTrait("OUTGOING") %}
You clock people automatically: who looks approachable, who looks tired, who might be interesting after one drink and a little luck.
{% elif w.hasTrait("SHY") %}
You keep your shoulders narrow and your movements efficient, hoping to pass through without becoming anyone's small interaction.
{% else %}
You move with the practiced neutrality of someone who has flown enough to know every step by feel.
{% endif %}
"""

# ── All four beats merged into a single action ────────────────────────────

[[actions]]
id    = "fall_asleep"
label = "Settle in and close your eyes"
detail = "The city can wait until morning."
prose = """
The aisle is a slow negotiation of elbows and carry-ons.

You find your row, lift your bag, sit, buckle, wait.

The plane pushes back. Runway lights smear into short gold lines against the window as the engines rise and hold.

{% if gd.hasGameFlag("ROUTE_WORKPLACE") %}
When the wheels leave the ground, you think about your first day in that office. You can picture the lobby before you have ever seen it.
{% elif gd.hasGameFlag("ROUTE_CAMPUS") %}
When the wheels leave the ground, you think about the first walk across campus, the first room full of strangers who are supposed to become your people.
{% else %}
When the wheels leave the ground, you think about the version of yourself that will step out on the other side of this flight.
{% endif %}

The seat belt sign stays on. Cabin lights dim.

{% if w.hasTrait("OVERACTIVE_IMAGINATION") %}
Your brain keeps rendering possible tomorrows in fast sequence. None of them feel fully impossible.
{% elif w.hasTrait("CONFIDENT") %}
You decide, without drama, that you will handle whatever this city throws at you.
{% elif w.hasTrait("SHY") %}
You angle toward the window and make yourself smaller, grateful that nobody expects conversation.
{% else %}
You let the engine noise flatten your thoughts into something manageable.
{% endif %}

Somewhere over Ohio, exhaustion wins the argument.

You close your eyes.
"""

  [[actions.effects]]
  type = "set_game_flag"
  flag = "TRANSFORMATION_WITNESSED"

  [[actions.next]]
  finish = true
