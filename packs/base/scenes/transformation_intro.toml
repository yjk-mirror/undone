[scene]
id          = "base::transformation_intro"
pack        = "base"
description = "Night flight to the new city. You board as the person you were and fall asleep over Ohio."

# Content level: VANILLA — no sexual content.
# Shown during TransformationIntro char creation phase.
# One continue-style action. No real choices.

[intro]
prose = """
Gate C31. Grey-and-maroon airport carpet, the Cinnabon across the concourse, a kid asleep across two seats near the window.

{% if not w.alwaysFemale() %}Your boarding pass says **{{ w.beforeName() }}**.{% endif %}

{% if gd.hasGameFlag("ROUTE_WORKPLACE") %}
Three weeks ago, a company in a city you've visited once offered you a job. Software engineering. The salary matched your ten years of experience even if the title didn't. You said yes because the old job was going nowhere and because sometimes you just need to go somewhere.

Your apartment lease starts tomorrow. Your boxes shipped Monday. There's a badge photo sitting in an HR system with your face and your name, and on Monday morning someone is going to try to match that photo to whoever walks through the door.
{% elif gd.hasGameFlag("ROUTE_CAMPUS") %}
Orientation starts Thursday. Your dorm assignment came through last week — a double in one of the old stone buildings, roommate TBD. You've read the acceptance letter four times. The financial aid folder on your phone has been opened more often than you'd admit.

You got in. Now you have to show up and be the person who got in.
{% else %}
You've been telling people you're starting fresh, which is true enough. The sublet starts tomorrow. The plan after that is loose.
{% endif %}

{% if w.hasTrait("AMBITIOUS") %}
You've mapped the first week already. Airport to apartment, unpack, sleep. Monday is accounted for. The rest is contingency.
{% elif w.hasTrait("ANALYTICAL") %}
You go through the logistics one more time. Lands at 9:40. Ground transport. Keys from the lockbox, code in your email. If the apartment matches the photos, unpacked by midnight.
{% elif w.hasTrait("SHY") %}
The gate area is loud. You've found a seat near the wall — close enough for the boarding call, far enough from the nearest group conversation.
{% elif w.hasTrait("OUTGOING") %}
The woman in the next seat has a travel pillow, a paperback, and the relaxed posture of someone who flies regularly. She caught your eye when you sat down — quick smile, back to her book.
{% else %}
You wait. Airports are mostly waiting.
{% endif %}

They call your zone.
"""

[[actions]]
id     = "board_and_sleep"
label  = "Board the flight"
detail = "Find your seat. The city can wait."
prose = """
The jet bridge smells like hydraulic fluid and rain. You file in with everyone else.

{% if not w.alwaysFemale() %}{% if w.beforeHeight() == "Tall" or w.beforeHeight() == "VeryTall" %}
Your knees have opinions about the next three hours. You fold into the window seat and accept the legroom situation.
{% elif w.beforeFigure() == "Muscular" or w.beforeFigure() == "Thickset" %}
The window seat is tight across the shoulders. You take it, claim the armrest.
{% else %}
You find your row, stow your bag, sit down, buckle.
{% endif %}{% endif %}

The overhead bins close one by one. A flight attendant does the safety demonstration to an audience of nobody.

{% if gd.hasGameFlag("ROUTE_WORKPLACE") %}
Somewhere in that city there's a desk, a codebase you've read the docs for, and a team expecting someone they've never met.
{% elif gd.hasGameFlag("ROUTE_CAMPUS") %}
Somewhere in that city there's a dorm room with a bare mattress and a meal plan card and a roommate who's probably already there.
{% else %}
Somewhere in that city there's an apartment with your boxes in it and nothing else.
{% endif %}

The runway lights stretch into streaks. The engines rise. The ground drops away.

{% if w.hasTrait("SHY") %}
Window seat. You angle toward the glass and watch the lights below shrink into a grid. Nobody expects anything from you up here.
{% elif w.hasTrait("ANALYTICAL") %}
The city grid rotates below. You catch yourself calculating altitude by the size of the headlights. It doesn't matter and the calculation was automatic.
{% endif %}

The cabin lights go down. The engine noise settles into a hum.

Somewhere over Ohio, your eyes close.
"""

  [[actions.effects]]
  type = "set_game_flag"
  flag = "TRANSFORMATION_WITNESSED"

  [[actions.next]]
  finish = true
