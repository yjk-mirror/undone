[scene]
id          = "base::work_marcus_coffee"
pack        = "base"
description = "Break room, Tuesday. Marcus asks what you thought of Kevin's presentation."

[intro]
prose = """
10:30, and the break room smells like burnt coffee from the first pot someone made at seven and forgot about. You're making your second cup — the machine grinds through its cycle, forty seconds flat.

Marcus comes in. He pours from the pot you just refreshed, turns to lean against the counter. Looks at you.

"What did you think of Kevin's deck?"

Not *how did the presentation go*. Not *any feedback on the Q&A*. He waits. No preamble, no diplomatic ramp. Just the question, and now the silence where your answer goes.
"""

[[intro_variants]]
condition = "w.getSkill('FEMININITY') < 20"
prose = """
10:30, and the break room smells like burnt coffee from the first pot someone made at seven and forgot about. You're making your second cup. The machine grinds through its cycle.

Marcus comes in. He pours from the pot you just refreshed, turns to lean against the counter.

"What did you think of Kevin's deck?"

He's looking directly at you. The machine clicks off behind you. He doesn't qualify the question or soften it or give you anywhere to redirect.
"""

[[thoughts]]
condition = "w.getSkill('FEMININITY') < 35"
style = "observation"
prose = "The break room is quiet. Your hands are still on the mug. Marcus is waiting for an answer."

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id     = "give_honest_take"
label  = "Tell him what you actually think"
detail = "Kevin buried the risk section. He knows it. Say so."
prose  = """
"The risk section was buried," you say. "Third-to-last slide, half a page, no quantification. Kevin knows it's there — it wasn't an oversight, it was a choice. Whether that was the right call depends on who he was trying not to alarm."

{% if w.hasTrait("ANALYTICAL") %}
Marcus's face does something small before the word arrives — a compression, an exhale that stops short. He had the same read. He was waiting to see if you'd say it.

"Yeah," he says, and gets his coffee.
{% else %}
Marcus nods. "Yeah," he says, and gets his coffee.
{% endif %}

You take your cup back to your desk. The exchange took maybe a minute.
"""

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.effects]]
  type  = "add_npc_liking"
  npc   = "m"
  delta = 1

  [[actions.next]]
  finish = true

[[actions]]
id     = "hedge"
label  = "Say something measured"
detail = "It's not your place to criticize Kevin's work directly."
prose  = """
"It covered the main points," you say. "The Q&A went long, but the questions were good." You leave it there.

Marcus nods, gets his coffee, and goes. Nothing to follow up on because there was nothing there.

{% if w.getSkill("FEMININITY") < 35 %}
Back at your desk, your hands are tight around the cup. He turns back to his screen. Something about how fast the conversation closed sits with you all the way down the hall.
{% endif %}
"""

  [[actions.next]]
  finish = true

[[actions]]
id     = "turn_it_back"
label  = "Ask what he thought"
detail = "\"What did *you* think?\""
prose  = """
"What did *you* think?" you ask.

Marcus pauses. Not stalling — the pause is real, the answer assembling. Then he gives it to you.

Two structural problems with the deck that aren't the ones you caught. First: a gap in the dependency mapping that won't matter until Q3, when it will be annoying to untangle. Second: how Kevin framed the migration timeline — technically accurate, but framed to need re-explaining to the same people in six weeks.

Neither is the risk section. You had the risk section. He had the other two.

"Okay," you say. "Thanks."

You take your coffee back to your desk.
"""

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.effects]]
  type  = "add_npc_liking"
  npc   = "m"
  delta = 1

  [[actions.effects]]
  type = "set_game_flag"
  flag = "MARCUS_REAL_CONVERSATION"

  [[actions.next]]
  finish = true
