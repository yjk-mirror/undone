# ── Action 2: Hold something back ────────────────────────────────────────────

[[actions]]
id     = "hold_back"
label  = "Not all the way"
detail = "Go so far. Not further. The line is still there."
prose  = """
{% if gd.desire() >= 65 %}
"Not here," you say.

He looks at you. Takes the word.

"Where," he says. Not a question — more like he's placing the constraint and examining it.

{% if w.hasTrait("CONFIDENT") %}
"Same place. Later." You hold his eyes. "Not in the middle of a session."

He tips his chin — registered. "Tomorrow."

You don't say yes exactly. But you don't say no.
{% else %}
You don't answer. He reads you for a moment — not annoyed, just calibrating — and then he takes a half-step back.

"Tomorrow," he says.

It lands like something settled.
{% endif %}

He's twelve feet away for the next forty minutes, working his program, completely normal, and the knowledge of tomorrow sits warm in your sternum the entire time.

{% if w.getSkill("COMPOSURE") < 30 %}
Your form is off for three sets and you don't bother correcting it.
{% endif %}
{% elif gd.desire() >= 35 %}
You follow him to the corridor but stop at the door.

He looks back. He doesn't push — he never pushes, and that's half the problem.

"Just — hands," you say. Your voice comes out level enough to be mortifying.

{% if w.hasTrait("ANALYTICAL") %}
You've identified the line. A line that's further in than any previous line. You're tracking the progression with one part of your head and giving in with the rest of it.
{% endif %}

He opens the door. Inside, his hands go to your hips — no further, not yet, reading what you said — and then one hand slides down and you have about thirty seconds before the thing you said stops mattering.

{% if w.hasTrait("EASILY_WET") %}
His fingers find you through the fabric and pause. He makes a small sound — not a word, just the breath of someone who's found confirmation. His thumb starts moving.
{% else %}
He works through your leggings and then inside them, slow, and you have your hands on his shoulders and your head back against the wall.
{% endif %}

You come without crossing your own line, which feels like discipline and doesn't feel like discipline at all.

{% if w.hasTrait("SUBMISSIVE") %}
When his hand stills you're aware of how much further he could go. That you didn't let him go there. That you're going to think about that.
{% endif %}
{% else %}
He moves toward the corridor. You don't follow immediately.

He stops. Looks back.

{% if w.hasTrait("SHY") %}
"I can't," you say. Which isn't quite true. "Not today."

He studies you for a moment. Something in that look — patient, unhurried — settles around you like weather.

