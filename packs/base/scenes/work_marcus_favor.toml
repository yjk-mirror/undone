[scene]
id          = "base::work_marcus_favor"
pack        = "base"
description = "Marcus messages: can you look at this spec? Not a big ask. Just an ask."

[intro]
prose = """
The Slack notification lands at 2:07 PM: Marcus, with a link and a single line. "Hey — got 10 minutes to look at something?"

The link goes to a twelve-page infrastructure spec. Section headers, latency assumptions, a rollback plan on page nine, a dependency diagram that's going to need to be explained to at least four people. Not a ten-minute ask.

You send back: "Sure — give me a bit." He doesn't reply. He just expected you'd look.
"""

[[intro_variants]]
condition = 'w.getSkill("FEMININITY") < 20'
prose = """
The Slack notification lands at 2:07 PM: Marcus, with a link and a single line. "Hey — got 10 minutes to look at something?"

The link is open before you've fully read it. Twelve pages. Infrastructure. The rollback plan is on page nine and is going to be a problem.

You send back: "Sure — give me a bit." He doesn't reply. He just expected you'd look.
"""

# ── Actions ────────────────────────────────────────────────────────────────────

[[actions]]
id     = "review_and_comment"
label  = "Give it real attention"
detail = "Forty minutes. Two structural concerns, one thing he got right that nobody will catch."
prose  = """
You spend forty minutes on it.

The comments are specific. Latency assumptions in section four don't account for the weekend load pattern — whoever ran the benchmarks ran them on a Tuesday. The rollback plan assumes state recovery time that's optimistic by forty percent under realistic failure conditions. Section seven has an architectural choice the rest of the team will dismiss on sight and be wrong to. You flag all three.

He responds the same day. Three lines. Concedes on the latency section without argument — he already knew. Concedes on the rollback timeline, then adds a number that's actually better than yours. Pushes back on section seven with a detail about how the data layer is structured that changes your read of it.

Four messages. You come out with updated positions on two of three points. The thread closes. You get back to what you were doing.

{% if w.getSkill("FEMININITY") < 35 %}
Four messages. Two updated positions. The spec is better and the thread is closed and you sit with that for a second before you open the next tab.
{% endif %}
"""

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 2

  [[actions.effects]]
  type  = "add_npc_liking"
  npc   = "m"
  delta = 1

  [[actions.effects]]
  type = "set_game_flag"
  flag = "REVIEWED_MARCUS_SPEC"

  [[actions.next]]
  finish = true

[[actions]]
id     = "quick_pass"
label  = "Skim it, leave two comments"
detail = "Twenty minutes. Efficient."
prose  = """
Twenty minutes. Two comments — one on the latency section, one on the rollback assumptions. High-level, defensible. The section seven thing is visible from where you're standing. You don't flag it.

He messages back: "Thanks." Professional. Enough.

{% if w.getSkill("FEMININITY") < 35 %}
You scroll back to your own work. The section seven problem sits in the back of your screen for the rest of the afternoon, unflagged.
{% endif %}
"""

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 1

  [[actions.effects]]
  type  = "add_npc_liking"
  npc   = "m"
  delta = 1

  [[actions.next]]
  finish = true

[[actions]]
id     = "decline"
label  = "Tell him you're buried"
detail = "Honest. He'll understand."
prose  = """
You send back: "Buried this week — can you give it to Priya? She'd have better context on the latency piece anyway."

He responds: "Fair."

That's it. No friction, no follow-up. You close the notification.
"""

  [[actions.effects]]
  type = "set_game_flag"
  flag = "DECLINED_MARCUS_SPEC"

  [[actions.next]]
  finish = true
