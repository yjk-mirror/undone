[scene]
id          = "base::workplace_evening"
pack        = "base"
description = "After work. The apartment. You have been competent all day. Something small undoes you."

[intro]
prose = """
The key sticks on the third floor, same as always. You get the door open.

The apartment is the same as you left it this morning. City sounds come through the window — delivery cyclists, someone across the street pacing with a phone, a bus pulling from the stop. The light is going. You haven't turned anything on yet.

{% if gd.hasGameFlag("FIRST_NIGHT_STAGED_TOMORROW") %}
Your shoes are lined up by the door the way you left them that first night, toes out, bag hook within reach. The apartment has learned a little of your shape.
{% elif gd.hasGameFlag("FIRST_NIGHT_RESEARCHED") %}
Your laptop is on the kitchen table where you left it. One browser tab still open from that first night — bra sizing, strap geometry, something you were too tired to finish. The screen is dark.
{% elif gd.hasGameFlag("FIRST_NIGHT_CALLED_BACK_HOME") %}
Your phone has a stale text thread from the first night in the apartment. You haven't answered the last message.
{% endif %}

{% if w.hasTrait("ANALYTICAL") %}
The design review ran long but it concluded. The PR got merged. Three items carried over. You know exactly where each of them lives in the backlog and what order they go in tomorrow.

The apartment is quiet.
{% elif w.hasTrait("AMBITIOUS") %}
There's a follow-up that was supposed to go out before end of day. It didn't. Two hours of work, maybe less if you focus. The laptop is right there.

The radiator ticks.
{% else %}
The kettle is on the counter. You're not hungry yet. There's no particular pull toward any one thing.
{% endif %}
"""

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id     = "moment"
label  = "Wash your face"
detail = "Something small. Not the meeting. Something smaller."
prose = """
The light switch is on the right side of the door. Your hand goes left on instinct and finds nothing for a quarter-second before it corrects. You flip the switch.

{% if w.getSkill("FEMININITY") < 25 %}
The bathroom light comes on and the mirror is right there. Evening light in a bathroom is different from morning — harsher, more direct — and the face takes a beat to settle. You know it. You've been looking at it for a week and a half. The gap before the recognition is getting shorter.

You run the water cold.
{% elif w.getSkill("FEMININITY") < 40 %}
The mirror catches you mid-reach and holds you there for a second. The light switch and then the mirror lands as two things at once, and you stand there with the water running before you remember what you came in here for.
{% else %}
The mirror is the mirror. You run the water and wash your face.
{% endif %}

{% if w.hasTrait("ANALYTICAL") %}
You dry your face and stay at the sink a moment longer. Light switch on the right. Hand went left. You file it and go back out to the kitchen.

{% if gd.hasGameFlag("FIRST_DAY_ASSERTED_STATUS") %}
You said the difficult sentence out loud in the design review when it needed saying. The room accepted it. The week is closed on that.
{% elif gd.hasGameFlag("FIRST_DAY_DEFERRED_STATUS") %}
You let the work make the point, and the work did. The room caught up by Thursday. There's a cost to the wait that you're still accounting for.
{% elif gd.hasGameFlag("FIRST_DAY_REDIRECTED_STATUS") %}
The repo, the diagram, the benchmark. Three times this week you grounded an argument in facts instead of authority and it worked all three times.
{% endif %}

You make tea — the green tea from Sunday, the familiar brand — and sit at the kitchen table with your laptop open. Not working. The cursor blinks. The apartment is quiet.
{% elif w.hasTrait("AMBITIOUS") %}
Two hours of work left. You go back to the laptop.

{% if gd.hasGameFlag("FIRST_DAY_ASSERTED_STATUS") %}
You said the hard thing in the design review. The room accepted it. That happened this week and it's done.
{% elif gd.hasGameFlag("FIRST_DAY_DEFERRED_STATUS") %}
You let the work argue for you. It worked. The patience cost something.
{% elif gd.hasGameFlag("FIRST_DAY_REDIRECTED_STATUS") %}
Every time the room pushed back you went to the data. Three times. It held every time.
{% endif %}

You send the follow-up. It takes four minutes. The three carried items go into tomorrow's list in order. When you're done you close the laptop and order from the Thai place down the block.
{% else %}
You dry your face and go back to the kitchen.

{% if gd.hasGameFlag("FIRST_DAY_ASSERTED_STATUS") %}
You said the hard thing in the design review and the room eventually came around. The residue from needing to say it at all is still there, dull and low.
{% elif gd.hasGameFlag("FIRST_DAY_DEFERRED_STATUS") %}
The work made its own argument and people caught on by the end. There's a particular kind of tired that comes from waiting for a room to arrive at what you already knew.
{% elif gd.hasGameFlag("FIRST_DAY_REDIRECTED_STATUS") %}
You kept going back to the data. The facts held. The week held.
{% endif %}

You make tea and sit with it by the window. The bus stop has two people waiting. A bus comes. They get on. The stop goes empty.
{% endif %}

{% if gd.hasGameFlag("FIRST_CLOTHES_MIRROR") %}
{% if w.getSkill("FEMININITY") < 25 %}
The dressing room at the department store is still somewhere in the back of your head. The outfit on purpose. The outline in the mirror. You set it aside and drink your tea.
{% else %}
The outfit came together in the dressing room and it's been working all week. That was the right call.
{% endif %}
{% elif gd.hasGameFlag("FIRST_CLOTHES_MINIMUM") %}
You bought the minimum because that was what you could manage. The week happened anyway.
{% elif gd.hasGameFlag("FIRST_CLOTHES_ASKED_HELP") %}
The saleswoman knew what she was doing. The clothes fit. The week held up.
{% endif %}

{% if w.getSkill("FEMININITY") < 25 %}
The light switch thing fades. The mirror thing fades. The apartment goes quiet around you.
{% elif w.getSkill("FEMININITY") < 40 %}
The light switch corrected before it completed. That's the whole of it.
{% endif %}
"""

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "settled"

  [[actions.effects]]
  type  = "advance_time"
  slots = 28

  [[actions.effects]]
  type   = "change_stress"
  amount = -3

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 3

  [[actions.next]]
  finish = true

[[actions]]
id     = "bath"
label  = "Run a bath"
detail = "The tub is deep. The apartment is quiet."
prose  = """
The tub is old cast-iron, deep, the kind that takes ten minutes to fill. You turn the tap. The pipes groan once and settle into a steady run. You undress while it fills.

{% if w.getSkill("FEMININITY") < 25 %}
The mirror fogs before you're in, which is fine. You step over the lip of the tub — the weight shift, the new center of it, your foot finding the bottom — and the water closes over your shins and rises and the warmth comes up through you all at once. Your breath goes out.

You stay very still for a moment.
{% elif w.getSkill("FEMININITY") < 50 %}
The mirror fogs. You step in. The water takes you in stages — calves, thighs, hips, the sharp intake at your stomach. Then you're in. Your shoulders drop. Your jaw loosens.
{% else %}
You step in. The water closes over you. Your hair fans out. The ceiling has a crack you've memorized. The warmth settles into your muscles and the day releases its grip one joint at a time.
{% endif %}

{% if w.hasTrait("ROMANTIC") %}
You add more hot when the water starts to cool. The window above the tub is frosted glass and the streetlight comes through it orange and diffused. The city is out there. You're in here. That's the whole thing.
{% elif w.hasTrait("ANALYTICAL") %}
Fifteen minutes. The water cools at a steady rate; you add hot at the ten-minute mark. The fogged mirror is clearing in one corner near the vent. Your hands are flat on the water. They were fists earlier and they aren't now.
{% else %}
The water cools and you add more hot and the pipes groan and somewhere in the building something settles and the design review is a long way away.
{% endif %}

You get out when the water is lukewarm. Towel. The fogged mirror clears in streaks. You go to the kitchen and order from the Thai place.
"""

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "settled"

  [[actions.effects]]
  type  = "advance_time"
  slots = 28

  [[actions.effects]]
  type   = "change_stress"
  amount = -5

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 4

  [[actions.next]]
  finish = true

[[actions]]
id     = "call"
label  = "Pick up the phone"
detail = "There's someone from before. The question is what you'd say."
prose  = """
Your phone is on the kitchen counter. You scroll past Carter's email and a Slack thread and open contacts.

{% if w.hasTrait("SHY") %}
Your sister texts every Sunday. You've been replying with one-word answers and deferred plans for two weeks. Her name sits there in the list.

You close contacts. Open the delivery app instead. The pad see ew from the Thai place on 43rd.

{% if w.getSkill("FEMININITY") < 30 %}
The phone goes dark on the counter.
{% endif %}
{% elif w.hasTrait("CONFIDENT") %}
You call your sister.

Third ring: "Hey, stranger." Not annoyed. Just noting the gap. You tell her about the apartment, the neighborhood, the new job. She asks if you're eating and if you're okay. You tell her yes to both.

"Come visit," she says. You say you will. The timeline stays loose. The call runs eight minutes. When you hang up the apartment is quieter than it was before.
{% else %}
You hover over a name and then another. Same names, same numbers as always. You put the phone face-down on the counter.

{% if w.getSkill("FEMININITY") < 30 %}
The screen goes dark. The names are all still there.
{% endif %}

You open the delivery app instead. Thai food. The pad see ew from the place on 43rd.
{% endif %}

{% if w.hasTrait("ANALYTICAL") %}
The food arrives. You eat at the kitchen table with your laptop open — not working, just something to read. The apartment is becoming a place where you live rather than a place where you landed.
{% else %}
The food arrives. You eat on the couch with the TV on something you don't follow. The radiator ticks, the street does its thing, the neighbor's music comes through the wall low and muffled. It's not comfortable yet. It's closer than it was last week.
{% endif %}
"""

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "settled"

  [[actions.effects]]
  type  = "advance_time"
  slots = 28

  [[actions.effects]]
  type   = "change_stress"
  amount = -2

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 3

  [[actions.next]]
  finish = true
