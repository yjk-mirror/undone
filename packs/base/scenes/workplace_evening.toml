[scene]
id          = "base::workplace_evening"
pack        = "base"
description = "After work. The apartment. You have been competent all day. Something small undoes you."

[intro]
prose = """
The apartment is the same as you left it this morning.

You knew it would be. Apartments do not rearrange themselves. The fact that your brain offered the thought anyway tells you more about your fatigue than any honest self-report would. The bag goes on the chair. Your shoes go by the door. You are getting better at the shoes-by-the-door thing. Not good. Better.

The city is doing its early-evening thing outside: delivery cyclists, someone in the building across the street pacing with a phone, a bus dragging away from the stop. None of it requires anything from you.

{% if w.hasTrait("ANALYTICAL") %}
You do a brief audit. Day was a net positive: the PR got merged, the design review ran long but concluded, no one said anything that needed immediate correction. You gave feedback on two pull requests before lunch. Three items carried over to tomorrow. You know where each of them lives in the backlog.

The apartment is quiet. You still do not know whether that quiet is a comfort or a test.
{% elif w.hasTrait("AMBITIOUS") %}
You pull out your laptop before your coat is off. There are still two hours before you would normally call it a reasonable stopping point and there is a follow-up you meant to send before end of day. You get as far as opening the thread, read the first line, and then just sit there with your coat half-off and the laptop open.

The radiator ticks. You don't type anything.
{% else %}
You stand in the kitchen for a moment without particular purpose. Not hungry yet. Not ready to sit down. You put the kettle on, which buys you something to wait for.
{% endif %}
"""

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id     = "moment"
label  = "Wash your face"
detail = "Something small. Not the meeting. Something smaller."
prose = """
You go to the bathroom to wash your face.

The light switch is on the right side of the door. You reach left on instinct — muscle memory from wherever, the old apartment, some room you haven't been in for weeks — and your hand finds nothing for a quarter-second before you correct. You flip the switch.

{% if w.getSkill("FEMININITY") < 40 %}
{% if w.getSkill("FEMININITY") < 25 %}
The face in the mirror takes a second. Not because you don't know it — you know it; you've been looking at it for a week and a half — but the bathroom light is different in the evening and for one split second your brain ran the wrong comparison and came up empty.

*That's you.* The correction takes no time at all. It's just the gap before the correction that you notice.

You run the water cold. You wash your face. You've developed a particular way of managing the mirrors in this apartment, and you use it now.
{% elif w.getSkill("FEMININITY") < 40 %}
You catch yourself in the mirror mid-reach and hold there for a second. Not startled, exactly — you know the face. But the light switch thing and then the mirror thing in the same moment layers in a way that's harder to file away cleanly.

You run the water and wash your face and go back out to the kitchen.
{% else %}
You wash your face. The mirror is just the mirror. What catches you is the light switch again — the phantom reach that your hand still makes sometimes, corrected before it completes. You're going to be doing that for a while.
{% endif %}
{% endif %}

{% if w.hasTrait("ANALYTICAL") %}
The switch is on the right. Your hand went left. You dry your face on the towel and stand there for a moment longer than necessary.
{% elif w.hasTrait("AMBITIOUS") %}
Two hours of work left and you're standing in your bathroom thinking about a light switch.

You grip the edge of the sink. The porcelain is cold. You turn off the light and go back to the kitchen.
{% else %}
The kettle starts to rumble in the other room. You go back out to deal with it.
{% endif %}

{% if w.hasTrait("ANALYTICAL") %}
You make tea — the box of green tea you bought on Sunday because it was the familiar brand and you weren't prepared to make any additional decisions — and sit at the kitchen table with your laptop. Not working. You open a notes file and write: *light switch L→R. bathroom mirror. adaptation lag normal, cached motor patterns. no action required.*

You read it back. Close the note. Open the PR you'd been meaning to review. The cursor blinks. The apartment is quiet.
{% elif w.hasTrait("AMBITIOUS") %}
You go back to the laptop. You send the follow-up you'd meant to send. It takes four minutes. The three carried-over items go into tomorrow's list in priority order.

When you're done you sit for a minute without doing anything. The city does its thing outside. You think about how the day went — specifically, accurately, without editorializing. It went fine. It went better than fine. You know what you're doing at this job, which is the one thing you were certain would survive the month intact, and it did.

You close the laptop and order from the Thai place down the block.
{% else %}
You make tea and sit with it by the window. The bus stop below has two people waiting. One is reading something on her phone; the other is just standing. The bus comes. They both get on. The stop is empty.

You drink the tea. The apartment is quiet in a way that's becoming, if not comfortable, at least familiar.
{% endif %}

{% if w.getSkill("FEMININITY") < 40 %}
{% if w.getSkill("FEMININITY") < 25 %}
The thing in the bathroom was thirty seconds. The light switch. The mirror. Both already fading.

You get up and start figuring out dinner.
{% else %}
The switch thing was nothing. You know it was nothing. In a month you'll stop reaching left entirely, and at some point after that you won't remember that you ever did.

You get up and figure out dinner.
{% endif %}
{% endif %}
"""

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "settled"

  [[actions.effects]]
  type  = "advance_time"
  slots = 28

  [[actions.effects]]
  type   = "change_stress"
  amount = -3

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 3

  [[actions.next]]
  finish = true

[[actions]]
id     = "bath"
label  = "Run a bath"
detail = "The tub is deep. The apartment is quiet."
prose  = """
The bathroom is small and the tub is deep — the old cast-iron kind that takes ten minutes to fill and holds heat like it was built for a different century's pace. You turn the tap. The water pressure is decent. The pipes groan once and settle.

You undress while it fills.

{% if w.getSkill("FEMININITY") < 25 %}
The mirror is fogged before you get in, which is fine. The body in the peripheral vision is one you're still learning the edges of — hip width, how your arm hangs, the weight distribution when you step over the lip of the tub. Your foot finds the bottom. The water rises over your shins and the warmth is immediate and complete and your breath goes out in a way you didn't expect.

*Oh.* Just that. The water and the warmth and the small sound you made.
{% elif w.getSkill("FEMININITY") < 50 %}
The mirror fogs. You step in. The water takes you in stages — calves, thighs, hips, the sharp intake at your stomach — and then you're in and the warmth has you and the apartment is very, very quiet.

Your shoulders drop. Your jaw loosens. The day lets go.
{% else %}
You step in. The water closes over you. Your hair floats. The ceiling has a crack you've memorized. The warmth settles into your muscles and the day releases its grip one joint at a time.
{% endif %}

{% if w.hasTrait("ROMANTIC") %}
You lie there for twenty minutes. The water cools slowly. You add more hot. The window above the tub is frosted glass and the streetlight comes through it orange and diffused and the bathroom is warm and the city is outside and you're in here and you're not thinking about anything and that's the whole thing.
{% elif w.hasTrait("ANALYTICAL") %}
You time yourself. Fifteen minutes. The water temperature drops about a degree every three minutes at this volume. You add hot at the ten-minute mark. The efficiency of this as a stress-reduction protocol is unclear, but the data point is: your hands have stopped being fists.
{% else %}
Twenty minutes. Maybe more. The water cools and you add more hot and the pipes groan and the building settles and at some point you realize you haven't thought about the meeting or the week or the light switch for a while.
{% endif %}

You get out when the water is lukewarm. Towel. The fogged mirror clears in streaks. You go to the kitchen and order from the Thai place.
"""

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "settled"

  [[actions.effects]]
  type  = "advance_time"
  slots = 28

  [[actions.effects]]
  type   = "change_stress"
  amount = -5

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 4

  [[actions.next]]
  finish = true

[[actions]]
id     = "call"
label  = "Pick up the phone"
detail = "There's someone from before. The question is what you'd say."
prose  = """
Your phone is on the kitchen counter. You pick it up. Scroll past the work notifications — Carter's email, a Slack thread you'll deal with tomorrow — and open contacts.

{% if w.hasTrait("SHY") %}
The list has names in it that belong to someone else's life. College friends. The guy from the climbing gym. Your sister, who texts every Sunday and whom you've been answering with emojis and excuses for two weeks. You scroll past all of them and put the phone down.

Not tonight. The excuse you'd give — traveling, busy, new job — is true enough. The thing you can't say sits behind the things you can, and the gap is wider than a phone call can bridge.
{% elif w.hasTrait("CONFIDENT") %}
You call your sister.

On the third ring, you hear, "Hey, stranger." Not annoyed. Just accounting for the gap. You tell her about the apartment, the neighborhood, the job. Then come the practical questions: are you eating, are you okay. You say yes to both. Both answers are close enough to true.

"Come visit," she says. You say you will. The timeline stays vague on purpose. The call lasts eight minutes. When you hang up, the apartment feels quieter than it did before you picked up the phone.
{% else %}
You hover over a name. Then another. The contacts list is a museum of a life you are still technically living: same number, same name in most of them, same relationships on paper. The gap is in the details. The details are everything.

You put the phone down. Open the delivery app instead. Thai food. The pad see ew from the place on 43rd.
{% endif %}

{% if w.getSkill("FEMININITY") < 30 %}
The phone is dark on the counter. The contacts are all still there.
{% endif %}

{% if w.hasTrait("ANALYTICAL") %}
You eat at the kitchen table with your laptop open. Not working, just reading. The food is good. The apartment is becoming, incrementally, a place where you live rather than a place where you are staying.
{% else %}
The food arrives. You eat on the couch with the TV on something you are not watching. The apartment settles into its evening noises: radiator, street, the neighbor's music through the wall. It is not comfortable yet. But it is closer than last week.
{% endif %}
"""

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "settled"

  [[actions.effects]]
  type  = "advance_time"
  slots = 28

  [[actions.effects]]
  type   = "change_stress"
  amount = -2

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 3

  [[actions.next]]
  finish = true
