[scene]
id          = "base::workplace_first_day"
pack        = "base"
description = "First day at the tech company. The lobby, the manager, the coworker who explains something you invented. Two rounds of choices."

# Content level: VANILLA — no sexual content.
# Round 1: How you handle Dan's explanation (!dan_done)
# Round 2: Lunch (dan_done)

[intro]
prose = """
The financial district is twenty minutes from your apartment by train. You tested the route yesterday. Today is the real version: Monday morning, laptop over one shoulder, visitor badge in the bag.

The blouse collar sits higher than expected. The laptop bag strap settles against a shoulder narrower than it should be.

The right stop, then glass and steel and badge readers and polished stone. A lobby designed to communicate money before anyone speaks.

The guard at the desk looks at the badge request. "First day?" He types. The system takes a moment. A visitor badge and a lanyard slide across the desk. "Someone will meet you."

The morning rush moves through the turnstiles — people who know exactly where they're going.

At 9:02, your new manager comes through the turnstiles.

{% if w.hasTrait("SHY") %}
He scans the lobby. His eyes pass you twice before they land.
{% else %}
He finds you by elimination — everyone else in the lobby is already moving.
{% endif %}

His step hitches when he sees you. Just a fraction. His grip adjusts mid-shake, lighter on the release than on the approach.

"Robin?"

{% if w.hasTrait("ANALYTICAL") %}
The handshake recalibration is noted. He looks at you again, briefly, before gesturing toward the elevators.
{% endif %}

Fourth floor. Open plan. Whiteboards dense with system diagrams. The desk is temporary, the laptop still in its box, and the office smells of burnt coffee and dry-erase marker.

Ten o'clock, standup. Someone says, "Robin's joining us from the Seattle office," and the room does the usual new-hire math. Seven handshakes, four names retained.

{% if w.hasTrait("OBJECTIFYING") %}
One of them holds the handshake a beat too long. The inventory is fast: face, body, age estimate. Quick and automatic, done before he lets go.
{% endif %}

At 11:15, a backend engineer named Dan stops by your desk and starts walking you through the authentication architecture with the kind of patient volunteer-helpfulness reserved for new hires who look as if they might need it.

Your name is in the commit history for this system. The original spec is yours.

Dan finishes the explanation and looks at you.
"""

[[thoughts]]
condition = "w.wasTransformed() && w.getSkill('FEMININITY') < 20"
style     = "inner_voice"
prose = "Ten years. A visitor badge on a lanyard. The handshake that adjusted on the way out."

# ── Round 1: How to handle Dan ────────────────────────────────────────

[[actions]]
id        = "assert_expertise"
label     = "\"I wrote that spec.\""
detail    = "Set the record straight. Once."
condition = "!scene.hasFlag('dan_done') && (w.hasTrait('AMBITIOUS') || w.hasTrait('CONFIDENT') || w.hasTrait('BITCHY'))"
prose = """
{% if w.hasTrait("BITCHY") %}
"The spec for that is in the repo," you say. "The one I wrote." You smile just enough to keep it civil. Dan stops mid-sentence.
{% elif w.hasTrait("AMBITIOUS") %}
"I know — I wrote the original requirements doc. The one in the repo, not the presentation deck." Flat. Professional. Dan processes the sentence in visible stages, nods once, and finds somewhere else to look.
{% else %}
"I was on the design review for that, actually. I wrote the initial spec." Dan blinks. He nods. He stops explaining.
{% endif %}

The next hour is different from what came before. Someone stops by with a question about the auth module and asks it directly, not as an orientation exercise. You answer it without opening any documentation.

{% if w.hasTrait("OBJECTIFYING") %}
Matt, from the standup, glances your way four times in the next hour. Not at your screen. Quick each time, the same inventory as the handshake.
{% endif %}
"""

  [[actions.effects]]
  type = "set_scene_flag"
  flag = "dan_done"

  [[actions.effects]]
  type = "set_game_flag"
  flag = "FIRST_DAY_ASSERTED_STATUS"

[[actions]]
id        = "let_it_go"
label     = "\"Thanks. I'll dig into it.\""
detail    = "Let your work do the talking."
condition = "!scene.hasFlag('dan_done')"
prose = """
"Thanks, I'll take a look," you say. Dan walks away.

You turn back to the codebase. The files are already open. You've been in this repo since 9:30.

{% if w.hasTrait("ANALYTICAL") %}
The explanation had three gaps in it. You open a blank doc and start a list of questions — not corrections, just a record. The questions can wait for code review.
{% elif w.hasTrait("AMBITIOUS") %}
By noon you've opened four tickets Dan didn't mention. You add them to the backlog without comment and keep moving.
{% elif w.hasTrait("SHY") %}
On the notepad beside your keyboard, you wrote down everything Dan said. The handwriting is careful. You look at it for a moment, then turn back to the screen.
{% else %}
The morning moves. You work. People leave you alone.
{% endif %}

{% if w.hasTrait("OBJECTIFYING") %}
Matt glances your direction twice before lunch. Quick and automatic, same as the standup. You keep your eyes on your screen.
{% endif %}
"""

  [[actions.effects]]
  type = "set_scene_flag"
  flag = "dan_done"

  [[actions.effects]]
  type = "set_game_flag"
  flag = "FIRST_DAY_DEFERRED_STATUS"

[[actions]]
id        = "redirect_to_work"
label     = "\"Let's look at the repo.\""
detail    = "Skip the status negotiation. Move straight to the code."
condition = "!scene.hasFlag('dan_done') && (w.hasTrait('ANALYTICAL') || w.hasTrait('DOWN_TO_EARTH') || w.hasTrait('CONFIDENT'))"
prose = """
"Let's look at the repo," you say, and you swivel the laptop toward Dan before he can continue.

You pull up the auth flow diagram, then the actual implementation. Two minutes later Dan is standing beside your desk while you walk him through a cache edge case. He leans in to see the screen.

{% if w.hasTrait("ANALYTICAL") %}
You work through the edge case methodically — the condition, the failure path, the timing window. Dan follows along, stopping you twice to ask questions.
{% elif w.hasTrait("CONFIDENT") %}
When Dan finally says "oh, got it," he says it to the screen, not to you. He stays for another ten minutes. The tone of the questions is different from the tone of the walkthrough.
{% else %}
Dan asks a clarifying question. You answer it. He asks another. By the end he's got a notepad out.
{% endif %}

When Dan goes back to his desk, he sends you a Slack message three minutes later with a follow-up question about the timing window.
"""

  [[actions.effects]]
  type = "set_scene_flag"
  flag = "dan_done"

  [[actions.effects]]
  type = "set_game_flag"
  flag = "FIRST_DAY_REDIRECTED_STATUS"

# ── Round 2: Lunch ────────────────────────────────────────────────────

[[actions]]
id        = "lunch_at_desk"
label     = "Eat at your desk"
detail    = "You've got momentum. Keep it."
condition = "scene.hasFlag('dan_done')"
prose = """
The team starts filtering out for lunch around noon. Someone stops by your desk.

"I'm good — I want to get through this." You gesture at your screen. They go.

The office quiets down. You eat the protein bar from your bag and keep working. By 1 PM you've pushed your first commit. The tests pass.

{% if w.hasTrait("AMBITIOUS") %}
When the team comes back, someone spots the commit notification in Slack. "Already?" he says, looking at your desk. "Yeah," you say. The afternoon opens up from there.
{% elif w.hasTrait("ANALYTICAL") %}
Tests green. You open the next ticket. Nobody stops by your desk again until three-thirty, when Dan appears with another question about the timing window.
{% else %}
The team comes back and the afternoon starts. By four you're two tickets ahead of where you expected to be.
{% endif %}

By five you've pushed two more commits. Nobody has asked how old you are since this morning.
"""

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "working"

  [[actions.effects]]
  type = "set_game_flag"
  flag = "FIRST_DAY_LUNCH_DESK"

  [[actions.effects]]
  type = "set_game_flag"
  flag = "STARTED_JOB"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 3

  [[actions.next]]
  finish = true

[[actions]]
id        = "lunch_with_group"
label     = "Join the group for lunch"
detail    = "Six people. A sandwich place two blocks away."
condition = "scene.hasFlag('dan_done') && !w.hasTrait('SHY')"
prose = """
Six of you walk to a place two blocks away that someone describes as "fine, it's fine." Sandwiches. Bright lighting. Tables designed for people who want calories and then to get back upstairs.

The conversation starts with first-day material: where you came from, what team, how long you've been in town. Then someone asks how old you are.

{% if w.hasTrait("CONFIDENT") %}
"Thirty-two," you say. A beat. Someone starts to say something. "I know," you say. They stop. The table moves on.
{% elif w.hasTrait("DOWN_TO_EARTH") %}
"Old enough to have opinions about the auth system," you say. Someone laughs. The conversation moves on. You eat your sandwich.
{% else %}
"Thirty-two." The table goes quiet for a half-second. Faces run the calculation. You take a bite of your sandwich and wait for the conversation to find somewhere else to go.
{% endif %}

{% if w.hasTrait("OBJECTIFYING") %}
Matt sits across from you and angles most of his conversation your way. His chair is turned slightly toward you. When someone else talks he waits it out.
{% endif %}

Walking back, someone holds the door. Automatic, not deliberate. You go through.

The afternoon is code. By five you've pushed your first commit.
"""

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "working"

  [[actions.effects]]
  type = "set_game_flag"
  flag = "FIRST_DAY_LUNCH_GROUP"

  [[actions.effects]]
  type = "set_game_flag"
  flag = "STARTED_JOB"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 3

  [[actions.next]]
  finish = true

[[actions]]
id        = "lunch_alone"
label     = "Slip out on your own"
detail    = "The group is still deciding where to go. You already know."
condition = "scene.hasFlag('dan_done')"
prose = """
You leave while the group is still debating restaurants. The financial district around the building is sandwich shops, a Starbucks, polished lobby entrances, a narrow park wedged between two towers.

You find a bench. The sandwich is from a deli on the corner. The sun is out.

{% if w.hasTrait("SHY") %}
Out here it's quiet. Nobody from the office. You eat slowly and watch the foot traffic on the path. When the lunch hour starts thinning out you check the time and head back.
{% elif w.hasTrait("ANALYTICAL") %}
You clock the neighborhood while you eat. Coffee shop on the corner — line moves fast, possible morning stop. A path through the park that probably connects to the waterfront. A grocery store across from the station. You finish the sandwich and go back.
{% else %}
You eat. You watch the city do its lunch-hour thing. Delivery bikes, suits, a guy walking a very large dog that stops to look at you with frank, uncomplicated interest. You finish and go back.
{% endif %}

The afternoon is code. By five you've pushed your first commit and the tests are green.
"""

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "working"

  [[actions.effects]]
  type = "set_game_flag"
  flag = "FIRST_DAY_LUNCH_ALONE"

  [[actions.effects]]
  type = "set_game_flag"
  flag = "STARTED_JOB"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 3

  [[actions.next]]
  finish = true
