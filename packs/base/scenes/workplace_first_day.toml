[scene]
id          = "base::workplace_first_day"
pack        = "base"
description = "First day at the tech company. The lobby, the manager, the coworker who explains something you invented. Two rounds of choices."

# Content level: VANILLA — no sexual content.
# Round 1: How you handle Dan's explanation (!dan_done)
# Round 2: Lunch (dan_done)

[intro]
prose = """
The financial district is twenty minutes from your apartment by train. You tested the route yesterday on a dry run and you're confirming it now with your actual body on an actual Monday morning.

The blouse has a collar that sits differently than you expected. Your laptop bag pulls at a shoulder that's narrower than it was a week ago.

You get off at the right stop. The building is glass and steel — ground-floor lobby, security desk, badge readers.

The guard looks at your badge request. "First day?"

"Yes. Robin. Software engineering."

He types. The system takes a moment. "Visitor badge until your card comes through. Someone will meet you."

You take the badge and find a seat in the lobby. The morning rush moves through the turnstiles — people who know exactly where they're going.

At 9:02, your new manager comes through looking for you.

{% if w.hasTrait("SHY") %}
You stand up too fast and grab your bag before it can slide off the chair.
{% else %}
You stand. He finds you by elimination — you're the only one sitting here who doesn't look like they belong yet.
{% endif %}

He sees you and his step hitches. Just a fraction — the recalibration. Whatever he was expecting from your resume, you don't match it.

You say your name before he can work out what to say. He shakes your hand. His grip adjusts mid-shake — lighter than it started.

{% if w.hasTrait("ANALYTICAL") %}
You clock the adjustment. You're going to see this today. Probably tomorrow too.
{% endif %}

Fourth floor. Open plan. Whiteboards with diagrams you could redraw from memory. Your desk is temporary — pending permanent assignment — and the laptop is still in the box.

You get set up. At ten, the team gathers for standup. Someone introduces you: "Robin, she's joining us from the Seattle office." You shake seven hands and remember four names.

{% if w.hasTrait("OBJECTIFYING") %}
One of them holds the handshake a beat too long. You can feel him cataloging — face, body, age estimate. The read is fast and automatic and you recognize every part of it.
{% endif %}

At 11:15, a coworker named Dan from the backend team finds your desk. He starts walking you through the authentication architecture with the helpful energy of someone onboarding a new hire who might be lost.

You wrote the original spec for this system. Your name is in the commit history.

He finishes the explanation and looks at you.
"""

[[thoughts]]
condition = "!w.alwaysFemale() && w.getSkill('FEMININITY') < 20"
style     = "inner_voice"
prose = "You have ten years of experience, institutional knowledge, and a mass-produced visitor badge. Your manager decided you might be an intern. You watched him make this decision in real time. *Okay.* Work the problem."

# ── Round 1: How to handle Dan ────────────────────────────────────────

[[actions]]
id        = "assert_expertise"
label     = "\"I wrote that spec.\""
detail    = "Set the record straight. Once."
condition = "!scene.hasFlag('dan_done') && (w.hasTrait('AMBITIOUS') || w.hasTrait('CONFIDENT') || w.hasTrait('BITCHY'))"
prose = """
{% if w.hasTrait("BITCHY") %}
"The spec for that is in the repo," you say. "The one I wrote." You say it without inflection. You're smiling. He stops.
{% elif w.hasTrait("AMBITIOUS") %}
"I know — I wrote the original requirements doc. The one in the repo, not the presentation deck." You say it like a fact, because it is one. He processes this. Nods. Finds something else to do.
{% else %}
"I was on the design review for that, actually. I wrote the initial spec." Even. Professional. He nods once and moves on.
{% endif %}

The rest of the morning shifts after that. Not dramatically — just the small adjustments that happen when a room recalibrates. Someone asks you a real question about the auth module. You answer it.

{% if w.hasTrait("OBJECTIFYING") %}
The coworker from standup — Matt, you've learned — glances your direction four times in the next hour. Not at your screen. The inventory is quick each time. You recognize the efficiency of it.
{% endif %}
"""

  [[actions.effects]]
  type = "set_scene_flag"
  flag = "dan_done"

[[actions]]
id        = "let_it_go"
label     = "\"Thanks. I'll dig into it.\""
detail    = "Let your work do the talking."
condition = "!scene.hasFlag('dan_done')"
prose = """
"Thanks, I'll take a look," you say, and he walks away satisfied.

You turn back to the codebase you've had open since 9:30. You wrote half of what you're looking at and he doesn't know that, and for now that's fine.

{% if w.hasTrait("ANALYTICAL") %}
You know exactly what's wrong with his explanation. You didn't say it. The gap between what you know and what he thinks you know will close on its own — you just need to ship something.
{% elif w.hasTrait("AMBITIOUS") %}
By lunch you'll have found three things you'd do differently. You've said nothing about any of them. Not yet.
{% elif w.hasTrait("SHY") %}
At your desk, you look at the notes you took during his explanation. You know every word of it already. The afternoon stretches ahead, long and quiet, and you fill it with work.
{% else %}
The morning moves on. You work. People leave you alone, which is fine.
{% endif %}

{% if w.hasTrait("OBJECTIFYING") %}
The coworker from standup — Matt — glances your direction when he thinks you're not looking. Quick. Automatic. You don't look back. You're at work.
{% endif %}
"""

  [[actions.effects]]
  type = "set_scene_flag"
  flag = "dan_done"

# ── Round 2: Lunch ────────────────────────────────────────────────────

[[actions]]
id        = "lunch_at_desk"
label     = "Eat at your desk"
detail    = "You've got momentum. Keep it."
condition = "scene.hasFlag('dan_done')"
prose = """
The team starts filtering out for lunch around noon. Someone asks if you want to join.

"I'm good — I want to get through this." You gesture at your screen. They go.

You eat the protein bar from your bag and keep working. The office is quiet with most people gone. The code makes sense — you should know, you designed half of it. By 1 PM you've pushed your first commit and the tests pass.

{% if w.hasTrait("AMBITIOUS") %}
When the team comes back, someone notices the commit in Slack. "Already?" he says. "Yeah," you say. That one syllable does more than Dan's walkthrough ever could.
{% elif w.hasTrait("ANALYTICAL") %}
First commit. Tests green. Forty-seven minutes ahead of your internal schedule. You open the next ticket.
{% else %}
The team comes back. The afternoon starts. You're ahead of where you expected to be, which counts for something.
{% endif %}

By five you've pushed two more commits. Nobody has asked how old you are since this morning. The day, on balance, worked.
"""

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "working"

  [[actions.effects]]
  type = "set_game_flag"
  flag = "STARTED_JOB"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 3

  [[actions.next]]
  finish = true

[[actions]]
id        = "lunch_with_group"
label     = "Join the group for lunch"
detail    = "Six people. A sandwich place two blocks away."
condition = "scene.hasFlag('dan_done') && !w.hasTrait('SHY')"
prose = """
Six of you walk to a place two blocks away that someone describes as "fine, it's fine." It is fine. Sandwiches. Bright lighting. The kind of restaurant that exists to feed office workers and doesn't pretend otherwise.

The conversation is first-day stuff — where are you from, where were you before, what team. Then someone asks how old you are.

{% if w.hasTrait("CONFIDENT") %}
"Thirty-two," you say, and let the number do its work. A beat. Someone does the math. "You look..." they start. "I know," you say. That's the end of it.
{% elif w.hasTrait("DOWN_TO_EARTH") %}
"Old enough to have opinions about the auth system," you say. It gets a laugh. The conversation moves on. You eat your sandwich.
{% else %}
"Thirty-two." The table recalibrates. You can see it happen — the assumptions reshuffling. Not hostile. Just surprise. You eat your sandwich and let the number sit.
{% endif %}

{% if w.hasTrait("OBJECTIFYING") %}
Matt sits across from you and directs most of his conversation your way. The positioning is familiar — close, attentive, angled to exclude the rest of the table.
{% endif %}

Walking back to the office, someone holds the door for you. Quick, automatic, not a thing.

The afternoon is code. By five you've pushed your first commit and the tests pass and the day worked.
"""

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "working"

  [[actions.effects]]
  type = "set_game_flag"
  flag = "STARTED_JOB"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 3

  [[actions.next]]
  finish = true

[[actions]]
id        = "lunch_alone"
label     = "Slip out on your own"
detail    = "The group is still deciding where to go. You already know."
condition = "scene.hasFlag('dan_done')"
prose = """
You leave while the group is still debating restaurants. The neighborhood around the office is financial district standard — sandwich shops, a Starbucks, a park with benches and pigeons and people eating lunches out of paper bags.

You find a bench. The sandwich is adequate. The sun is out.

{% if w.hasTrait("SHY") %}
This is better. The office was a lot of people reading you at once — your face, your age, your body, the gap between your badge and what they were expecting. Out here, nobody knows any of that. You're just someone on a bench eating a sandwich. The simplicity of it is a relief.
{% elif w.hasTrait("ANALYTICAL") %}
You map the neighborhood while you eat. Coffee shop on the corner — potential morning stop. The park has a path that looks like it connects to the waterfront. Grocery store across from the station. You're building infrastructure, the same way you'd build a dev environment. One dependency at a time.
{% else %}
You eat. You watch the city. A man walks by with a dog and the dog looks at you with the open curiosity that dogs have and people don't. You finish the sandwich and go back.
{% endif %}

The afternoon is code. By five you've pushed your first commit and the tests are green and nobody has asked how old you are since this morning.
"""

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::workplace_opening"
  to_state = "working"

  [[actions.effects]]
  type = "set_game_flag"
  flag = "STARTED_JOB"

  [[actions.effects]]
  type   = "skill_increase"
  skill  = "FEMININITY"
  amount = 3

  [[actions.next]]
  finish = true
