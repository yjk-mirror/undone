[scene]
id          = "base::campus_library"
pack        = "base"
description = "First week study session. A male classmate sits nearby. The attraction arrives before the thought."

[intro]
prose = """
The main library reading room has the specific quality of places where nothing is supposed to happen. High ceilings, long tables, the ambient sound of keyboards and very quiet conversation. You've been here twice already this week. You like it here.

It's Thursday. You have a problem set due Monday and a reading due tomorrow. You're set up at the far end of one of the long tables — laptop, textbook, notebook, coffee in a spill-proof cup because you've learned — and you've been working for about forty minutes when someone sits down across from you.

You finish the sentence you're writing. Then you look up.

He's about your age. Dark hair, serious face, the kind of jaw that lands before anything else does. He's opening a problem set — same course number at the top, you can read it from here.

Your pen stops moving.
"""

[[intro_variants]]
condition = "w.getSkill('FEMININITY') < 20"
prose = """
Thursday. The library. You've been here forty minutes and it's going fine.

He sits down across from you. You finish the sentence you're writing and then look up. The sentence takes three extra beats to finish.

He's in the same course. Same problem set. He doesn't look up from his bag.

You go back to the notes. Your handwriting for the next two lines is slightly different from the two lines before.
"""

[[thoughts]]
condition = "w.getSkill('FEMININITY') < 50"
style     = "observation"
prose = """
You'd thought about this in the abstract for a week. The abstract didn't have a face or a jaw or the specific way someone's hands move when they're opening a textbook.

Your pulse is doing something. Your eyes keep wanting to track left. You put them back on line six of the problem set. Line six was where it stopped.
"""

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id    = "keep_working"
label = "Keep working. Stay focused."
detail = "You're here to study. The problem set doesn't care about your feelings."
allow_npc_actions = true
prose = """
You work. He works. The reading room does what reading rooms do.

Ninety minutes later you're through the problem set and into the reading, and the person across from you has packed up and left at some point in the last twenty minutes. You didn't notice when. You notice the empty seat now.

You close your laptop and gather your things.
"""

  [[actions.next]]
  finish = true

[[actions]]
id    = "say_something"
label = "Say something. You have an excuse."
detail = "Same problem set. It's a natural opening."
condition = "!scene.hasFlag('talked')"
prose = """
You wait until there's a natural pause in whatever he's doing and say: "Are you in 201? I'm stuck on problem four."

He looks up. Brown eyes, slightly surprised — the look of someone who wasn't expecting to be talked to.

"Problem four's the worst," he says. "I think you need the lemma from last week's reading." He says it without condescension, which is the good version of being told you need a lemma.

You talk through it for ten minutes. He explains the lemma. You already knew the lemma, mostly, but the explanation is useful and you don't correct him because it turns out you were missing a step. His name is Theo. He's in your section.

When you go back to your problem set your cheeks are warm.
"""

  [[actions.effects]]
  type = "set_scene_flag"
  flag = "talked"

  [[actions.effects]]
  type = "set_game_flag"
  flag = "MET_THEO"

  [[actions.effects]]
  type  = "add_npc_liking"
  npc   = "m"
  delta = 1

  [[actions.effects]]
  type = "set_npc_role"
  npc  = "m"
  role = "ROLE_THEO"

  [[actions.effects]]
  type = "set_npc_name"
  npc  = "m"
  name = "Theo"

  [[actions.next]]
  finish = true

# ── NPC Actions ────────────────────────────────────────────────────

[[npc_actions]]
id     = "theo_looks_up"
label  = "He looks up from his work"
weight = 6
condition = "!scene.hasFlag('talked') && !scene.hasFlag('noticed')"
prose = """
He looks up — maybe you moved, maybe he just needed a break from the problem set — and you make eye contact for about a second.

He looks back at his work. You look back at yours.

One second. You were fine before it.
"""

  [[npc_actions.effects]]
  type = "set_scene_flag"
  flag = "noticed"

  [[npc_actions.next]]
  goto = "keep_working"
