[scene]
id          = "base::campus_library"
pack        = "base"
description = "First week study session. A male classmate sits nearby. The attraction arrives before the thought."

[intro]
prose = """
The main library reading room has the specific quality of places where nothing is supposed to happen. High ceilings, long tables, the ambient sound of keyboards and very quiet conversation. You've been here twice already this week. You like it here.

It's Thursday. You have a problem set due Monday and a reading due tomorrow. You're set up at the far end of one of the long tables — laptop, textbook, notebook, coffee in a spill-proof cup because you've learned — and you've been working for about forty minutes when someone sits down across from you.

You don't look up immediately. You finish the sentence you're writing. Then you look up.

He's about her age. Dark hair, serious face, the kind of jaw that you notice before you've decided to notice anything. He's opening a problem set that looks like hers — same course number at the top, she can see it from here.

You register all of this in about a second, and then you register that you registered it, and then you look back at your notes.

*Oh*, she thinks. *Okay.*

You are not ready for this. You were ready for the general concept, which you'd been processing for a week. You were not ready for it to arrive with a jaw and a problem set and sit across from you in the library at 3 PM on a Thursday.
"""

[[intro_variants]]
condition = "w.getSkill('FEMININITY') < 20"
prose = """
Thursday. The library. You've been here forty minutes and it's going fine.

He sits down across from you. You finish the sentence you're writing and then look up. The sentence you finish takes three extra beats.

He's in the same course. Same problem set. He doesn't look up from his bag.

*Okay*, you think. You look back at your notes. Your handwriting for the next two lines is slightly different from the two lines before. You notice this later.
"""

[[thoughts]]
condition = "w.getSkill('FEMININITY') < 50"
style     = "inner_voice"
prose = """
You'd thought about this in the abstract. You'd been thinking about it for a week in the abstract. The abstract had the advantage of not having a face or a jaw or the specific way a person's hands move when they're opening a textbook.

*This is just attraction*, you think. *This is what attraction is.* You know what attraction is. You've had it before, pointed in different directions, and it always felt like this: the registering before the reasoning, the body ahead of the thought.

The difference is just the direction. Theoretically.

You look back at your problem set. Line six. You were on line six.
"""

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id    = "keep_working"
label = "Keep working. Stay focused."
detail = "You're here to study. The problem set doesn't care about your feelings."
allow_npc_actions = true
prose = """
You work. He works. The reading room does what reading rooms do.

Ninety minutes later you're through the problem set and into the reading, and the person across from you has packed up and left at some point in the last twenty minutes, and you didn't notice when. You notice his absence and then note that you noticed it.

*Okay*, she thinks. *Information. Filed.*

You close your laptop and gather your things. You'll process it later. You've processed everything else later and that's worked approximately as well as anything.
"""

  [[actions.next]]
  finish = true

[[actions]]
id    = "say_something"
label = "Say something. You have an excuse."
detail = "Same problem set. It's a natural opening."
condition = "!scene.hasFlag('talked')"
prose = """
You wait until there's a natural pause in whatever he's doing and say: "Are you in 201? I'm stuck on problem four."

He looks up. He has brown eyes and the slightly surprised look of someone who wasn't expecting to be talked to.

You watch yourself watch him and think: *I am doing this. I am doing this on purpose. I don't know why I'm doing this.*

You know why you're doing this.

"Problem four's the worst," he says. "I think you need the lemma from last week's reading." He says it without condescension, which is the good version of being told you need a lemma.

They talk through it for ten minutes. He explains the lemma. You already knew the lemma, mostly, but the explanation is useful and you don't correct him because it turns out you were missing a step. His name is Theo. He's in your section.

When you go back to your problem set your face is doing something you don't have a name for yet.
"""

  [[actions.effects]]
  type = "set_scene_flag"
  flag = "talked"

  [[actions.next]]
  finish = true

# ── NPC Actions ────────────────────────────────────────────────────

[[npc_actions]]
id     = "theo_looks_up"
label  = "He looks up from his work"
weight = 6
condition = "!scene.hasFlag('talked') && !scene.hasFlag('noticed')"
prose = """
He looks up — maybe she moved, maybe he just needed a break from the problem set — and they make eye contact for about a second.

He looks back at his work. You look back at yours.

One second. You were fine before that second. You are also fine after it. But the second is — it's something. You add it to the list of things you're processing.
"""

  [[npc_actions.effects]]
  type = "set_scene_flag"
  flag = "noticed"

  [[npc_actions.next]]
  goto = "keep_working"
