[scene]
id          = "base::opening_callback_status_assertion"
pack        = "base"
description = "Week-two callback. Early competence choices from the first day have started changing how coworkers approach Robin."

[intro]
prose = """
Mid-morning, a Slack notification from someone on the platform side — Tariq, one message in the thread from two weeks ago.

It is not a tutorial. Not a check-in. The question is about the auth rollout, written in the shorthand engineers use when they assume you already know the shape of the problem.

{% if gd.hasGameFlag("FIRST_DAY_ASSERTED_STATUS") %}
On Monday you cut the introductory framing short and redirected the conversation to the ticket. Tariq was in that room.
{% else %}
On Monday you kept the conversation on the code and let the repo speak for itself. Tariq was in that room.
{% endif %}

{% if gd.hasGameFlag("OPENING_ID_PREEMPTED") %}
The question arrives without preamble. No setup, no checking whether you're following.
{% elif gd.hasGameFlag("OPENING_ID_WAITED_OUT") %}
The question arrives without preamble. No setup, no checking whether you're following. At the airport that same silence cost you twenty minutes.
{% endif %}

You type three sentences and attach the benchmark link. The reply comes back before you have closed the tab.

"Perfect. That's what I needed."
"""

[[actions]]
id     = "answer_and_move_on"
label  = "Answer it cleanly"
detail = "Let the work keep building the reputation."
prose  = """
You set the phone face-down and pull the open ticket back up on the screen.

Outside the window a bus goes by. The office chat keeps ticking.
"""

  effect = 'gd.setGameFlag("OPENING_CALLBACK_STATUS_ASSERTION"); w.changeStress(-1);'

  [[actions.next]]
  finish = true
