[scene]
id          = "base::opening_callback_first_week_solitude"
pack        = "base"
description = "Week-two callback. Her first-night coping style changes how later apartment quiet feels."

[intro]
prose = """
The apartment is quiet again, but not the same kind of quiet it was that first week.

{% if gd.hasGameFlag("FIRST_NIGHT_RESEARCHED") %}
The first night here you sat on the floor and turned practical panic into browser tabs. The apartment still remembers that version of you a little: searching, sorting, trying to solve embodiment like a technical problem.
{% elif gd.hasGameFlag("FIRST_NIGHT_STAGED_TOMORROW") %}
The first night here you staged tomorrow into existence with a charger, a folded blouse, and shoes by the door. The room still holds some of that improvised order.
{% else %}
The first night here you survived it the direct way: food, floor, sleep, forward motion. There is something bracing about remembering that version of yourself from a place that already feels slightly more livable.
{% endif %}

{% if gd.hasGameFlag("LANDLORD_KEPT_TRANSACTIONAL") %}
The landlord taught you something too: narrow the exchange, keep it factual, move it along. Useful instinct. It follows you home more often than you like.
{% elif gd.hasGameFlag("LANDLORD_WAITED_HIM_OUT") %}
You remember waiting the landlord out in the doorway, letting him tire himself of the mismatch before you gave him anything else. That same endurance has been carrying more weight than you expected.
{% elif gd.hasGameFlag("LANDLORD_EXPLAINED_BRIEFLY") %}
You remember the quick smoothing explanation you gave the landlord, the one that made the whole interaction easier and left something sour behind anyway. Some forms of grace cost more than they look like they should.
{% endif %}

Outside, somebody laughs on the sidewalk and keeps walking. Inside, the radiator ticks once and settles.
"""

[[actions]]
id     = "sit_with_it"
label  = "Sit with the quiet"
detail = "The apartment is no longer a stranger. Not quite."
prose  = """
You do not make the room prove itself tonight. You just let it exist around you.

That is newer than it sounds.
"""

  [[actions.effects]]
  type = "set_game_flag"
  flag = "OPENING_CALLBACK_FIRST_WEEK_SOLITUDE"

  [[actions.effects]]
  type   = "change_stress"
  amount = -2

  [[actions.next]]
  finish = true
