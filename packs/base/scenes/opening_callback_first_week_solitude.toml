[scene]
id          = "base::opening_callback_first_week_solitude"
pack        = "base"
description = "Week-two callback. Her first-night coping style changes how later apartment quiet feels."

[intro]
prose = """
The apartment is quiet. The radiator makes its noise. The window faces the same alley it faced the first night.

{% if gd.hasGameFlag("FIRST_NIGHT_RESEARCHED") %}
The first night you sat on the floor with the laptop open, three dozen tabs across two windows, the screen the only light in the room. The marks are still on the floor where the charger cord wore a groove into the baseboards.
{% elif gd.hasGameFlag("FIRST_NIGHT_STAGED_TOMORROW") %}
The first night you laid the blouse out flat on the chair and put the shoes by the door and plugged the phone in before you let yourself sit down. The chair is still in the same spot. The shoes still go by the door.
{% else %}
The first night you ate standing up over the sink and slept in your clothes and set the alarm for six. The bed has sheets on it now. The alarm is still set for six.
{% endif %}

{% if gd.hasGameFlag("LANDLORD_KEPT_TRANSACTIONAL") %}
The landlord's number is still in the phone under "Building — do not elaborate." The last exchange was four words: leak, fixed, confirmed, thanks.
{% elif gd.hasGameFlag("LANDLORD_WAITED_HIM_OUT") %}
The landlord stopped filling silences around the third week. Now the exchanges are short, factual, done.
{% elif gd.hasGameFlag("LANDLORD_EXPLAINED_BRIEFLY") %}
The landlord has not raised the move-in questions again. The brief explanation held.
{% endif %}

Outside, somebody laughs on the sidewalk and keeps walking.
"""

[[actions]]
id     = "sit_with_it"
label  = "Sit with the quiet"
detail = "The apartment is no longer a stranger. Not quite."
prose  = """
You set the keys on the counter and leave the overhead light off.

The radiator ticks once and settles. The window goes dark as the alley lamp flicks on.
"""

  effect = 'gd.setGameFlag("OPENING_CALLBACK_FIRST_WEEK_SOLITUDE"); w.changeStress(-2);'

  [[actions.next]]
  finish = true
