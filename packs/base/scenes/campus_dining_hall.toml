[scene]
id          = "base::campus_dining_hall"
pack        = "base"
description = "The dining hall. Social hierarchies, inverted. The shape of what she doesn't know."

[intro]
prose = """
The Ivy dining hall is large enough that it has factions. You can see them from the entrance — the clustered tables, the particular density of certain groups, the territories that formed around the second week without any apparent announcement. One table is all lacrosse gear and loud. One is laptops-out, no conversation. One is the table where everyone already knows each other from somewhere else, and you can tell because nobody is trying.

A tray. The line. The woman behind you — a sophomore, maybe a junior, one of those people who carry themselves with the specific confidence of having survived a year of this — steps closer to point at the grain bowl and says, "Get the harissa, not the tahini, the tahini's been sitting out all morning." She says it like you know each other. Like helping is just a thing she does.

The harissa. It's good. Tray in hand, the factions map stretching out ahead.
"""

# ── Player Actions ────────────────────────────────────────────────────

[[actions]]
id     = "hierarchy"
label  = "Find somewhere to sit"
detail = "The room has rules. You're learning them from the wrong side."
prose = """
You identify a table with space at the end — three people already there, talking, not an established territory. You walk over. One of the guys at the table — broad shoulders, easy sprawl, the kind of person who takes up space without thinking about it — glances up and then back down. His backpack is on the seat next to him.

He doesn't move it.

You stand there for a second.

{% if w.hasTrait("CONFIDENT") %}
"Is that seat taken?" you ask, meaning the backpack.

He looks up. There's a half-second where he reads you — the same way you read rooms, you're watching him do it — and then he moves the backpack with a shrug and gestures at the seat.

You sit. He doesn't start a conversation. You don't need him to. But you noticed the half-second. You're going to be thinking about what he was calculating for the rest of the meal.
{% elif w.hasTrait("OUTGOING") %}
You're halfway into "is that seat free" when you read his face and stop. He's not hostile. He's just not interested in rearranging for you. You know that face — you've made that face. You change the sentence mid-word into "never mind, I see another spot," which comes out almost natural, and walk away toward a table by the window.

The table by the window has two women who move their bags without being asked and say hello. The conversation that follows is ordinary and easy enough, and you're paying a different kind of attention the entire time, turning over what happened with the backpack like an object you can't quite identify.
{% else %}
You don't say anything. You find another table. This is probably the clearest thing anyone has shown you all week and nobody said a word.
{% endif %}

You finish the grain bowl. Get coffee. Sit.

The dining hall noise is steady around you — trays, conversations, the scrape of chairs, someone across the room who laughs loud and specific, the kind of laugh that other people's tables hear. The world has its own life in here. You're just eating in it.

{% if w.getSkill("FEMININITY") < 25 %}
You watch it from your table. Some guy three tables over performing a story for his whole group, timing his pauses. The sophomore with the harissa tip is halfway through her meal already, talking to two people she clearly knows. You spent forty-five seconds standing next to a backpack.

You called your mom on Tuesday. Everything's great, you said. Classes are interesting. I'm making friends. Your mom said you sounded tired. You said you were fine, just adjusting. You are fine. You are adjusting.
{% elif w.getSkill("FEMININITY") < 50 %}
The woman in the lunch line. The backpack. The junior who held a door yesterday and then did a visible recalibration when you said thank you without the particular warmth he'd been expecting. Small moments, each one nothing. You finish the grain bowl and they're still there, sitting behind your eyes.

You called home this week. Your dad asked about your classes. Your mom asked if you were eating. You said yes to both. There was a thing you wanted to say and you said nothing. You don't know who you'd even explain it to.
{% else %}
A week in. The list of things you were wrong about is longer than you thought it would be. Not catastrophically longer. Just longer.

You called your dad yesterday. He wanted to hear about your classes. You told him about your classes. He sounded proud. Same as always. You said you were good, and you are good, and when you hung up you sat with your phone in your hand for a minute before putting it down.
{% endif %}

You're not going to understand this place in a week. You know that. A week is enough to know the shape of what you don't know yet.

You finish the coffee, drop the tray, and walk back to the dorm.
"""

  [[actions.effects]]
  type     = "advance_arc"
  arc      = "base::campus_opening"
  to_state = "first_week"

  [[actions.next]]
  finish = true
